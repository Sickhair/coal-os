<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CodeForge — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;display:flex;flex-direction:column;height:100vh;font-family:'Orbitron',sans-serif;color:#e2e8f0;overflow:hidden}
.brand{font-size:.35rem;letter-spacing:3px;color:#334155;text-align:center;padding:4px;text-transform:uppercase}
.top-bar{display:flex;gap:4px;padding:4px 8px;background:#0a1628;border-bottom:1px solid #1e293b;align-items:center}
.tab{padding:4px 12px;background:#1e293b;border:1px solid #334155;border-radius:4px 4px 0 0;color:#64748b;font-size:.6rem;cursor:pointer;font-family:inherit}
.tab.active{background:#0f172a;border-color:#3b82f6;color:#3b82f6}
.main{display:flex;flex:1;overflow:hidden}
.editor-wrap{flex:1;display:flex;flex-direction:column;min-width:0}
.editor-header{font-size:.45rem;color:#475569;padding:4px 8px;background:#0a1628;border-bottom:1px solid #1e293b;letter-spacing:1px}
textarea{flex:1;background:#0a0e1a;color:#e2e8f0;border:none;padding:8px;font-family:'Courier New',monospace;font-size:13px;resize:none;outline:none;tab-size:2;line-height:1.5}
.splitter{width:4px;background:#1e293b;cursor:col-resize;flex-shrink:0}
.preview-wrap{flex:1;display:flex;flex-direction:column;min-width:0}
.preview-header{font-size:.45rem;color:#475569;padding:4px 8px;background:#0a1628;border-bottom:1px solid #1e293b;letter-spacing:1px;display:flex;justify-content:space-between}
.preview-header .run{color:#22c55e;cursor:pointer}
iframe{flex:1;background:#fff;border:none;width:100%}
.bottom-bar{display:flex;gap:4px;padding:4px 8px;background:#0a1628;border-top:1px solid #1e293b}
.btn{padding:3px 10px;background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:3px;font-family:inherit;font-size:.5rem;cursor:pointer}
.btn:active{background:#334155;color:#fff}
.btn.run{border-color:#22c55e;color:#22c55e}
</style>
</head>
<body>
<div class="brand">COAL OS — CODEFORGE</div>
<div class="top-bar">
  <div class="tab active" onclick="switchTab(0)">HTML</div>
  <div class="tab" onclick="switchTab(1)">CSS</div>
  <div class="tab" onclick="switchTab(2)">JS</div>
</div>
<div class="main">
  <div class="editor-wrap" id="editorWrap">
    <div class="editor-header" id="editorLabel">HTML</div>
    <textarea id="editor" spellcheck="false"></textarea>
  </div>
  <div class="splitter" id="splitter"></div>
  <div class="preview-wrap">
    <div class="preview-header"><span>PREVIEW</span><span class="run" onclick="runCode()">▶ RUN</span></div>
    <iframe id="preview" sandbox="allow-scripts"></iframe>
  </div>
</div>
<div class="bottom-bar">
  <button class="btn run" onclick="runCode()">▶ RUN</button>
  <button class="btn" onclick="resetCode()">RESET</button>
  <button class="btn" onclick="exportCode()">EXPORT</button>
</div>
<script>
const editor=document.getElementById('editor');
const preview=document.getElementById('preview');
let currentTab=0;
const defaults=[
`<div class="card">
  <h1>Hello World</h1>
  <p>Edit this code and click RUN!</p>
  <button onclick="alert('It works!')">Click Me</button>
</div>`,
`.card {
  background: #1e293b;
  padding: 2rem;
  border-radius: 12px;
  text-align: center;
  font-family: sans-serif;
  color: #e2e8f0;
  max-width: 300px;
  margin: 2rem auto;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
}
h1 { color: #3b82f6; }
button {
  background: #3b82f6;
  color: white;
  border: none;
  padding: .6rem 1.5rem;
  border-radius: 6px;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 1rem;
}
button:hover { background: #2563eb; }`,
`// Your JavaScript here
console.log('CodeForge loaded!');`
];

const code=defaults.map(s=>s);

function switchTab(i){
  code[currentTab]=editor.value;
  currentTab=i;
  editor.value=code[i];
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.getElementById('editorLabel').textContent=['HTML','CSS','JS'][i];
}

function runCode(){
  code[currentTab]=editor.value;
  const html=`<!DOCTYPE html><html><head><style>${code[1]}</style></head><body>${code[0]}<script>${code[2]}<\/script></body></html>`;
  preview.srcdoc=html;
}

function resetCode(){
  if(confirm('Reset all code?')){for(let i=0;i<3;i++)code[i]=defaults[i];editor.value=code[currentTab];runCode()}
}

function exportCode(){
  code[currentTab]=editor.value;
  const html=`<!DOCTYPE html>\n<html>\n<head>\n<style>\n${code[1]}\n</style>\n</head>\n<body>\n${code[0]}\n<script>\n${code[2]}\n<\/script>\n</body>\n</html>`;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='codeforge.html';a.click();
}

// Splitter drag
const splitter=document.getElementById('splitter');
const editorWrap=document.getElementById('editorWrap');
let dragging=false;
splitter.addEventListener('mousedown',()=>dragging=true);
document.addEventListener('mousemove',e=>{if(!dragging)return;const pct=e.clientX/innerWidth*100;editorWrap.style.flex='0 0 '+pct+'%'});
document.addEventListener('mouseup',()=>dragging=false);

// Tab key support
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();const s=editor.selectionStart;editor.value=editor.value.substring(0,s)+'  '+editor.value.substring(editor.selectionEnd);editor.selectionStart=editor.selectionEnd=s+2}
  if(e.key==='s'&&(e.ctrlKey||e.metaKey)){e.preventDefault();runCode()}
});

editor.value=code[0];
runCode();
</script>
</body>
</html>
