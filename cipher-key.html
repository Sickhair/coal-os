<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>COAL OS — Cipher Key</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000a14;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #00d4ff;
      padding: 1rem;
    }
    h1 { font-size: 0.8rem; letter-spacing: 3px; text-shadow: 0 0 20px #00d4ff; margin-bottom: 1.5rem; }
    .panel {
      width: 100%; max-width: 400px;
      background: #000d1a; border: 1px solid #00d4ff33; border-radius: 6px;
      padding: 1rem; margin-bottom: 0.75rem;
    }
    .panel-title {
      font-size: 0.55rem; letter-spacing: 3px; color: #475569;
      text-transform: uppercase; margin-bottom: 0.5rem;
    }
    .password-display {
      background: #0a1628; border: 1px solid #00d4ff33; border-radius: 4px;
      padding: 0.75rem; font-size: 1.1rem; letter-spacing: 2px;
      word-break: break-all; text-align: center; min-height: 3rem;
      display: flex; align-items: center; justify-content: center;
      color: #e2e8f0; text-shadow: 0 0 10px #00d4ff22;
    }
    .strength-bar {
      height: 3px; border-radius: 2px; margin-top: 0.5rem;
      background: #0a1628; overflow: hidden;
    }
    .strength-fill {
      height: 100%; border-radius: 2px; transition: all 0.5s;
    }
    .strength-label {
      font-size: 0.55rem; color: #475569; margin-top: 0.25rem; text-align: right;
    }
    .controls { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .controls button {
      background: transparent; border: 1px solid #00d4ff44; color: #00d4ff;
      font-family: 'Courier New', monospace; font-size: 0.7rem;
      padding: 0.3rem 0.8rem; cursor: pointer; transition: all 0.3s; border-radius: 3px;
    }
    .controls button:hover { background: #00d4ff; color: #000; }
    .slider-group { margin-bottom: 0.5rem; }
    .slider-group label {
      display: flex; justify-content: space-between; font-size: 0.7rem; color: #64748b;
    }
    .slider-group label span { color: #00d4ff; }
    input[type="range"] {
      width: 100%; margin-top: 0.25rem;
      -webkit-appearance: none; background: #0a1628; height: 4px; border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #00d4ff; cursor: pointer;
    }
    .options { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .opt { display: flex; align-items: center; gap: 0.3rem; font-size: 0.7rem; color: #64748b; }
    .opt input[type="checkbox"] { accent-color: #00d4ff; }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.3rem 0; border-bottom: 1px solid #0a1628; font-size: 0.7rem;
    }
    .history-pw { color: #475569; font-size: 0.65rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 250px; }
    .entropy { font-size: 0.6rem; color: #334155; margin-top: 0.5rem; text-align: center; }
    .back-link { margin-top: 1rem; font-size: 0.7rem; }
    .back-link a { color: #475569; text-decoration: none; }
  </style>
</head>
<body>
  <h1>◆ CIPHER KEY ◆</h1>

  <div class="panel">
    <div class="panel-title">⬡ Generated Key</div>
    <div class="password-display" id="pwDisplay">TAP GENERATE</div>
    <div class="strength-bar"><div class="strength-fill" id="strengthBar"></div></div>
    <div class="strength-label" id="strengthLabel">--</div>
    <div class="entropy" id="entropy"></div>
    <div class="controls">
      <button onclick="generate()">⟳ GENERATE</button>
      <button onclick="copyPw()">COPY</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">⬡ Configuration</div>
    <div class="slider-group">
      <label>LENGTH <span id="lenVal">16</span></label>
      <input type="range" id="length" min="4" max="64" value="16" oninput="updateLen()">
    </div>
    <div class="options">
      <div class="opt"><input type="checkbox" id="upper" checked> A-Z</div>
      <div class="opt"><input type="checkbox" id="lower" checked> a-z</div>
      <div class="opt"><input type="checkbox" id="nums" checked> 0-9</div>
      <div class="opt"><input type="checkbox" id="syms" checked> !@#$</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">⬡ History (session only)</div>
    <div id="history" style="max-height: 120px; overflow-y: auto;"></div>
  </div>

  <div class="back-link"><a href="index.html">← BACK TO COAL OS</a></div>

  <script>
    let history = [];

    function updateLen() {
      document.getElementById('lenVal').textContent = document.getElementById('length').value;
    }

    function generate() {
      const len = parseInt(document.getElementById('length').value);
      let chars = '';
      if (document.getElementById('upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (document.getElementById('lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
      if (document.getElementById('nums').checked) chars += '0123456789';
      if (document.getElementById('syms').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
      if (!chars) { chars = 'abcdefghijklmnopqrstuvwxyz'; document.getElementById('lower').checked = true; }

      const arr = new Uint32Array(len);
      crypto.getRandomValues(arr);
      let pw = '';
      for (let i = 0; i < len; i++) pw += chars[arr[i] % chars.length];

      document.getElementById('pwDisplay').textContent = pw;

      // Strength
      const pool = chars.length;
      const entropy = Math.floor(len * Math.log2(pool));
      const maxEntropy = 64 * Math.log2(94);
      const pct = Math.min(100, (entropy / maxEntropy) * 100);
      const bar = document.getElementById('strengthBar');
      bar.style.width = pct + '%';

      let strength, color;
      if (entropy < 40) { strength = 'WEAK'; color = '#ef4444'; }
      else if (entropy < 60) { strength = 'FAIR'; color = '#f59e0b'; }
      else if (entropy < 80) { strength = 'STRONG'; color = '#22c55e'; }
      else { strength = 'EXCEPTIONAL'; color = '#00d4ff'; }

      bar.style.background = color;
      document.getElementById('strengthLabel').textContent = strength;
      document.getElementById('strengthLabel').style.color = color;
      document.getElementById('entropy').textContent = `Entropy: ${entropy} bits (pool: ${pool} chars)`;

      // History
      history.unshift(pw);
      if (history.length > 10) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const el = document.getElementById('history');
      el.innerHTML = history.map((pw, i) =>
        `<div class="history-item"><span class="history-pw">${pw}</span><button onclick="navigator.clipboard.writeText('${pw.replace(/'/g, "\\'")}')" style="background:none;border:none;color:#475569;font-size:0.6rem;cursor:pointer;">COPY</button></div>`
      ).join('');
    }

    function copyPw() {
      navigator.clipboard.writeText(document.getElementById('pwDisplay').textContent);
    }

    generate();
  </script>
</body>
</html>
