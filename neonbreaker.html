<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Neon Breaker — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;overflow:hidden;font-family:'Orbitron',sans-serif;touch-action:none}
canvas{display:block}
.ov{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#0a1628,#050510);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;color:#e2e8f0;padding:1.5rem}
.ov.h{display:none}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin-bottom:.8rem;text-transform:uppercase}
.tt{font-size:1.4rem;font-weight:900;letter-spacing:2px;color:#06b6d4;text-shadow:0 0 30px #06b6d466}
.st{font-size:.5rem;color:#475569;letter-spacing:3px;margin:.4rem 0 1rem}
.bn{background:transparent;border:2px solid #06b6d4;color:#06b6d4;padding:.6rem 2rem;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all .3s}
.bn:active{background:#06b6d4;color:#050510;box-shadow:0 0 30px #06b6d444}
.sc{font-size:2rem;font-weight:900;color:#06b6d4;text-shadow:0 0 20px #06b6d444;margin:.5rem 0}
.inf{font-size:.55rem;color:#64748b;line-height:1.8}
.hint{font-size:.4rem;color:#334155;margin-top:1.2rem;letter-spacing:2px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ov" id="menu">
  <div class="brand">COAL OS</div>
  <div class="tt">💎 NEON BREAKER</div>
  <div class="st">BREAKOUT ARCADE</div>
  <div id="menuHi" style="font-size:.55rem;color:#334155;margin-bottom:.5rem"></div>
  <button class="bn" id="playBtn">PLAY</button>
  <div class="hint">DRAG PADDLE • TAP TO LAUNCH</div>
</div>
<div class="ov h" id="over">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#ef4444">GAME OVER</div>
  <div class="sc" id="fScore">0</div>
  <div class="inf" id="fStats"></div>
  <button class="bn" id="retryBtn">RETRY</button>
</div>
<div class="ov h" id="winScreen">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#22c55e">LEVEL CLEAR</div>
  <div class="sc" id="wScore">0</div>
  <button class="bn" style="border-color:#22c55e;color:#22c55e" id="nextBtn">NEXT LEVEL</button>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,paddle,ball,bricks,particles,powerups,score,lives,level,combo,running,animId,launched,highScore=0;
const COLORS=['#ef4444','#f59e0b','#22c55e','#06b6d4','#8b5cf6','#ec4899','#f97316'];

function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
addEventListener('resize',resize);resize();

function initLevel(){
  const cols=Math.min(10,Math.floor(W/50));
  const rows=Math.min(5+level,8);
  const bw=(W-40)/cols-4;
  const bh=18;
  bricks=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const hp=r<2?3:r<4?2:1;
    bricks.push({x:22+c*(bw+4),y:60+r*(bh+4),w:bw,h:bh,hp,maxHp:hp,color:COLORS[r%COLORS.length],alive:true});
  }
  paddle={x:W/2-50,y:H-40,w:100,h:12,speed:0,targetX:W/2-50};
  ball={x:W/2,y:H-54,r:6,vx:0,vy:0,speed:4+level*.5};
  launched=false;combo=0;particles=[];powerups=[];
}

function startGame(){
  resize();
  document.getElementById('menu').classList.add('h');
  document.getElementById('over').classList.add('h');
  document.getElementById('winScreen').classList.add('h');
  score=score||0;lives=3;level=level||1;running=true;
  initLevel();
  animId=requestAnimationFrame(loop);
}

function newGame(){
  level=1;score=0;startGame();
}

function addP(x,y,col,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-2,life:20+Math.random()*15,mx:35,col,sz:1.5+Math.random()*2})}

function launchBall(){
  if(launched)return;launched=true;
  const a=-Math.PI/2+(Math.random()-.5)*.6;
  ball.vx=Math.cos(a)*ball.speed;ball.vy=Math.sin(a)*ball.speed;
}

function loop(){
  if(!running)return;
  // Paddle follow
  paddle.x+=(paddle.targetX-paddle.x)*.15;
  paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));

  if(!launched){
    ball.x=paddle.x+paddle.w/2;ball.y=paddle.y-ball.r-2;
  }else{
    ball.x+=ball.vx;ball.y+=ball.vy;
    // Walls
    if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=Math.abs(ball.vx)}
    if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx)}
    if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy)}
    // Death
    if(ball.y+ball.r>H){lives--;combo=0;if(lives<=0){die();return}launched=false;ball.vx=0;ball.vy=0}
    // Paddle
    if(ball.vy>0&&ball.y+ball.r>=paddle.y&&ball.y+ball.r<=paddle.y+paddle.h&&ball.x>=paddle.x&&ball.x<=paddle.x+paddle.w){
      ball.vy=-Math.abs(ball.vy);
      const hit=(ball.x-paddle.x)/paddle.w-.5;
      ball.vx=hit*ball.speed*1.5;ball.vy=-Math.sqrt(Math.max(1,ball.speed*ball.speed-ball.vx*ball.vx));
      addP(ball.x,ball.y,'#06b6d4',3);
    }
    // Bricks
    for(const b of bricks){
      if(!b.alive)continue;
      if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
        // Determine side
        const ol=ball.x+ball.r-b.x,or2=b.x+b.w-(ball.x-ball.r),ot=ball.y+ball.r-b.y,ob=b.y+b.h-(ball.y-ball.r);
        const min=Math.min(ol,or2,ot,ob);
        if(min===ot||min===ob)ball.vy=-ball.vy;else ball.vx=-ball.vx;
        b.hp--;combo++;
        if(b.hp<=0){b.alive=false;addP(b.x+b.w/2,b.y+b.h/2,b.color,10);
          // Power-up chance
          if(Math.random()<.15)powerups.push({x:b.x+b.w/2,y:b.y+b.h/2,type:['wide','multi','life'][Math.floor(Math.random()*3)],vy:2});
        }else{addP(b.x+b.w/2,b.y+b.h/2,b.color,4)}
        score+=10*combo;
        break;
      }
    }
  }

  // Power-ups
  powerups.forEach(p=>{
    p.y+=p.vy;
    if(p.y+p.r>H){p.dead=true;return}
    if(p.x>paddle.x&&p.x<paddle.x+paddle.w&&p.y>paddle.y&&p.y<paddle.y+paddle.h){
      p.dead=true;
      if(p.type==='wide')paddle.w=Math.min(200,paddle.w+30);
      else if(p.type==='life')lives=Math.min(5,lives+1);
      else if(p.type==='multi'){ball.speed=Math.min(10,ball.speed+.5)}
      addP(p.x,p.y,'#22c55e',8);
    }
  });
  powerups=powerups.filter(p=>!p.dead);

  // Check win
  if(bricks.every(b=>!b.alive)){
    running=false;cancelAnimationFrame(animId);
    level++;if(score>highScore)highScore=score;
    document.getElementById('wScore').textContent=score;
    document.getElementById('winScreen').classList.remove('h');
    render();return;
  }

  // Particles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life--;return p.life>0});

  render();
  animId=requestAnimationFrame(loop);
}

function die(){
  running=false;cancelAnimationFrame(animId);
  if(score>highScore)highScore=score;
  document.getElementById('fScore').textContent=score;
  document.getElementById('fStats').innerHTML=`Level: ${level}<br>Lives left: ${lives}<br>Best: ${highScore}`;
  render();
  setTimeout(()=>document.getElementById('over').classList.remove('h'),500);
}

function render(){
  X.fillStyle='#050510';X.fillRect(0,0,W,H);
  // Subtle grid
  X.strokeStyle='#06b6d408';X.lineWidth=1;
  for(let x=0;x<W;x+=40){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke()}
  for(let y=0;y<H;y+=40){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke()}

  // Bricks
  bricks.forEach(b=>{
    if(!b.alive)return;
    const a=b.hp/b.maxHp;
    X.fillStyle=b.color+Math.round(a*200+55).toString(16).padStart(2,'0');
    X.fillRect(b.x,b.y,b.w,b.h);
    X.fillStyle='#ffffff22';X.fillRect(b.x,b.y,b.w,b.h*.3);
    if(b.hp>1){X.fillStyle='#fff';X.font='bold 10px Orbitron';X.textAlign='center';X.fillText(b.hp,b.x+b.w/2,b.y+b.h/2+4)}
  });

  // Paddle
  const pg=X.createLinearGradient(paddle.x,paddle.y,paddle.x,paddle.y+paddle.h);
  pg.addColorStop(0,'#06b6d4');pg.addColorStop(1,'#0891b2');
  X.fillStyle=pg;
  X.beginPath();X.moveTo(paddle.x+4,paddle.y);X.lineTo(paddle.x+paddle.w-4,paddle.y);X.arcTo(paddle.x+paddle.w,paddle.y,paddle.x+paddle.w,paddle.y+4,4);X.lineTo(paddle.x+paddle.w,paddle.y+paddle.h-4);X.arcTo(paddle.x+paddle.w,paddle.y+paddle.h,paddle.x+paddle.w-4,paddle.y+paddle.h,4);X.lineTo(paddle.x+4,paddle.y+paddle.h);X.arcTo(paddle.x,paddle.y+paddle.h,paddle.x,paddle.y+paddle.h-4,4);X.lineTo(paddle.x,paddle.y+4);X.arcTo(paddle.x,paddle.y,paddle.x+4,paddle.y,4);X.fill();
  X.shadowColor='#06b6d4';X.shadowBlur=10;X.fill();X.shadowBlur=0;

  // Ball
  X.shadowColor='#fff';X.shadowBlur=12;
  X.fillStyle='#fff';X.beginPath();X.arc(ball.x,ball.y,ball.r,0,Math.PI*2);X.fill();
  X.shadowBlur=0;

  // Power-ups
  powerups.forEach(p=>{
    const icons={wide:'↔',multi:'⚡',life:'♥'};
    X.font='14px sans-serif';X.textAlign='center';X.fillStyle='#22c55e';
    X.fillText(icons[p.type]||'?',p.x,p.y+5);
  });

  // Particles
  particles.forEach(p=>{
    const a=p.life/p.mx;X.globalAlpha=a;X.fillStyle=p.col;
    X.beginPath();X.arc(p.x,p.y,Math.max(.5,p.sz*a),0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;

  // HUD
  X.fillStyle='#e2e8f0';X.font='bold 14px Orbitron';X.textAlign='left';X.fillText('SCORE: '+score,10,25);
  X.textAlign='right';X.fillText('♥'.repeat(lives),W-10,25);
  X.fillStyle='#475569';X.font='10px Orbitron';X.textAlign='center';X.fillText('LEVEL '+level,W/2,25);
}

// Controls
C.addEventListener('mousemove',e=>{paddle.targetX=e.clientX-paddle.w/2});
C.addEventListener('touchmove',e=>{e.preventDefault();paddle.targetX=e.touches[0].clientX-paddle.w/2},{passive:false});
C.addEventListener('click',launchBall);
C.addEventListener('touchstart',e=>{e.preventDefault();if(!launched)launchBall();else paddle.targetX=e.touches[0].clientX-paddle.w/2},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space')launchBall();if(e.code==='ArrowLeft')paddle.targetX=paddle.x-30;if(e.code==='ArrowRight')paddle.targetX=paddle.x+30});

document.getElementById('playBtn').onclick=newGame;
document.getElementById('retryBtn').onclick=newGame;
document.getElementById('nextBtn').onclick=startGame;
document.getElementById('menuHi').textContent=highScore?'HIGH SCORE: '+highScore:'';
</script>
</body>
</html>
