<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Beat Forge — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Orbitron',sans-serif;color:#e2e8f0;overflow-x:hidden}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin:8px 0 4px;text-transform:uppercase}
.title{font-size:1rem;font-weight:900;color:#f97316;text-shadow:0 0 20px #f9731644;letter-spacing:2px;margin-bottom:6px}
.top-bar{display:flex;gap:10px;align-items:center;margin-bottom:8px;font-size:.6rem;flex-wrap:wrap;justify-content:center}
.bpm-group{display:flex;align-items:center;gap:6px}
.bpm-group label{color:#64748b;font-size:.55rem}
.bpm-group input{width:50px;background:#1e293b;border:1px solid #334155;color:#f97316;font-family:inherit;font-size:.7rem;text-align:center;border-radius:4px;padding:2px}
.btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:.25rem .6rem;border-radius:4px;font-family:inherit;font-size:.55rem;cursor:pointer;letter-spacing:1px}
.btn:active{background:#334155;color:#fff}
.btn.play{border-color:#f97316;color:#f97316}
.btn.active{background:#f9731622;border-color:#f97316;color:#f97316}
.swing-group{display:flex;align-items:center;gap:4px}
.swing-group input{width:50px;background:#1e293b;border:1px solid #334155;color:#94a3b8;font-family:inherit;font-size:.6rem;text-align:center;border-radius:4px;padding:2px}
.sequencer{display:flex;flex-direction:column;gap:2px;margin-bottom:10px}
.track{display:flex;align-items:center;gap:2px}
.track-label{width:min(14vw,70px);font-size:.45rem;color:#64748b;text-align:right;letter-spacing:1px;flex-shrink:0;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-label.muted{opacity:.3;text-decoration:line-through}
.step{width:min(5vw,32px);height:min(5vw,32px);background:#1e293b;border:1px solid #0f172a;border-radius:3px;cursor:pointer;transition:background .1s}
.step.on{border-color:transparent}
.step.current{box-shadow:0 0 8px rgba(255,255,255,.3)}
.vol-slider{width:40px;accent-color:#f97316;margin-left:2px}
</style>
</head>
<body>
<div class="brand">COAL OS</div>
<div class="title">🔥 BEAT FORGE</div>
<div class="top-bar">
  <button class="btn play" id="playBtn" onclick="togglePlay()">▶ PLAY</button>
  <div class="bpm-group">
    <label>BPM</label>
    <input type="number" id="bpmInput" value="120" min="60" max="200" onchange="updateBPM()">
  </div>
  <div class="swing-group">
    <label style="color:#64748b;font-size:.5rem">SWING</label>
    <input type="range" id="swingInput" min="0" max="80" value="0" oninput="swing=+this.value">
  </div>
  <button class="btn" onclick="randomize()">🎲 RANDOM</button>
  <button class="btn" onclick="clearAll()">CLEAR</button>
</div>
<div class="sequencer" id="seq"></div>
<script>
const TRACKS=[
  {name:'KICK',color:'#ef4444',freq:60,type:'sine',dec:0.3},
  {name:'SNARE',color:'#f59e0b',freq:200,type:'triangle',dec:0.15,noise:true},
  {name:'HI-HAT',color:'#22c55e',freq:800,type:'square',dec:0.08,noise:true},
  {name:'OPEN HAT',color:'#06b6d4',freq:600,type:'square',dec:0.3,noise:true},
  {name:'CLAP',color:'#ec4899',freq:300,type:'triangle',dec:0.12,noise:true},
  {name:'TOM HI',color:'#a855f7',freq:300,type:'sine',dec:0.2},
  {name:'TOM LO',color:'#8b5cf6',freq:120,type:'sine',dec:0.25},
  {name:'RIM',color:'#f97316',freq:500,type:'square',dec:0.06},
];
const STEPS=16;
const PATTERNS=4;

let grid,volumes,muted,pattern=0,bpm=120,swing=0,playing=false,currentStep=-1;
let audioCtx,masterGain;
let intervalId=null;

// Initialize
grid=[];volumes=[];muted=[];
for(let p=0;p<PATTERNS;p++){grid[p]=[];volumes[p]=[];muted[p]=[];
  for(let t=0;t<TRACKS.length;t++){grid[p][t]=new Array(STEPS).fill(false);volumes[p][t]=0.7;muted[p][t]=false}}

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();masterGain.gain.value=0.8;masterGain.connect(audioCtx.destination);
}

function playSound(track){
  if(muted[pattern][track])return;
  const t=TRACKS[track];
  const now=audioCtx.currentTime;
  const vol=volumes[pattern][track];
  
  if(t.noise){
    // Noise-based sound
    const bufSize=audioCtx.sampleRate*0.5;
    const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++)data[i]=Math.random()*2-1;
    const src=audioCtx.createBufferSource();src.buffer=buf;
    const g=audioCtx.createGain();g.gain.setValueAtTime(vol*0.5,now);g.gain.exponentialRampToValueAtTime(0.001,now+t.dec);
    const filt=audioCtx.createBiquadFilter();filt.type='highpass';filt.frequency.value=t.freq;
    src.connect(filt);filt.connect(g);g.connect(masterGain);src.start(now);src.stop(now+t.dec);
  }
  
  // Tonal component
  const osc=audioCtx.createOscillator();osc.type=t.type;osc.frequency.value=t.freq;
  const g=audioCtx.createGain();g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+t.dec);
  osc.connect(g);g.connect(masterGain);osc.start(now);osc.stop(now+t.dec+0.01);
  
  // Kick special: pitch drop
  if(track===0){osc.frequency.setValueAtTime(150,now);osc.frequency.exponentialRampToValueAtTime(40,now+0.1)}
}

function togglePlay(){
  initAudio();
  playing=!playing;
  document.getElementById('playBtn').textContent=playing?'⏸ STOP':'▶ PLAY';
  document.getElementById('playBtn').classList.toggle('active',playing);
  if(playing){currentStep=-1;tick()}
  else{clearTimeout(intervalId);currentStep=-1;renderGrid()}
}

function tick(){
  if(!playing)return;
  currentStep=(currentStep+1)%STEPS;
  // Play sounds
  for(let t=0;t<TRACKS.length;t++){if(grid[pattern][t][currentStep])playSound(t)}
  renderGrid();
  // Schedule next with swing
  const ms=60000/bpm/4;
  const swingMs=currentStep%2===0?0:swing*ms/100;
  intervalId=setTimeout(tick,ms+swingMs);
}

function updateBPM(){bpm=Math.max(60,Math.min(200,+document.getElementById('bpmInput').value))}

function toggleStep(t,s){grid[pattern][t][s]=!grid[pattern][t][s];renderGrid()}

function randomize(){
  for(let t=0;t<TRACKS.length;t++)for(let s=0;s<STEPS;s++){
    // Weighted random - kick/snare less dense
    const density=t<2?.25:t<4?.35:.15;
    grid[pattern][t][s]=Math.random()<density;
  }
  renderGrid();
}

function clearAll(){
  for(let t=0;t<TRACKS.length;t++)grid[pattern][t].fill(false);
  renderGrid();
}

function toggleMute(t){muted[pattern][t]=!muted[pattern][t];renderGrid()}

function renderGrid(){
  const el=document.getElementById('seq');el.innerHTML='';
  for(let t=0;t<TRACKS.length;t++){
    const row=document.createElement('div');row.className='track';
    // Label
    const lbl=document.createElement('div');
    lbl.className='track-label'+(muted[pattern][t]?' muted':'');
    lbl.style.color=TRACKS[t].color;
    lbl.textContent=TRACKS[t].name;
    lbl.onclick=()=>toggleMute(t);
    row.appendChild(lbl);
    // Steps
    for(let s=0;s<STEPS;s++){
      const step=document.createElement('div');
      step.className='step'+(grid[pattern][t][s]?' on':'')+(s===currentStep?' current':'');
      if(grid[pattern][t][s])step.style.background=TRACKS[t].color;
      if(s%4===0)step.style.marginLeft=s>0?'4px':'0';
      step.onclick=()=>toggleStep(t,s);
      row.appendChild(step);
    }
    // Volume
    const vol=document.createElement('input');vol.type='range';vol.className='vol-slider';vol.min=0;vol.max=100;vol.value=volumes[pattern][t]*100;
    vol.oninput=e=>{volumes[pattern][t]=e.target.value/100};
    row.appendChild(vol);
    el.appendChild(row);
  }
}

renderGrid();
</script>
</body>
</html>
