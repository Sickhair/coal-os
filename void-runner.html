<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Void Runner — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;overflow:hidden;font-family:'Orbitron',sans-serif;touch-action:none}
canvas{display:block}
.ov{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#0a1628,#050510);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;color:#e2e8f0;padding:1.5rem}
.ov.h{display:none}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin-bottom:.8rem;text-transform:uppercase}
.tt{font-size:1.3rem;font-weight:900;letter-spacing:2px;color:#3b82f6;text-shadow:0 0 30px #3b82f666}
.st{font-size:.5rem;color:#475569;letter-spacing:3px;margin:.4rem 0 1rem}
.bn{background:transparent;border:2px solid #3b82f6;color:#3b82f6;padding:.6rem 2rem;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all .3s}
.bn:active{background:#3b82f6;color:#050510}
.hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:.5rem .8rem;z-index:50;pointer-events:none;font-size:.7rem}
.sc{font-size:2rem;font-weight:900;color:#3b82f6;text-shadow:0 0 20px #3b82f644;margin:.5rem 0}
.inf{font-size:.55rem;color:#64748b;line-height:1.8}
.hint{font-size:.4rem;color:#334155;margin-top:1rem;letter-spacing:2px}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:8px;left:8px;z-index:200;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:.5rem;color:#475569;opacity:.6">← COAL OS</a>
<canvas id="c"></canvas>
<div class="hud hidden" id="hud">
  <div style="color:#3b82f6;font-weight:700" id="scoreEl">0</div>
  <div style="color:#64748b;font-size:.6rem" id="waveEl">WAVE 1</div>
  <div style="color:#ef4444" id="livesEl">♥♥♥</div>
</div>
<div class="ov" id="menu">
  <div class="brand">COAL OS</div>
  <div class="tt">🚀 VOID RUNNER</div>
  <div class="st">SPACE SHOOTER</div>
  <button class="bn" onclick="startGame()">LAUNCH</button>
  <div class="hint">TAP OR WASD TO MOVE • AUTO-FIRE</div>
</div>
<div class="ov h" id="over">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#ef4444">DESTROYED</div>
  <div class="sc" id="fScore">0</div>
  <div class="inf" id="fStats"></div>
  <button class="bn" onclick="startGame()">RETRY</button>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,player,bullets,enemies,enemyBullets,powerups,particles,stars,score,lives,wave,waveTimer,enemiesLeft,running,animId,frame,combo,keys;

function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
addEventListener('resize',resize);resize();

const ENEMY_TYPES=[
  {color:'#ef4444',hp:20,speed:1,size:12,reward:10,shoot:false},
  {color:'#f59e0b',hp:30,speed:1.5,size:14,reward:15,shoot:false},
  {color:'#a855f7',hp:40,speed:.8,size:16,reward:20,shoot:true,fireRate:90},
  {color:'#22c55e',hp:25,speed:2,size:10,reward:15,shoot:false},
  {color:'#ec4899',hp:50,speed:.6,size:18,reward:25,shoot:true,fireRate:60},
  {color:'#f97316',hp:200,speed:.3,size:30,reward:100,shoot:true,fireRate:40,boss:true},
];

function startGame(){
  resize();
  document.getElementById('menu').classList.add('h');
  document.getElementById('over').classList.add('h');
  document.getElementById('hud').classList.remove('h');
  player={x:W/2,y:H-60,w:20,h:24,speed:5,fireRate:10,fireCd:0,power:1,shield:false};
  bullets=[];enemies=[];enemyBullets=[];powerups=[];particles=[];
  score=0;lives=3;wave=0;waveTimer=0;enemiesLeft=0;running=true;frame=0;combo=0;
  keys={};stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+.5}));
  nextWave();
  animId=requestAnimationFrame(loop);
}

function nextWave(){
  wave++;combo=0;waveTimer=0;
  const isBoss=wave%5===0;
  const count=isBoss?1:3+wave*2;
  enemiesLeft=count;
  for(let i=0;i<count;i++){
    const type=isBoss?5:Math.min(4,Math.floor(Math.random()*(1+wave/3)));
    const et=ENEMY_TYPES[type];
    const e={...et,x:40+Math.random()*(W-80),y:-20-i*40,vx:(Math.random()-.5)*2,maxHp:et.hp+(wave-1)*3,fireCd:et.fireRate||9999,phase:Math.random()*Math.PI*2};
    e.hp=e.maxHp;enemies.push(e);
  }
  document.getElementById('waveEl').textContent='WAVE '+wave;
}

function addP(x,y,col,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5-1,life:20+Math.random()*15,mx:35,col,sz:1.5+Math.random()*2})}

function loop(){
  if(!running)return;
  frame++;
  
  // Input
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a'])dx=-1;
  if(keys['ArrowRight']||keys['d'])dx=1;
  if(keys['ArrowUp']||keys['w'])dy=-1;
  if(keys['ArrowDown']||keys['s'])dy=1;
  
  // Touch/mouse follow
  if(touchTarget){dx+=(touchTarget.x-player.x)*.05;dy+=(touchTarget.y-player.y)*.05}
  
  player.x+=dx*player.speed;player.y+=dy*player.speed;
  player.x=Math.max(player.w,Math.min(W-player.w,player.x));
  player.y=Math.max(20,Math.min(H-20,player.y));
  
  // Auto-fire
  player.fireCd--;
  if(player.fireCd<=0){
    player.fireCd=player.fireRate;
    if(player.power>=3){bullets.push({x:player.x-8,y:player.y-15,vy:-8,vx:-1},{x:player.x,y:player.y-15,vy:-8,vx:0},{x:player.x+8,y:player.y-15,vy:-8,vx:1})}
    else if(player.power>=2){bullets.push({x:player.x-5,y:player.y-15,vy:-8},{x:player.x+5,y:player.y-15,vy:-8})}
    else{bullets.push({x:player.x,y:player.y-15,vy:-8})}
  }
  
  // Move bullets
  bullets=bullets.filter(b=>{b.y+=b.vy;b.x+=(b.vx||0);return b.y>-10});
  
  // Move enemies
  enemies.forEach(e=>{
    e.y+=e.speed;e.phase+=.02;
    e.x+=Math.sin(e.phase)*1.5;
    e.fireCd--;
    if(e.shoot&&e.fireCd<=0&&e.y>0){
      e.fireCd=e.fireRate||90;
      const angle=Math.atan2(player.y-e.y,player.x-e.x);
      enemyBullets.push({x:e.x,y:e.y+e.size,vx:Math.cos(angle)*3,vy:Math.sin(angle)*3});
    }
  });
  enemies=enemies.filter(e=>{if(e.y>=H+50){enemiesLeft--;return false}return true});
  
  // Move enemy bullets
  enemyBullets=enemyBullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;return b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10});
  
  // Bullet-enemy collision
  bullets.forEach(b=>{
    enemies.forEach(e=>{
      if(e.hp<=0)return;
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.size+4){
        e.hp-=10;b.dead=true;addP(b.x,b.y,'#3b82f6',2);
        if(e.hp<=0){score+=e.reward*(1+combo*.1);combo++;enemiesLeft--;
          addP(e.x,e.y,e.color,12);
          // Power-up drop
          if(Math.random()<.2)powerups.push({x:e.x,y:e.y,type:['power','shield','life'][Math.floor(Math.random()*3)],vy:1.5});
        }
      }
    });
  });
  bullets=bullets.filter(b=>!b.dead);
  enemies=enemies.filter(e=>e.hp>0);
  
  // Enemy bullet-player collision
  if(!player.shield){
    enemyBullets.forEach(b=>{
      if(Math.hypot(b.x-player.x,b.y-player.y)<15){
        b.dead=true;lives--;combo=0;
        addP(player.x,player.y,'#ef4444',8);
        updateLives();
        if(lives<=0){die();return}
      }
    });
  }
  enemyBullets=enemyBullets.filter(b=>!b.dead);
  
  // Enemy-player collision
  enemies.forEach(e=>{
    if(Math.hypot(e.x-player.x,e.y-player.y)<e.size+12){
      if(player.shield){player.shield=false;e.hp=0;addP(e.x,e.y,'#06b6d4',10)}
      else{lives--;combo=0;addP(player.x,player.y,'#ef4444',8);updateLives();if(lives<=0){die();return}}
    }
  });
  
  // Power-ups
  powerups.forEach(p=>{
    p.y+=p.vy;
    if(Math.hypot(p.x-player.x,p.y-player.y)<20){
      p.dead=true;
      if(p.type==='power')player.power=Math.min(3,player.power+1);
      else if(p.type==='shield')player.shield=true;
      else if(p.type==='life'){lives=Math.min(5,lives+1);updateLives()}
      addP(p.x,p.y,'#22c55e',6);
    }
  });
  powerups=powerups.filter(p=>!p.dead&&p.y<H+20);
  
  // Particles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life--;return p.life>0});
  
  // Stars
  stars.forEach(s=>{s.y+=.5;if(s.y>H){s.y=0;s.x=Math.random()*W}});
  
  // Wave check
  if(enemies.length===0&&enemiesLeft<=0)nextWave();
  
  document.getElementById('scoreEl').textContent=Math.floor(score);
  
  render();
  animId=requestAnimationFrame(loop);
}

function die(){
  running=false;cancelAnimationFrame(animId);
  document.getElementById('fScore').textContent=Math.floor(score);
  document.getElementById('fStats').innerHTML=`Wave: ${wave}<br>Combo max: ${combo}<br>Best wave: ${wave}`;
  setTimeout(()=>document.getElementById('over').classList.remove('h'),500);
}

function updateLives(){document.getElementById('livesEl').textContent='♥'.repeat(Math.max(0,lives))}

function render(){
  // Background
  const bg=X.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#020210');bg.addColorStop(1,'#0a0a2a');
  X.fillStyle=bg;X.fillRect(0,0,W,H);
  
  // Stars
  stars.forEach(s=>{X.fillStyle='rgba(255,255,255,.4)';X.fillRect(s.x,s.y,s.s,s.s)});
  
  // Player
  X.save();X.translate(player.x,player.y);
  X.fillStyle=player.shield?'#06b6d4':'#3b82f6';X.shadowColor=player.shield?'#06b6d4':'#3b82f6';X.shadowBlur=15;
  // Ship body
  X.beginPath();X.moveTo(0,-player.h/2);X.lineTo(-player.w/2,player.h/2);X.lineTo(0,player.h/2-6);X.lineTo(player.w/2,player.h/2);X.closePath();X.fill();
  // Engine glow
  X.fillStyle='#f59e0b';X.fillRect(-4,player.h/2-4,8,6+Math.random()*4);
  // Shield
  if(player.shield){X.strokeStyle='#06b6d466';X.lineWidth=2;X.beginPath();X.arc(0,0,20,0,Math.PI*2);X.stroke()}
  X.shadowBlur=0;X.restore();
  
  // Bullets
  X.fillStyle='#3b82f6';X.shadowColor='#3b82f6';X.shadowBlur=6;
  bullets.forEach(b=>{X.fillRect(b.x-1.5,b.y-6,3,8)});X.shadowBlur=0;
  
  // Enemies
  enemies.forEach(e=>{
    X.fillStyle=e.color;X.shadowColor=e.color;X.shadowBlur=10;
    X.beginPath();X.arc(e.x,e.y,e.size,0,Math.PI*2);X.fill();
    // Inner
    X.fillStyle='#000';X.beginPath();X.arc(e.x,e.y,e.size*.6,0,Math.PI*2);X.fill();
    X.fillStyle=e.color;X.beginPath();X.arc(e.x,e.y,e.size*.3,0,Math.PI*2);X.fill();
    // HP bar
    if(e.hp<e.maxHp){
      const w=e.size*2;X.fillStyle='#333';X.fillRect(e.x-w/2,e.y-e.size-6,w,3);
      X.fillStyle=e.hp/e.maxHp>.5?'#22c55e':'#ef4444';X.fillRect(e.x-w/2,e.y-e.size-6,w*(e.hp/e.maxHp),3);
    }
    X.shadowBlur=0;
  });
  
  // Enemy bullets
  X.fillStyle='#ef4444';X.shadowColor='#ef4444';X.shadowBlur=4;
  enemyBullets.forEach(b=>{X.beginPath();X.arc(b.x,b.y,3,0,Math.PI*2);X.fill()});X.shadowBlur=0;
  
  // Power-ups
  powerups.forEach(p=>{
    const icons={power:'⚡',shield:'🛡',life:'♥'};
    X.font='16px sans-serif';X.textAlign='center';X.fillText(icons[p.type],p.x,p.y+5);
  });
  
  // Particles
  particles.forEach(p=>{
    const a=p.life/p.mx;X.globalAlpha=a;X.fillStyle=p.col;
    X.beginPath();X.arc(p.x,p.y,Math.max(.5,p.sz*a),0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;
}

// Controls
let touchTarget=null;
document.addEventListener('keydown',e=>keys[e.key]=true);
document.addEventListener('keyup',e=>keys[e.key]=false);
C.addEventListener('mousedown',e=>{touchTarget={x:e.clientX,y:e.clientY}});
C.addEventListener('mousemove',e=>{if(touchTarget)touchTarget={x:e.clientX,y:e.clientY}});
C.addEventListener('mouseup',()=>touchTarget=null);
C.addEventListener('touchstart',e=>{e.preventDefault();touchTarget={x:e.touches[0].clientX,y:e.touches[0].clientY}},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();touchTarget={x:e.touches[0].clientX,y:e.touches[0].clientY}},{passive:false});
C.addEventListener('touchend',()=>touchTarget=null);
</script>
</body>
</html>
