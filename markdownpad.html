<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MarkdownPad — Live Editor</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#f8fafc;--text2:#94a3b8;--text3:#64748b;--primary:#3b82f6;--radius:8px}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column}
    nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.5rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .logo{font-weight:700;font-size:.85rem;color:var(--primary)}.logo span{color:var(--text3);font-weight:400;font-size:.65rem}
    .editor-wrap{display:flex;flex:1;overflow:hidden}
    @media(max-width:700px){.editor-wrap{flex-direction:column}}
    .pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .pane-header{background:var(--surface);border-bottom:1px solid var(--border);padding:.3rem .75rem;font-size:.6rem;color:var(--text3);letter-spacing:1px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .pane-header button{background:none;border:1px solid var(--border);color:var(--text2);font-size:.6rem;padding:.15rem .5rem;border-radius:4px;cursor:pointer;font-family:inherit}
    .pane-header button:hover{border-color:var(--primary);color:var(--primary)}
    #editor{flex:1;background:var(--bg);color:var(--text);border:none;padding:1rem;font-family:'JetBrains Mono',monospace;font-size:.85rem;resize:none;outline:none;line-height:1.6}
    #preview{flex:1;overflow-y:auto;padding:1rem;background:#fff;color:#1a1a1a;font-size:.9rem;line-height:1.7}
    .divider{width:1px;background:var(--border);flex-shrink:0}
    @media(max-width:700px){.divider{height:1px;width:100%}}
    #preview h1{font-size:1.5rem;font-weight:700;margin:.75rem 0 .5rem;border-bottom:1px solid #e5e7eb;padding-bottom:.3rem}
    #preview h2{font-size:1.25rem;font-weight:600;margin:.75rem 0 .5rem}
    #preview h3{font-size:1.1rem;font-weight:600;margin:.5rem 0 .25rem}
    #preview p{margin:.5rem 0}
    #preview ul,#preview ol{margin:.5rem 0;padding-left:1.5rem}
    #preview li{margin:.25rem 0}
    #preview code{background:#f1f5f9;padding:.1rem .3rem;border-radius:3px;font-size:.8em;font-family:'JetBrains Mono',monospace}
    #preview pre{background:#1e293b;color:#e2e8f0;padding:1rem;border-radius:6px;overflow-x:auto;margin:.75rem 0}
    #preview pre code{background:none;color:inherit;padding:0}
    #preview blockquote{border-left:3px solid #3b82f6;padding:.5rem 1rem;margin:.75rem 0;background:#f8fafc;color:#475569}
    #preview a{color:#3b82f6;text-decoration:underline}
    #preview img{max-width:100%;border-radius:6px}
    #preview hr{border:none;border-top:1px solid #e5e7eb;margin:1rem 0}
    #preview table{border-collapse:collapse;width:100%;margin:.75rem 0}
    #preview th,#preview td{border:1px solid #e5e7eb;padding:.4rem .75rem;text-align:left;font-size:.85rem}
    #preview th{background:#f8fafc;font-weight:600}
    #preview input[type="checkbox"]{margin-right:.4rem}
  </style>
</head>
<body>
  <nav>
    <div class="logo">MarkdownPad <span>LIVE</span></div>
    <div style="display:flex;gap:.5rem">
      <button onclick="copyMd()" style="background:none;border:1px solid var(--border);color:var(--text2);font-size:.65rem;padding:.25rem .6rem;border-radius:4px;cursor:pointer">Copy HTML</button>
      <button onclick="downloadMd()" style="background:none;border:1px solid var(--border);color:var(--text2);font-size:.65rem;padding:.25rem .6rem;border-radius:4px;cursor:pointer">Download .md</button>
      <button onclick="clearEditor()" style="background:none;border:1px solid var(--border);color:var(--text2);font-size:.65rem;padding:.25rem .6rem;border-radius:4px;cursor:pointer">Clear</button>
    </div>
  </nav>
  <div class="editor-wrap">
    <div class="pane">
      <div class="pane-header">Markdown <span id="charCount">0 chars</span></div>
      <textarea id="editor" spellcheck="false" oninput="render()"># Welcome to MarkdownPad

A **live** Markdown editor that works in your browser.

## Features
- Real-time preview
- Full Markdown support
- Code syntax highlighting
- Tables, blockquotes, lists
- Download as `.md` or copy HTML
- Works offline, saves to localStorage

## Example Code
```javascript
function hello() {
  console.log("Hello from MarkdownPad!");
}
```

|---------|--------|

| Task lists | ✅ |

- [x] Add live preview
- [x] Mobile responsive
- [ ] Add themes
- [ ] Add export PDF

[Visit COAL OS](https://sickhair.github.io/coal-os/)</textarea>
    </div>
    <div class="divider"></div>
    <div class="pane">
      <div class="pane-header">Preview</div>
      <div id="preview"></div>
    </div>
  </div>
  <script>
    const editor=document.getElementById('editor');
    const preview=document.getElementById('preview');
    
    // Load saved
    const saved=localStorage.getItem('mdpad_content');
    if(saved)editor.value=saved;

    function md(text){
      let html=text;
      // Code blocks
      html=html.replace(/```(\w*)\n([\s\S]*?)```/g,(m,lang,code)=>{
        return'<pre><code>'+code.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</code></pre>';
      });
      // Inline code
      html=html.replace(/`([^`]+)`/g,'<code>$1</code>');
      // Headers
      html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>');
      html=html.replace(/^## (.+)$/gm,'<h2>$1</h2>');
      html=html.replace(/^# (.+)$/gm,'<h1>$1</h1>');
      // Bold & italic
      html=html.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
      html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
      html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');
      // Strikethrough
      html=html.replace(/~~(.+?)~~/g,'<del>$1</del>');
      // Blockquote
      html=html.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
      // HR
      html=html.replace(/^---$/gm,'<hr>');
      // Images
      html=html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
      // Links
      html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
      // Task lists
      html=html.replace(/^- \[x\] (.+)$/gm,'<div><input type="checkbox" checked disabled> $1</div>');
      html=html.replace(/^- \[ \] (.+)$/gm,'<div><input type="checkbox" disabled> $1</div>');
      // Unordered lists
      html=html.replace(/^- (.+)$/gm,'<li>$1</li>');
      html=html.replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');
      // Ordered lists
      html=html.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
      // Tables
      html=html.replace(/^\|(.+)\|$/gm,(m,row)=>{
        const cells=row.split('|').map(c=>c.trim());
        if(cells.every(c=>/^[-:]+$/.test(c)))return'__TABLE_SEP__';
        const tag=html.includes('__TABLE_SEP__')?'td':'th';
        return'<tr>'+cells.map(c=>`<${tag}>${c}</${tag}>`).join('')+'</tr>';
      });
      html=html.replace(/__TABLE_SEP__/g,'');
      html=html.replace(/(<tr>.*<\/tr>\n?)+/g,'<table>$&</table>');
      // Paragraphs
      html=html.replace(/^(?!<[a-z]|__)(.+)$/gm,(m,line)=>{
        if(line.trim())return'<p>'+line+'</p>';
        return'';
      });
      // Clean up
      html=html.replace(/<p><\/p>/g,'');
      html=html.replace(/<blockquote>(.*?)<\/blockquote>/gs,(m)=>{
        return m.replace(/<p>/g,'').replace(/<\/p>/g,'');
      });
      return html;
    }

    function render(){
      const text=editor.value;
      preview.innerHTML=md(text);
      document.getElementById('charCount').textContent=text.length+' chars';
      localStorage.setItem('mdpad_content',text);
    }

    function copyMd(){
      navigator.clipboard.writeText(preview.innerHTML);
    }
    function downloadMd(){
      const blob=new Blob([editor.value],{type:'text/markdown'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);
      a.download='document.md';a.click();
    }
    function clearEditor(){
      if(confirm('Clear all content?')){editor.value='';render()}
    }

    render();
  </script>
</body>
</html>
