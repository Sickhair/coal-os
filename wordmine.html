<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Mine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Inter',sans-serif;color:#e2e8f0;padding:.5rem}
.top{display:flex;justify-content:space-between;width:100%;max-width:400px;margin-bottom:.5rem}
.top .score{font-size:1.2rem;font-weight:800;color:#f59e0b}.top .timer{font-family:monospace;font-size:1rem;font-weight:700;color:#ef4444}.top .round{font-size:.7rem;color:#64748b}
.grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:400px;margin-bottom:.5rem}
.tile{width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;border-radius:8px;cursor:pointer;border:2px solid #334155;background:#1e293b;transition:all .1s;text-transform:uppercase}
.tile:hover{border-color:#64748b}.tile.selected{border-color:#f59e0b;background:#2a2a1a;transform:scale(1.08);color:#f59e0b}
.tile.used{opacity:.3;pointer-events:none}
.word-display{font-size:1.5rem;font-weight:800;letter-spacing:4px;min-height:40px;text-align:center;margin-bottom:.5rem;color:#94a3b8}
.found{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:400px;max-height:150px;overflow-y:auto}
.found-word{background:#1e293b;border:1px solid #334155;padding:.15rem .4rem;border-radius:3px;font-size:.65rem;font-weight:600;color:#22c55e}
.btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:.4rem 1rem;border-radius:6px;font-family:inherit;font-size:.75rem;cursor:pointer;font-weight:600;margin:.2rem}
.btn:hover{border-color:#64748b;color:#fff}.btn.primary{background:#1a3a1a;border-color:#22c55e;color:#22c55e}
.controls{display:flex;gap:.3rem;margin-bottom:.5rem}
.msg{font-size:.8rem;font-weight:700;min-height:24px;text-align:center;margin-bottom:.3rem}
.bonus{color:#f59e0b;animation:pop .4s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;color:#e2e8f0;padding:1rem}
.overlay h1{font-size:1.3rem;margin-bottom:.5rem}.overlay p{font-size:.75rem;color:#94a3b8;margin-bottom:.5rem}
.overlay button{background:transparent;border:2px solid #f59e0b;color:#f59e0b;padding:.5rem 1.5rem;border-radius:6px;font-family:inherit;font-size:.85rem;cursor:pointer;font-weight:700}
</style>
</head>
<body>
<div class="overlay" id="start">
  <h1 style="color:#f59e0b">📝 WORD MINE</h1>
  <p>Find as many words as you can from the letter grid. Tap letters in order to spell words (3+ letters). Longer words = more points!</p>
  <button onclick="startGame()">MINE</button>
</div>
<div class="overlay" id="end" style="display:none">
  <h1 style="color:#ef4444">⏰ TIME'S UP</h1>
  <p id="endMsg"></p>
  <button onclick="startGame()">PLAY AGAIN</button>
</div>

<div id="game" style="display:none">
<div class="top">
  <div class="score" id="scoreEl">0</div>
  <div class="round" id="roundEl">Round 1</div>
  <div class="timer" id="timerEl">1:30</div>
</div>
<div class="msg" id="msg"></div>
<div class="word-display" id="wordDisplay">_ _ _</div>
<div class="grid" id="grid"></div>
<div class="controls">
  <button class="btn primary" onclick="submitWord()">✓ SUBMIT</button>
  <button class="btn" onclick="clearSelection()">✕ CLEAR</button>
  <button class="btn" onclick="shuffleLetters()">🔀 SHUFFLE</button>
</div>
<div class="found" id="foundList"></div>
</div>

<script>
// Common English words for validation (expanded set)

const VOWELS='AEIOU';
const CONSONANTS='BCDFGHJKLMNPRSTVWY'; // removed rare letters
let letters=[],selected=[],foundWords=[],score,timeLeft,round,timerInterval;

function startGame(){
  document.getElementById('start').style.display='none';
  document.getElementById('end').style.display='none';
  document.getElementById('game').style.display='';
  score=0;round=1;timeLeft=90;foundWords=[];
  generateLetters();
  updateHUD();renderGrid();
  clearInterval(timerInterval);
  timerInterval=setInterval(tick,1000);
}

function generateLetters(){
  letters=[];
  // Ensure good mix: 4 vowels + 8 consonants
  for(let i=0;i<4;i++)letters.push(VOWELS[Math.floor(Math.random()*VOWELS.length)]);
  for(let i=0;i<8;i++)letters.push(CONSONANTS[Math.floor(Math.random()*CONSONANTS.length)]);
  // Shuffle
  for(let i=letters.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[letters[i],letters[j]]=[letters[j],letters[i]]}
  selected=[];clearSelection();
}

function shuffleLetters(){
  for(let i=letters.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[letters[i],letters[j]]=[letters[j],letters[i]]}
  selected=[];renderGrid();updateWordDisplay();
}

function renderGrid(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  letters.forEach((l,i)=>{
    const tile=document.createElement('div');tile.className='tile'+(selected.includes(i)?' selected':'');
    tile.textContent=l;tile.onclick=()=>toggleLetter(i);
    grid.appendChild(tile);
  });
}

function toggleLetter(i){
  if(selected.includes(i)){selected=selected.filter(x=>x!==i)}
  else{selected.push(i)}
  renderGrid();updateWordDisplay();
}

function updateWordDisplay(){
  const word=selected.map(i=>letters[i]).join('');
  document.getElementById('wordDisplay').textContent=word||'_ _ _';
}

function clearSelection(){selected=[];renderGrid();updateWordDisplay();document.getElementById('msg').textContent=''}

function submitWord(){
  const word=selected.map(i=>letters[i]).join('').toLowerCase();
  if(word.length<3){showMsg('Need 3+ letters','#ef4444');return}
  if(foundWords.includes(word)){showMsg('Already found!','#f59e0b');return}
  if(!DICT.has(word)){showMsg('Not a valid word','#ef4444');return}
  
  // Score: 3=100, 4=300, 5=600, 6+=1000+
  const pts=word.length===3?100:word.length===4?300:word.length===5?600:1000+(word.length-6)*500;
  score+=pts;foundWords.push(word);
  showMsg(`+${pts} — ${word.toUpperCase()}!`,'#22c55e');
  
  const list=document.getElementById('foundList');
  const el=document.createElement('span');el.className='found-word';el.textContent=word.toUpperCase();
  list.prepend(el);
  
  updateHUD();clearSelection();
  
  // New round every 10 words
  if(foundWords.length%10===0){round++;generateLetters();document.getElementById('roundEl').textContent='Round '+round}
}

function showMsg(text,color){const el=document.getElementById('msg');el.textContent=text;el.style.color=color}

function tick(){
  timeLeft--;
  updateHUD();
  if(timeLeft<=0){
    clearInterval(timerInterval);
    document.getElementById('game').style.display='none';
    document.getElementById('endMsg').textContent=`Words: ${foundWords.length} | Score: ${score} | Best word: ${foundWords.reduce((a,b)=>b.length>a.length?b:a,'N/A').toUpperCase()}`;
    document.getElementById('end').style.display='flex';
  }
}

function updateHUD(){
  document.getElementById('scoreEl').textContent=score;
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  const timerEl=document.getElementById('timerEl');
  timerEl.textContent=m+':'+String(s).padStart(2,'0');
  timerEl.style.color=timeLeft<=15?'#ef4444':'#f59e0b';
}
</script>
