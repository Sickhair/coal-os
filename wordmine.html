<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Word Mine — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Orbitron',sans-serif;color:#e2e8f0;overflow:hidden}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin:8px 0 4px;text-transform:uppercase}
.title{font-size:1.1rem;font-weight:900;color:#f59e0b;text-shadow:0 0 20px #f59e0b44;letter-spacing:2px;margin-bottom:6px}
.hud{display:flex;justify-content:space-between;width:min(95vw,400px);margin-bottom:8px;font-size:.65rem}
.hud .score{color:#22c55e;font-weight:700}.hud .timer{color:#ef4444;font-weight:700}.hud .round{color:#64748b}
.letters{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:min(95vw,400px);margin-bottom:12px}
.letter{width:min(12vw,48px);height:min(12vw,48px);background:#1e293b;border:2px solid #334155;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:min(7vw,28px);font-weight:900;color:#e2e8f0;cursor:pointer;transition:all .15s}
.letter:active,.letter.sel{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b;transform:scale(.92)}
.word-area{display:flex;gap:4px;justify-content:center;min-height:min(12vw,48px);margin-bottom:12px;flex-wrap:wrap;max-width:min(95vw,400px)}
.word-letter{width:min(10vw,40px);height:min(10vw,40px);background:#0f172a;border:2px solid #f59e0b44;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:min(6vw,24px);font-weight:900;color:#f59e0b}
.btns{display:flex;gap:8px;margin-bottom:10px}
.btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:.4rem 1.2rem;border-radius:6px;font-family:inherit;font-size:.6rem;font-weight:700;letter-spacing:2px;cursor:pointer}
.btn:active{background:#334155;color:#fff}
.btn.submit{border-color:#22c55e;color:#22c55e}.btn.clear{border-color:#ef4444;color:#ef4444}
.found{font-size:.55rem;color:#334155;max-width:min(95vw,400px);text-align:center;line-height:1.6;max-height:120px;overflow-y:auto;word-break:break-word}
.found span{color:#22c55e;margin:0 4px}
.ov{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#0a1628,#050510);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;color:#e2e8f0;padding:1.5rem}
.ov.h{display:none}
.sc{font-size:2rem;font-weight:900;color:#f59e0b;text-shadow:0 0 20px #f59e0b44;margin:.5rem 0}
.inf{font-size:.6rem;color:#64748b;line-height:1.8}
.bn{background:transparent;border:2px solid #f59e0b;color:#f59e0b;padding:.6rem 2rem;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:3px;cursor:pointer}
.bn:active{background:#f59e0b;color:#050510}

<body>
<div class="brand">COAL OS</div>
<div class="title">📝 WORD MINE</div>
<div class="hud">
  <span class="score" id="scoreEl">0</span>
  <span class="round" id="roundEl">ROUND 1</span>
  <span class="timer" id="timerEl">90</span>
</div>
<div class="letters" id="letters"></div>
<div class="word-area" id="wordArea"></div>
<div class="btns">
  <button class="btn clear" onclick="clearWord()">CLEAR</button>
  <button class="btn submit" onclick="submitWord()">SUBMIT</button>
</div>
<div class="found" id="foundEl"></div>

<div class="ov h" id="menu">
  <div class="brand">COAL OS</div>
  <div class="title">📝 WORD MINE</div>
  <div style="font-size:.5rem;color:#475569;margin:.5rem 0 1rem;letter-spacing:2px">WORD PUZZLE</div>
  <button class="bn" onclick="startGame()">PLAY</button>
</div>

<div class="ov h" id="over">
  <div class="brand">COAL OS</div>
  <div style="font-size:1.2rem;font-weight:900;color:#ef4444">TIME UP</div>
  <div class="sc" id="fScore">0</div>
  <div class="inf" id="fStats"></div>
  <button class="bn" onclick="startGame()">AGAIN</button>
</div>

let letters,selected,found,score,round,timeLeft,timerId,gameRunning;

function getLetters(){
  const vowels='aeiou';const cons='bcdfghjklmnpqrstvwxyz';
  const bag=[];
  // 4 vowels, 8 consonants
  for(let i=0;i<4;i++)bag.push(vowels[Math.floor(Math.random()*vowels.length)]);
  for(let i=0;i<8;i++)bag.push(cons[Math.floor(Math.random()*cons.length)]);
  return bag.sort(()=>Math.random()-.5);
}

function startGame(){
  document.getElementById('menu').classList.add('h');
  document.getElementById('over').classList.add('h');
  score=0;round=1;found=new Set();gameRunning=true;
  newRound();
}

function newRound(){
  letters=getLetters();selected=[];timeLeft=90;
  clearInterval(timerId);
  timerId=setInterval(()=>{
    timeLeft--;
    document.getElementById('timerEl').textContent=timeLeft;
    if(timeLeft<=0){clearInterval(timerId);endGame()}
  },1000);
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('roundEl').textContent='ROUND '+round;
  renderLetters();renderWord();
}

function renderLetters(){
  const el=document.getElementById('letters');el.innerHTML='';
  letters.forEach((l,i)=>{
    const d=document.createElement('div');d.className='letter'+(selected.includes(i)?' sel':'');
    d.textContent=l.toUpperCase();d.onclick=()=>selectLetter(i);el.appendChild(d);
  });
}

function selectLetter(i){
  if(!gameRunning||selected.includes(i))return;
  selected.push(i);renderLetters();renderWord();
}

function clearWord(){selected=[];renderLetters();renderWord()}

function getWord(){return selected.map(i=>letters[i]).join('')}

function submitWord(){
  if(!gameRunning||selected.length<3)return;
  const word=getWord().toLowerCase();
  if(word.length<3)return;
  if(found.has(word)){clearWord();return}
  if(WORDS.has(word)){
    found.add(word);
    const pts=word.length===3?10:word.length===4?25:word.length===5?50:word.length>=6?100:0;
    score+=pts;round++;
    document.getElementById('foundEl').innerHTML+='<span>'+word.toUpperCase()+' +'+pts+'</span> ';
    document.getElementById('scoreEl').textContent=score;
    // Check if all letters used
    if(found.size>=5||round>5){round=1;newRound()}
    else{clearWord()}
  }else{clearWord()}
}

function renderWord(){
  const el=document.getElementById('wordArea');el.innerHTML='';
  selected.forEach(i=>{
    const d=document.createElement('div');d.className='word-letter';d.textContent=letters[i].toUpperCase();
    el.appendChild(d);
  });
}

function endGame(){
  gameRunning=false;
  document.getElementById('fScore').textContent=score;
  document.getElementById('fStats').innerHTML='Words found: '+found.size+'<br>Longest: '+(found.size?[...found].sort((a,b)=>b.length-a.length)[0].toUpperCase():'none');
  document.getElementById('over').classList.remove('h');
}

document.addEventListener('keydown',e=>{
  if(!gameRunning)return;
  if(e.key==='Enter')submitWord();
  if(e.key==='Backspace'){selected.pop();renderLetters();renderWord()}
  if(e.key==='Escape')clearWord();
  const k=e.key.toLowerCase();
  if(k.length===1&&letters.includes(k)){
    const idx=letters.indexOf(k);
    // Find next available index with this letter
    let start=0;
    while(selected.includes(idx)&&start<letters.length){start++}
    if(!selected.includes(idx))selectLetter(idx);
  }
});
</script>
