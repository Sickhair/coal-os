<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Realm Conquest — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;overflow:hidden;font-family:'Orbitron',sans-serif;color:#e2e8f0;touch-action:none}
canvas{display:block}
.ov{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#0a1628,#050510);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;padding:1.5rem}
.ov.h{display:none}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin-bottom:.8rem;text-transform:uppercase}
.tt{font-size:1.2rem;font-weight:900;letter-spacing:2px}
.st{font-size:.5rem;color:#475569;letter-spacing:3px;margin:.4rem 0 1rem}
.bn{background:transparent;border:2px solid currentColor;color:inherit;padding:.6rem 2rem;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:3px;cursor:pointer}
.bn:active{filter:brightness(1.5)}
.hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:.4rem .6rem;z-index:50;pointer-events:none;font-size:.55rem}
.actions{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:60}
.abtn{padding:4px 12px;background:#1e293b88;border:1px solid #33415566;color:#94a3b8;border-radius:4px;font-family:inherit;font-size:.5rem;cursor:pointer}
.abtn:active{background:#334155;color:#fff}
.abtn.active{border-color:#22c55e;color:#22c55e}
.abtn.dis{opacity:.3;cursor:not-allowed}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:8px;left:8px;z-index:200;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:.5rem;color:#475569;opacity:.6">← COAL OS</a>
<canvas id="c"></canvas>
<div class="hud hidden" id="hud">
  <div style="color:#3b82f6" id="turnEl">TURN 1</div>
  <div style="color:#f59e0b" id="goldEl">Gold: 20</div>
  <div style="color:#ef4444" id="phaseEl">YOUR TURN</div>
</div>
<div class="actions h" id="actions">
  <button class="abtn" id="recruitBtn" onclick="recruit()">+ RECRUIT (10g)</button>
  <button class="abtn" id="fortifyBtn" onclick="fortify()">FORTIFY (5g)</button>
  <button class="abtn" id="endBtn" onclick="endTurn()">END TURN ▶</button>
</div>
<div class="ov" id="menu">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#22c55e">🗺 REALM CONQUEST</div>
  <div class="st">HEX STRATEGY</div>
  <button class="bn" style="color:#22c55e;border-color:#22c55e" onclick="startGame()">CONQUER</button>
</div>
<div class="ov h" id="over">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#ef4444">DEFEATED</div>
  <div style="font-size:1.5rem;font-weight:900;color:#ef4444;margin:.5rem 0" id="fScore">0</div>
  <div style="font-size:.55rem;color:#64748b" id="fStats"></div>
  <button class="bn" style="color:#ef4444;border-color:#ef4444" onclick="startGame()">RETRY</button>
</div>
<div class="ov h" id="winScreen">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#22c55e">🏆 CONQUERED!</div>
  <button class="bn" style="color:#22c55e;border-color:#22c55e" onclick="startGame()">AGAIN</button>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const S=28; // hex size
const R=7; // map radius
let W,H,map,playerCity,aiCity,armies,turn,phase,selected,gold,income,running,animId;

function startGame(){
  resize();
  cancelAnimationFrame(animId);
  document.getElementById('menu').classList.add('h');
  document.getElementById('over').classList.add('h');
  document.getElementById('winScreen').classList.add('h');
  document.getElementById('hud').classList.remove('h');
  document.getElementById('actions').classList.remove('h');
  
  turn=1;phase='player';gold=20;income=5;selected=null;running=true;
  
  // Generate hex map
  map=new Map();
  for(let q=-R;q<=R;q++)for(let r=-R;r<=R;r++){
    if(Math.abs(q+r)<=R){
      const terrain=Math.random()<.2?'mountain':Math.random()<.15?'forest':'plain';
      map.set(q+','+r,{q,r,terrain,owner:null,fortified:false,army:0});
    }
  }
  
  // Place player city (top-left area)
  playerCity={q:-4,r:-1};
  map.get(playerCity.q+','+playerCity.r).owner='player';
  map.get(playerCity.q+','+playerCity.r).army=5;
  // Give player some starting territory
  getNeighbors(playerCity.q,playerCity.r).forEach(n=>{const h=map.get(n);if(h){h.owner='player';h.army=1}});
  
  // Place AI city (bottom-right area)
  aiCity={q:4,r:1};
  map.get(aiCity.q+','+aiCity.r).owner='ai';
  map.get(aiCity.q+','+aiCity.r).army=5;
  getNeighbors(aiCity.q,aiCity.r).forEach(n=>{const h=map.get(n);if(h){h.owner='ai';h.army=2}});
  
  animId=requestAnimationFrame(renderLoop);
}

function getNeighbors(q,r){
  return[[q+1,r],[q-1,r],[q,r+1],[q,r-1],[q+1,r-1],[q-1,r+1]];
}

function hexToPixel(q,r){
  const x=S*1.5*q+W/2;
  const y=S*Math.sqrt(3)*(r+q/2)+H/2;
  return{x,y};
}

function pixelToHex(px,py){
  const x=px-W/2,y=py-H/2;
  const q=(2/3*x)/S;
  const r=(-1/3*x+Math.sqrt(3)/3*y)/S;
  // Round to nearest hex
  let rx=Math.round(q),ry=Math.round(r),rz=Math.round(-q-r);
  const dq=Math.abs(rx-q),dy=Math.abs(ry-r),dz=Math.abs(rz-(-q-r));
  if(dq>dy&&dq>dz)rx=-ry-rz;else if(dy>dz)ry=-rx-rz;
  return{q:rx,r:ry};
}

function drawHex(cx,cy,size,fill,stroke,lw=1){
  X.beginPath();
  for(let i=0;i<6;i++){
    const a=Math.PI/3*i;
    const px=cx+size*Math.cos(a),py=cy+size*Math.sin(a);
    if(i===0)X.moveTo(px,py);else X.lineTo(px,py);
  }
  X.closePath();
  if(fill){X.fillStyle=fill;X.fill()}
  if(stroke){X.strokeStyle=stroke;X.lineWidth=lw;X.stroke()}
}

function recruit(){
  if(phase!=='player'||gold<10||!selected)return;
  const h=map.get(selected.q+','+selected.r);
  if(!h||h.owner!=='player')return;
  gold-=10;h.army+=3;
  updateHUD();
}

function fortify(){
  if(phase!=='player'||gold<5||!selected)return;
  const h=map.get(selected.q+','+selected.r);
  if(!h||h.owner!=='player')return;
  gold-=5;h.fortified=true;
  updateHUD();
}

function endTurn(){
  if(phase!=='player')return;
  phase='ai';
  updateHUD();
  setTimeout(aiTurn,500);
}

function aiTurn(){
  // AI logic: recruit, expand, attack
  const aiHexes=[...map.values()].filter(h=>h.owner==='ai');
  
  // Recruit at city
  const city=map.get(aiCity.q+','+aiCity.r);
  if(city&&turn%2===0)city.army+=2;
  
  // Move armies toward player territory
  aiHexes.forEach(h=>{
    if(h.army<=1)return;
    const neighbors=getNeighbors(h.q,h.r).map(n=>map.get(n)).filter(Boolean);
    // Find best target: player hexes first, then neutral
    let target=null;
    const playerN=neighbors.filter(n=>n.owner==='player');
    const neutralN=neighbors.filter(n=>!n.owner);
    if(playerN.length)target=playerN.reduce((a,b)=>a.army<b.army?a:b);
    else if(neutralN.length)target=neutralN[0];
    
    if(target){
      if(target.owner==='player'){
        const atk=h.army-1;const def=target.army+(target.fortified?2:0);
        const chance=Math.min(.9,atk/(atk+def+.1));
        if(Math.random()<chance){target.owner='ai';target.army=Math.max(1,atk-def);target.fortified=false;h.army=1}
        else{h.army=Math.max(1,h.army-Math.floor(def*.5))}
      }else{
        target.owner='ai';target.army=Math.min(h.army-1,3);h.army=1;
      }
    }
  });
  
  // Check win/loss
  if(!map.get(playerCity.q+','+playerCity.r)||map.get(playerCity.q+','+playerCity.r).owner==='ai'){
    running=false;
    document.getElementById('fScore').textContent='Turn '+turn;
    document.getElementById('fStats').innerHTML='AI conquered your city';
    document.getElementById('over').classList.remove('h');return;
  }
  
  turn++;phase='player';
  // Income
  const playerHexes=[...map.values()].filter(h=>h.owner==='player');
  income=playerHexes.length;gold+=income;
  updateHUD();
}

function onClick(px,py){
  if(phase!=='player'||!running)return;
  const hex=pixelToHex(px,py);
  const h=map.get(hex.q+','+hex.r);
  if(!h)return;
  
  if(selected&&h.owner==='player'){
    // Try to move/attack from selected to here
    // Actually, select this hex
    selected=h;
  }else if(h.owner==='player'){
    selected=h;
  }else if(selected&&h.owner!=='player'){
    // Attack
    const neighbors=getNeighbors(selected.q,selected.r);
    if(neighbors.some(n=>n[0]===hex.q&&n[1]===hex.r)){
      const atk=selected.army-1;
      if(atk<=0)return;
      const def=h.army+(h.fortified?2:0);
      const chance=Math.min(.9,atk/(atk+def+.1));
      if(Math.random()<chance){
        h.owner='player';h.army=Math.max(1,atk-def);h.fortified=false;selected.army=1;
        // Check win
        if(h.q===aiCity.q&&h.r===aiCity.r){
          running=false;
          document.getElementById('winScreen').classList.remove('h');
        }
      }else{
        selected.army=Math.max(1,selected.army-Math.floor(def*.5));
      }
      selected=null;
    }
  }else{
    selected=h;
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById('turnEl').textContent='TURN '+turn;
  document.getElementById('goldEl').textContent='Gold: '+gold+' (+'+income+')';
  document.getElementById('phaseEl').textContent=phase==='player'?'YOUR TURN':'AI THINKING...';
  document.getElementById('recruitBtn').classList.toggle('dis',gold<10||!selected||selected?.owner!=='player');
  document.getElementById('fortifyBtn').classList.toggle('dis',gold<5||!selected||selected?.owner!=='player');
}

function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
addEventListener('resize',resize);resize();

function renderLoop(){
  if(!running){return}
  X.fillStyle='#050510';X.fillRect(0,0,W,H);
  
  map.forEach(h=>{
    const{x,y}=hexToPixel(h.q,h.r);
    let fill='#0f172a';
    if(h.terrain==='mountain')fill='#1e1e2e';
    if(h.terrain==='forest')fill='#0a1a0a';
    
    if(h.owner==='player')fill=h.fortified?'#1e3a5f':'#1e293b';
    else if(h.owner==='ai')fill=h.fortified?'#5f1e1e':'#3b1e1e';
    
    drawHex(x,y,S-1,fill,'#1e293b',1);
    
    // Selected highlight
    if(selected&&selected.q===h.q&&selected.r===h.r){
      drawHex(x,y,S-1,null,'#3b82f6',2);
    }
    
    // City marker
    if(h.q===playerCity.q&&h.r===playerCity.r){
      X.fillStyle='#3b82f6';X.font='bold 14px sans-serif';X.textAlign='center';X.fillText('🏰',x,y+5);
    }
    if(h.q===aiCity.q&&h.r===aiCity.r){
      X.fillStyle='#ef4444';X.font='bold 14px sans-serif';X.textAlign='center';X.fillText('🏰',x,y+5);
    }
    
    // Terrain icons
    if(!h.owner){
      if(h.terrain==='mountain'){X.fillStyle='#475569';X.font='12px sans-serif';X.textAlign='center';X.fillText('⛰',x,y+4)}
      if(h.terrain==='forest'){X.fillStyle='#22c55e44';X.font='12px sans-serif';X.textAlign='center';X.fillText('🌲',x,y+4)}
    }
    
    // Army count
    if(h.army>0){
      const col=h.owner==='player'?'#3b82f6':h.owner==='ai'?'#ef4444':'#64748b';
      X.fillStyle=col;X.font='bold 10px Orbitron';X.textAlign='center';X.fillText(h.army,x,y+(h.q===playerCity.q||h.q===aiCity.q?-8:4));
    }
    
    // Fortified
    if(h.fortified){X.fillStyle='#f59e0b44';X.font='8px sans-serif';X.textAlign='center';X.fillText('🛡',x,y+S*.6)}
  });
  
  animId=requestAnimationFrame(renderLoop);
}

C.addEventListener('click',e=>{const r=C.getBoundingClientRect();onClick(e.clientX-r.left,e.clientY-r.top)});
C.addEventListener('touchstart',e=>{e.preventDefault();const r=C.getBoundingClientRect();const t=e.touches[0];onClick(t.clientX-r.left,t.clientY-r.top)},{passive:false});
</script>
</body>
</html>
