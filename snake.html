<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Serpent — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;overflow:hidden;font-family:'Orbitron',sans-serif;touch-action:none}
canvas{display:block}
.overlay{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#0a1628,#050510);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;color:#e2e8f0;padding:1.5rem}
.overlay.hidden{display:none}
.brand{font-size:.45rem;letter-spacing:4px;color:#334155;margin-bottom:1rem;text-transform:uppercase}
.title{font-size:1.5rem;font-weight:900;letter-spacing:3px;color:#22c55e;text-shadow:0 0 30px #22c55e66;margin-bottom:.3rem}
.subtitle{font-size:.55rem;color:#475569;letter-spacing:3px;margin-bottom:1rem}
.play-btn{background:transparent;border:2px solid #22c55e;color:#22c55e;padding:.7rem 2.5rem;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:3px;cursor:pointer;margin-top:1rem;transition:all .3s}
.play-btn:hover,.play-btn:active{background:#22c55e;color:#050510;box-shadow:0 0 40px #22c55e44}
.hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:.6rem .8rem;z-index:50;pointer-events:none}
.hud-score{font-size:1rem;font-weight:800;color:#22c55e;text-shadow:0 0 10px #22c55e44}
.hud-best{font-size:.65rem;color:#334155}
.controls-hint{font-size:.45rem;color:#334155;margin-top:1.5rem;letter-spacing:2px}
.dpad{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(3,52px);gap:4px;z-index:60}
.dpad .d{background:#22c55e11;border:1px solid #22c55e33;color:#22c55e88;display:flex;align-items:center;justify-content:center;font-size:1.2rem;border-radius:8px;cursor:pointer;font-weight:700}
.dpad .d:active{background:#22c55e33;color:#22c55e}
.dpad .empty{background:transparent;border:none}
.score-display{font-size:2rem;font-weight:900;color:#22c55e;text-shadow:0 0 20px #22c55e44;margin:.5rem 0}
.stats{font-size:.6rem;color:#64748b;line-height:1.8}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:8px;left:8px;z-index:200;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:.5rem;color:#475569;opacity:.6">← COAL OS</a>
<canvas id="c"></canvas>
<div class="hud hidden" id="hud">
  <div class="hud-score" id="scoreEl">0</div>
  <div class="hud-best" id="bestEl">BEST: 0</div>
</div>

<div class="overlay" id="menuScreen">
  <div class="brand">COAL OS</div>
  <div class="title">🐍 NEON<br>SERPENT</div>
  <div class="subtitle">CLASSIC ARCADE</div>
  <div id="menuHigh" style="font-size:.6rem;color:#334155;margin-bottom:.5rem"></div>
  <button class="play-btn" onclick="startGame()">PLAY</button>
  <div class="controls-hint">SWIPE • D-PAD • ARROW KEYS</div>
</div>

<div class="overlay hidden" id="deathScreen">
  <div class="brand">COAL OS</div>
  <div class="title" style="color:#ef4444">GAME OVER</div>
  <div class="score-display" id="finalScore">0</div>
  <div class="stats" id="finalStats"></div>
  <button class="play-btn" style="border-color:#22c55e;color:#22c55e" onclick="startGame()">RETRY</button>
</div>

<div class="dpad hidden" id="dpad">
  <div class="empty"></div><div class="d" onclick="setDir(0,-1)">▲</div><div class="empty"></div>
  <div class="d" onclick="setDir(-1,0)">◄</div><div class="empty"></div><div class="d" onclick="setDir(1,0)">►</div>
  <div class="empty"></div><div class="d" onclick="setDir(0,1)">▼</div><div class="empty"></div>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const GRID=18;
let cols,rows,snake,dir,nextDir,food,score,best=0,speed,running,frame,intervalId,particles,trail,animId=0;
// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();return this}}

function resize(){
  C.width=window.innerWidth;C.height=window.innerHeight;
  cols=Math.floor(C.width/GRID);rows=Math.floor(C.height/GRID);
}
window.addEventListener('resize',resize);resize();

function startGame(){
  resize();
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('deathScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('dpad').classList.remove('hidden');
  
  const cx=Math.floor(cols/2),cy=Math.floor(rows/2);
  snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;speed=120;running=true;frame=0;particles=[];trail=[];
  placeFood();
  updateHUD();
  clearInterval(intervalId);
  cancelAnimationFrame(animId);
  intervalId=setInterval(tick,speed);
  animId=requestAnimationFrame(renderLoop);
}

function placeFood(){
  do{food={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function setDir(x,y){
  if(nextDir.x===-x&&nextDir.y===-y)return;
  nextDir={x,y};
}

function tick(){
  if(!running)return;
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  
  // Wall collision
  if(head.x<0||head.x>=cols||head.y<0||head.y>=rows){die();return}
  // Self collision
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){die();return}
  
  snake.unshift(head);
  
  // Trail effect
  trail.push({x:head.x,y:head.y,life:15});
  
  if(head.x===food.x&&head.y===food.y){
    score+=10;
    addParticles(food.x*GRID+GRID/2,food.y*GRID+GRID/2,'#f59e0b',12);
    placeFood();
    // Speed up
    if(speed>50){speed-=2;clearInterval(intervalId);intervalId=setInterval(tick,speed)}
  }else{
    snake.pop();
  }
  updateHUD();
}

function addParticles(x,y,color,n){
  for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-2,life:20+Math.random()*15,maxLife:35,color,size:2+Math.random()*3});
}

function die(){
  running=false;clearInterval(intervalId);
  addParticles(snake[0].x*GRID+GRID/2,snake[0].y*GRID+GRID/2,'#ef4444',20);
  // Keep rendering death particles
  let df=0;
  function deathLoop(){
    df++;frame++;
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life--});
    particles=particles.filter(p=>p.life>0);
    trail=trail.filter(t=>{t.life--;return t.life>0});
    // Re-render
    X.fillStyle='#050510';X.fillRect(0,0,C.width,C.height);
    X.strokeStyle='#22c55e08';X.lineWidth=1;
    for(let x=0;x<=cols;x++){X.beginPath();X.moveTo(x*GRID,0);X.lineTo(x*GRID,rows*GRID);X.stroke()}
    for(let y=0;y<=rows;y++){X.beginPath();X.moveTo(0,y*GRID);X.lineTo(cols*GRID,y*GRID);X.stroke()}
    snake.forEach((s,i)=>{X.fillStyle=i===0?'#ef4444':'#22c55e';X.globalAlpha=1-i/snake.length*.5;X.beginPath();X.roundRect(s.x*GRID+2,s.y*GRID+2,GRID-4,GRID-4,3);X.fill()});
    X.globalAlpha=1;
    particles.forEach(p=>{const a=p.life/p.maxLife;X.fillStyle=p.color;X.globalAlpha=a;X.beginPath();X.arc(p.x,p.y,p.size*a,0,Math.PI*2);X.fill()});
    X.globalAlpha=1;
    if(df<30)requestAnimationFrame(deathLoop);
    else{
      if(score>best)best=score;
      document.getElementById('menuHigh').textContent=best>0?'HIGH SCORE: '+best:'';
      document.getElementById('finalScore').textContent=score;
      document.getElementById('finalStats').innerHTML=`Length: ${snake.length}<br>Best: ${best}`;
      setTimeout(()=>document.getElementById('deathScreen').classList.remove('hidden'),200);
    }
  }
  requestAnimationFrame(deathLoop);
}

function updateHUD(){
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('bestEl').textContent='BEST: '+best;
}

function renderLoop(){
  frame++;
  X.fillStyle='#050510';X.fillRect(0,0,C.width,C.height);
  
  // Grid
  X.strokeStyle='#22c55e08';X.lineWidth=1;
  for(let x=0;x<=cols;x++){X.beginPath();X.moveTo(x*GRID,0);X.lineTo(x*GRID,rows*GRID);X.stroke()}
  for(let y=0;y<=rows;y++){X.beginPath();X.moveTo(0,y*GRID);X.lineTo(cols*GRID,y*GRID);X.stroke()}
  
  // Trail
  trail=trail.filter(t=>{t.life--;return t.life>0});
  trail.forEach(t=>{
    const a=t.life/15*.15;
    X.fillStyle=`rgba(34,197,94,${a})`;
    X.fillRect(t.x*GRID+1,t.y*GRID+1,GRID-2,GRID-2);
  });
  
  // Snake body
  snake.forEach((s,i)=>{
    const a=1-i/snake.length*.5;
    const r=i===0?GRID/2-1:GRID/2-2;
    if(i===0){
      // Head
      X.shadowColor='#22c55e';X.shadowBlur=15;
      X.fillStyle='#22c55e';
      X.beginPath();X.roundRect(s.x*GRID+1,s.y*GRID+1,GRID-2,GRID-2,5);X.fill();
      // Eyes
      X.fillStyle='#050510';
      const ex1=s.x*GRID+GRID*.3,ex2=s.x*GRID+GRID*.7,ey=s.y*GRID+GRID*.35;
      X.beginPath();X.arc(ex1,ey,2.5,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(ex2,ey,2.5,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
    }else{
      // Body segment with gradient fade
      const g=X.createRadialGradient(s.x*GRID+GRID/2,s.y*GRID+GRID/2,0,s.x*GRID+GRID/2,s.y*GRID+GRID/2,GRID/2);
      g.addColorStop(0,`rgba(34,197,94,${a})`);g.addColorStop(1,`rgba(34,197,94,${a*.3})`);
      X.fillStyle=g;
      X.beginPath();X.roundRect(s.x*GRID+2,s.y*GRID+2,GRID-4,GRID-4,3);X.fill();
    }
  });
  
  // Food
  if(food){
    const fx=food.x*GRID+GRID/2,fy=food.y*GRID+GRID/2;
    const pulse=.8+Math.sin(frame*.1)*.2;
    X.shadowColor='#f59e0b';X.shadowBlur=20;
    X.fillStyle='#f59e0b';
    X.beginPath();X.arc(fx,fy,(GRID/2-2)*pulse,0,Math.PI*2);X.fill();
    // Inner glow
    X.fillStyle='#fbbf24';
    X.beginPath();X.arc(fx,fy,(GRID/4)*pulse,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
  }
  
  // Particles
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life--;
    const a=p.life/p.maxLife;
    X.fillStyle=p.color;X.globalAlpha=a;
    X.beginPath();X.arc(p.x,p.y,p.size*a,0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;
  particles=particles.filter(p=>p.life>0);
  
  if(running)animId=requestAnimationFrame(renderLoop);
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'||e.key==='w')setDir(0,-1);
  if(e.key==='ArrowDown'||e.key==='s')setDir(0,1);
  if(e.key==='ArrowLeft'||e.key==='a')setDir(-1,0);
  if(e.key==='ArrowRight'||e.key==='d')setDir(1,0);
});

// Swipe
let touchStart=null;
C.addEventListener('touchstart',e=>{touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY}},{passive:true});
C.addEventListener('touchend',e=>{
  if(!touchStart)return;
  const dx=e.changedTouches[0].clientX-touchStart.x,dy=e.changedTouches[0].clientY-touchStart.y;
  if(Math.abs(dx)>Math.abs(dy)){setDir(dx>0?1:-1,0)}else{setDir(0,dy>0?1:-1)}
  touchStart=null;
});

// Show high score on menu
document.getElementById('menuHigh').textContent=best>0?`HIGH SCORE: ${best}`:'';
</script>
</body>
</html>
