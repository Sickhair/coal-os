<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Mahjong — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Orbitron',sans-serif;color:#e2e8f0;overflow-x:hidden}
a.back{position:fixed;top:8px;left:8px;z-index:200;text-decoration:none;font-size:.5rem;color:#475569;opacity:.6}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin:8px 0 4px;text-transform:uppercase;text-align:center}
.title{font-size:.85rem;font-weight:900;color:#f43f5e;text-shadow:0 0 20px #f43f5e44;letter-spacing:2px;margin-bottom:6px}
.hud{display:flex;gap:12px;align-items:center;margin-bottom:8px;font-size:.48rem;flex-wrap:wrap;justify-content:center}
.status{font-size:.45rem;color:#94a3b8;min-height:14px;text-align:center;margin-bottom:6px}
.board{position:relative;width:min(96vw,540px);height:min(65vh,420px);background:#0a1628;border:2px solid #1e293b;border-radius:8px;margin-bottom:8px;overflow:hidden}
.tile{position:absolute;width:36px;height:48px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .15s;border:1.5px solid #334155;background:#1e293b;box-shadow:1px 1px 3px #000}
.tile:hover{border-color:#64748b;z-index:10}
.tile.selected{border-color:#f59e0b;box-shadow:0 0 10px #f59e0b44;z-index:11}
.tile.matched{animation:pop .3s forwards}
.tile.free{border-color:#475569}
.tile.blocked{opacity:.5;cursor:not-allowed}
@keyframes pop{to{transform:scale(1.3);opacity:0}}
.actions{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:6px}
.btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:.25rem .6rem;border-radius:4px;font-family:inherit;font-size:.45rem;cursor:pointer}
.btn:hover{background:#334155;color:#e2e8f0}
.btn.primary{border-color:#f43f5e;color:#f43f5e}
.overlay{position:fixed;inset:0;background:#050510ee;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.overlay h2{font-size:.8rem;margin-bottom:8px}
.overlay p{font-size:.5rem;color:#64748b;margin-bottom:16px;text-align:center;padding:0 20px}
</style>
</head>
<body>
<a class="back" href="index.html">← COAL OS</a>
<div class="brand">COAL OS</div>
<div class="title">🀄 MAHJONG</div>
<div class="hud">
  <span style="color:#f43f5e" id="pairsEl">PAIRS: 0/0</span>
  <span style="color:#334155">|</span>
  <span style="color:#64748b" id="tilesEl">Tiles: 0</span>
  <span style="color:#334155">|</span>
  <span style="color:#475569" id="timeEl">0:00</span>
</div>
<div class="status" id="status">Match free tiles with the same symbol</div>
<div class="board" id="board"></div>
<div class="actions">
  <button class="btn" onclick="shuffleTiles()">🔀 SHUFFLE</button>
  <button class="btn" onclick="hintMove()">💡 HINT</button>
  <button class="btn primary" onclick="newGame()">NEW GAME</button>
</div>

<div class="overlay" id="menu">
  <h2 style="color:#f43f5e">🀄 MAHJONG</h2>
  <p>Match pairs of free tiles (not covered, with an open side). Clear the board to win!</p>
  <button class="btn primary" onclick="newGame()" style="font-size:.7rem;padding:.5rem 2rem">PLAY</button>
</div>

<div class="overlay" id="winScreen" style="display:none">
  <h2 id="winTitle" style="color:#22c55e">🎉 CLEARED!</h2>
  <p id="winInfo"></p>
  <button class="btn primary" onclick="newGame()" style="font-size:.7rem;padding:.5rem 2rem">AGAIN</button>
</div>

<script>
// Tile symbols - 36 unique, need pairs (72 tiles total for classic layout)
const SYMBOLS=['🀇','🀈','🀉','🀊','🀋','🀌','🀍','🀎','🀏','🀙','🀚','🀛','🀜','🀝','🀞','🀟','🀠','🀡','🌸','🌺','🍁','🍀','⭐','🌙','🔥','💎','🎯','🎪','🌸','🐯','🐉','🐦','🐟','🌊','⛰','🏯'];

let tiles,selected,timer,interval,gameOver;

// Classic turtle layout (simplified): layers of tiles
function buildLayout(){
  // Layer 0: 6x8 = 48 tiles (but we need matching pairs)
  // Layer 1: 4x6 = 24 tiles
  // Layer 2: 2x4 = 8 tiles
  // Layer 3: 1x2 = 2 tiles
  // Total: 82 — but needs even count. Let's do 72 (36 pairs)
  
  const positions=[];
  // Layer 0: 5 rows x 8 cols = 40
  for(let r=0;r<5;r++)for(let c=0;c<8;c++)positions.push({layer:0,row:r,col:c});
  // Layer 1: 3 rows x 6 cols = 18
  for(let r=0;r<3;r++)for(let c=0;c<6;c++)positions.push({layer:1,row:r+1,col:c+1});
  // Layer 2: 1 row x 4 cols = 4
  for(let c=0;c<4;c++)positions.push({layer:2,row:2,col:c+2});
  // That's 62 — need even. Add 10 more on layer 0 sides
  // Side tiles
  positions.push({layer:0,row:1,col:-1}); // left wing
  positions.push({layer:0,row:2,col:-1});
  positions.push({layer:0,row:3,col:-1});
  positions.push({layer:0,row:1,col:8});
  positions.push({layer:0,row:2,col:8});
  positions.push({layer:0,row:3,col:8});
  // Layer 3 top
  positions.push({layer:3,row:2,col:3});
  positions.push({layer:3,row:2,col:4});
  // 2 more
  positions.push({layer:0,row:0,col:-1});
  positions.push({layer:0,row:4,col:-1});
  // Total: 72
  
  return positions;
}

function newGame(){
  document.getElementById('menu').style.display='none';
  document.getElementById('winScreen').style.display='none';
  
  const positions=buildLayout();
  const totalTiles=positions.length; // 72
  const numPairs=totalTiles/2; // 36
  
  // Create pairs
  const syms=SYMBOLS.slice(0,numPairs);
  const deck=shuffle([...syms,...syms]);
  
  tiles=positions.map((pos,i)=>({
    id:i,
    symbol:deck[i],
    layer:pos.layer,
    row:pos.row,
    col:pos.col,
    alive:true
  }));
  
  selected=null;gameOver=false;timer=0;
  clearInterval(interval);
  interval=setInterval(()=>{
    if(gameOver)return;
    timer++;
    document.getElementById('timeEl').textContent=formatTime(timer);
  },1000);
  
  render();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function formatTime(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60}

function isFree(tile){
  if(!tile.alive)return false;
  // Not covered by a tile on a higher layer at same position
  const covered=tiles.some(t=>t.alive&&t.layer===tile.layer+1&&Math.abs(t.row-tile.row)<1&&Math.abs(t.col-tile.col)<1);
  if(covered)return false;
  
  // Has open left or right side on same layer
  const blockedLeft=tiles.some(t=>t.alive&&t.layer===tile.layer&&t.col===tile.col-1&&t.row===tile.row);
  const blockedRight=tiles.some(t=>t.alive&&t.layer===tile.layer&&t.col===tile.col+1&&t.row===tile.row);
  
  return !blockedLeft||!blockedRight;
}

function getFreeTiles(){
  return tiles.filter(t=>t.alive&&isFree(t));
}

function clickTile(id){
  if(gameOver)return;
  const tile=tiles[id];
  if(!tile.alive||!isFree(tile))return;
  
  if(selected===null){
    selected=id;
    render();return;
  }
  
  if(selected===id){
    selected=null;render();return;
  }
  
  const sel=tiles[selected];
  if(sel.symbol===tile.symbol){
    // Match!
    sel.alive=false;tile.alive=false;
    selected=null;
    
    const alive=tiles.filter(t=>t.alive).length;
    if(alive===0){
      gameOver=true;clearInterval(interval);
      document.getElementById('winTitle').textContent='🎉 CLEARED!';
      document.getElementById('winTitle').style.color='#22c55e';
      document.getElementById('winInfo').textContent=`Completed in ${formatTime(timer)}`;
      document.getElementById('winScreen').style.display='flex';
    }else if(getFreeTiles().length===0){
      gameOver=true;clearInterval(interval);
      document.getElementById('winTitle').textContent='💀 STUCK!';
      document.getElementById('winTitle').style.color='#ef4444';
      document.getElementById('winInfo').textContent='No free tiles left. Try shuffle next time!';
      document.getElementById('winScreen').style.display='flex';
    }
    
    render();
  }else{
    selected=id;
    render();
  }
}

function shuffleTiles(){
  if(gameOver)return;
  const alive=tiles.filter(t=>t.alive);
  const syms=shuffle(alive.map(t=>t.symbol));
  alive.forEach((t,i)=>t.symbol=syms[i]);
  selected=null;render();
  document.getElementById('status').textContent='Tiles shuffled!';
}

function hintMove(){
  if(gameOver)return;
  const free=getFreeTiles();
  for(let i=0;i<free.length;i++){
    for(let j=i+1;j<free.length;j++){
      if(free[i].symbol===free[j].symbol){
        selected=free[i].id;
        render();
        document.getElementById('status').textContent=`Hint: ${free[i].symbol} at two locations`;
        return;
      }
    }
  }
  document.getElementById('status').textContent='No matches available — try shuffle!';
}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  
  const bw=board.clientWidth||540;
  const bh=board.clientHeight||420;
  
  // Compute layout bounds
  const alive=tiles.filter(t=>t.alive);
  const minCol=Math.min(...tiles.map(t=>t.col));
  const maxCol=Math.max(...tiles.map(t=>t.col));
  const minRow=Math.min(...tiles.map(t=>t.row));
  const maxRow=Math.max(...tiles.map(t=>t.row));
  
  const colSpan=maxCol-minCol+1;
  const rowSpan=maxRow-minRow+1;
  const tileW=36;const tileH=48;
  const scaleX=(bw-20)/(colSpan*tileW/2+tileW);
  const scaleY=(bh-20)/(rowSpan*tileH/2+tileH);
  const scale=Math.min(scaleX,scaleY,1.2);
  
  const ox=(bw-colSpan*tileW*scale)/2;
  const oy=(bh-rowSpan*tileH*scale)/2;
  
  // Sort by layer for z-index
  const sorted=[...tiles].filter(t=>t.alive).sort((a,b)=>a.layer-b.layer||a.row-b.row);
  
  sorted.forEach((t,idx)=>{
    const d=document.createElement('div');
    d.className='tile';
    
    const free=isFree(t);
    if(free)d.classList.add('free');
    else d.classList.add('blocked');
    if(selected===t.id)d.classList.add('selected');
    
    const x=ox+(t.col-minCol)*tileW*scale/2;
    const y=oy+(t.row-minRow)*tileH*scale/2-t.layer*4;
    
    d.style.left=x+'px';
    d.style.top=y+'px';
    d.style.width=(tileW*scale)+'px';
    d.style.height=(tileH*scale)+'px';
    d.style.fontSize=(18*scale)+'px';
    d.style.zIndex=t.layer*100+idx;
    
    d.textContent=t.symbol;
    d.onclick=()=>clickTile(t.id);
    board.appendChild(d);
  });
  
  const pairs=Math.floor((tiles.length-alive.length)/2);
  const totalPairs=tiles.length/2;
  document.getElementById('pairsEl').textContent=`PAIRS: ${pairs}/${totalPairs}`;
  document.getElementById('tilesEl').textContent=`Tiles: ${alive.length}`;
}

addEventListener('resize',()=>{if(tiles)render()});
</script>
</body>
</html>
