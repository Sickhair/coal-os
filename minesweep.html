<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Mine Sweep — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Orbitron',sans-serif;color:#e2e8f0;overflow:hidden}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin-bottom:6px;text-transform:uppercase}
.top{display:flex;gap:.6rem;align-items:center;margin-bottom:8px}
.top .mines{font-size:.7rem;color:#ef4444;font-weight:700}
.btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:.2rem .5rem;border-radius:4px;font-family:inherit;font-size:.5rem;cursor:pointer}
.btn:active{background:#334155;color:#fff}
.mode-toggle{display:flex;gap:4px;margin-bottom:8px}
.mode-btn{padding:.3rem .8rem;border-radius:4px;font-size:.55rem;font-family:inherit;cursor:pointer;border:1px solid #334155;background:#1e293b;color:#94a3b8}
.mode-btn.active{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b}
.grid{display:inline-grid;gap:2px;background:#1e293b33;border:2px solid #1e293b;border-radius:4px;padding:2px}
.cell{width:min(8vw,36px);height:min(8vw,36px);display:flex;align-items:center;justify-content:center;font-size:min(5vw,18px);font-weight:700;cursor:pointer;border-radius:2px;transition:background .1s}
.cell.hidden{background:#1e293b}.cell.hidden:hover{background:#2a3a4a}
.cell.revealed{background:#0f172a}.cell.mine{background:#ef444433}
.cell.flagged{background:#1e293b}
.diff{display:flex;gap:6px;margin-bottom:8px}
.diff .btn.active{border-color:#f59e0b;color:#f59e0b}
.status{font-size:.6rem;margin-top:8px;min-height:18px;font-weight:700}
.status.win{color:#22c55e}.status.lose{color:#ef4444}
</style>
</head>
<body>
<div class="brand">COAL OS</div>
<div class="diff">
  <button class="btn active" onclick="newGame(9,9,10)">EASY</button>
  <button class="btn" onclick="newGame(13,13,30)">MED</button>
  <button class="btn" onclick="newGame(16,16,50)">HARD</button>
</div>
<div class="top">
  <span class="mines" id="mineCount">💎 10</span>
  <button class="btn" onclick="newGame(cols,rows,mines)">NEW</button>
</div>
<div class="mode-toggle">
  <button class="mode-btn active" id="digBtn" onclick="setMode('dig')">⛏ DIG</button>
  <button class="mode-btn" id="flagBtn" onclick="setMode('flag')">🚩 FLAG</button>
</div>
<div class="grid" id="grid"></div>
<div class="status" id="status"></div>
<script>
const NUM_COLORS=['','#3b82f6','#22c55e','#ef4444','#8b5cf6','#f59e0b','#06b6d4','#e2e8f0','#64748b'];
let cols=9,rows=9,mines=10,board,revealed,flagged,gameOver,mode='dig',firstClick;

function newGame(c,r,m){
  cols=c;rows=r;mines=m;gameOver=false;firstClick=true;
  board=[];revealed=[];flagged=[];
  for(let y=0;y<rows;y++){board[y]=[];revealed[y]=[];flagged[y]=[];for(let x=0;x<cols;x++){board[y][x]=0;revealed[y][x]=false;flagged[y][x]=false}}
  document.getElementById('status').textContent='';document.getElementById('status').className='status';
  document.getElementById('mineCount').textContent='💎 '+mines;
  render();
}

function placeMines(sx,sy){
  let placed=0;
  while(placed<mines){
    const x=Math.floor(Math.random()*cols),y=Math.floor(Math.random()*rows);
    if(board[y][x]===-1||Math.abs(x-sx)<=1&&Math.abs(y-sy)<=1)continue;
    board[y][x]=-1;placed++;
  }
  // Numbers
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    if(board[y][x]===-1)continue;
    let c=0;
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
      const nx=x+dx,ny=y+dy;
      if(ny>=0&&ny<rows&&nx>=0&&nx<cols&&board[ny][nx]===-1)c++;
    }
    board[y][x]=c;
  }
}

function dig(x,y){
  if(gameOver||flagged[y][x]||revealed[y][x])return;
  if(firstClick){firstClick=false;placeMines(x,y)}
  if(board[y][x]===-1){
    revealed[y][x]=true;gameOver=true;
    // Reveal all mines
    for(let yy=0;yy<rows;yy++)for(let xx=0;xx<cols;xx++)if(board[yy][xx]===-1)revealed[yy][xx]=true;
    document.getElementById('status').textContent='BOOM!';document.getElementById('status').className='status lose';
    render();return;
  }
  flood(x,y);
  checkWin();render();
}

function flood(x,y){
  if(x<0||x>=cols||y<0||y>=rows||revealed[y][x]||flagged[y][x])return;
  revealed[y][x]=true;
  if(board[y][x]===0)for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)flood(x+dx,y+dy);
}

function toggleFlag(x,y){
  if(gameOver||revealed[y][x])return;
  flagged[y][x]=!flagged[y][x];
  const fc=flagged.flat().filter(Boolean).length;
  document.getElementById('mineCount').textContent='💎 '+(mines-fc);
  render();
}

function checkWin(){
  let unrevealed=0;
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++)if(!revealed[y][x])unrevealed++;
  if(unrevealed===mines){
    gameOver=true;
    document.getElementById('status').textContent='CLEAR!';document.getElementById('status').className='status win';
  }
}

function setMode(m){
  mode=m;
  document.getElementById('digBtn').classList.toggle('active',m==='dig');
  document.getElementById('flagBtn').classList.toggle('active',m==='flag');
}

function render(){
  const el=document.getElementById('grid');
  el.style.gridTemplateColumns='repeat('+cols+',min(8vw,36px))';
  let html='';
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    let cls='cell ',content='';
    if(revealed[y][x]){
      if(board[y][x]===-1){cls+='mine';content='💎'}
      else{cls+='revealed';if(board[y][x]>0)content='<span style="color:'+NUM_COLORS[board[y][x]]+'">'+board[y][x]+'</span>'}
    }else if(flagged[y][x]){cls+='flagged';content='🚩'}
    else cls+='hidden';
    html+='<div class="'+cls+'" data-x="'+x+'" data-y="'+y+'">'+content+'</div>';
  }
  el.innerHTML=html;
  // Click handlers
  el.querySelectorAll('.cell').forEach(cell=>{
    const cx=+cell.dataset.x,cy=+cell.dataset.y;
    cell.onclick=()=>{mode==='dig'?dig(cx,cy):toggleFlag(cx,cy)};
    cell.oncontextmenu=e=>{e.preventDefault();toggleFlag(cx,cy)};
  });
}

// Long press to flag on mobile
let lpt=null;
document.addEventListener('touchstart',e=>{
  const cell=e.target.closest('.cell');
  if(!cell)return;
  lpt=setTimeout(()=>{
    toggleFlag(+cell.dataset.x,+cell.dataset.y);lpt=null;
  },400);
},{passive:true});
document.addEventListener('touchend',()=>{if(lpt){clearTimeout(lpt);lpt=null}},{passive:true});
document.addEventListener('touchmove',()=>{if(lpt){clearTimeout(lpt);lpt=null}},{passive:true});

newGame(9,9,10);
</script>
</body>
</html>
