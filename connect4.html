<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Connect Four — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Orbitron',sans-serif;color:#e2e8f0;overflow:hidden}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin:6px 0 2px;text-transform:uppercase}
.title{font-size:.9rem;font-weight:900;color:#ef4444;text-shadow:0 0 20px #ef444444;letter-spacing:2px;margin-bottom:4px}
.status{font-size:.6rem;margin-bottom:6px;min-height:18px;text-align:center}
.status .p1{color:#ef4444}.status .p2{color:#f59e0b}
.board{display:inline-grid;grid-template-columns:repeat(7,1fr);gap:3px;background:#1e293b;border:3px solid #334155;border-radius:8px;padding:6px;margin-bottom:8px}
.cell{width:min(11vw,46px);height:min(11vw,46px);background:#0f172a;border-radius:50%;cursor:pointer;transition:all .15s;border:2px solid #1e293b}
.cell:hover{border-color:#475569}
.cell.p1{background:#ef4444;border-color:#ef4444;box-shadow:0 0 12px #ef444444}
.cell.p2{background:#f59e0b;border-color:#f59e0b;box-shadow:0 0 12px #f59e0b44}
.cell.win{animation:pulse .6s infinite alternate}
@keyframes pulse{from{box-shadow:0 0 8px #fff}to{box-shadow:0 0 20px #fff}}
.cell.preview{border-color:#ef444466}
.actions{display:flex;gap:6px}
.btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:.3rem .8rem;border-radius:4px;font-family:inherit;font-size:.5rem;cursor:pointer}
.btn:active{background:#334155;color:#fff}
.score{font-size:.5rem;color:#64748b;margin-bottom:4px}

.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin-bottom:6px;text-transform:uppercase;font-family:"Orbitron",sans-serif;text-align:center}
.back-link{position:fixed;top:8px;left:8px;z-index:200;text-decoration:none;font-family:"Orbitron",sans-serif;font-size:.5rem;letter-spacing:1px;color:#475569;opacity:.6;transition:opacity .2s}
.back-link:hover{opacity:1;color:#e2e8f0}
</style>
</head>
<body>
<a class="back-link" href="index.html">← COAL OS</a>
<div class="brand">COAL OS</div>
<div class="title">🔴 CONNECT FOUR</div>
<div class="score" id="scoreEl">You: 0 | AI: 0</div>
<div class="status" id="status"><span class="p1">YOUR TURN</span></div>
<div class="board" id="board"></div>
<div class="actions">
  <button class="btn" onclick="resetGame()">NEW GAME</button>
</div>
<script>
const ROWS=6,COLS=7;
let board,turn,gameOver,winCells,pScore=0,aScore;

function resetGame(){
  board=Array(ROWS).fill(null).map(()=>Array(COLS).fill(0));
  turn=1;gameOver=false;winCells=[];
  render();updateStatus();
}

function drop(col){
  if(gameOver||turn!==1)return;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r][col]===0){
      board[r][col]=1;
      if(checkWin(1)){gameOver=true;pScore++;winCells=getWinCells(1);render();updateStatus();updateScore();return}
      if(board[0].every((_,c)=>board[0][c]!==0)){gameOver=true;render();updateStatus();return}
      turn=2;render();updateStatus();
      setTimeout(aiMove,400);
      return;
    }
  }
}

function aiMove(){
  if(gameOver)return;
  // AI: check if can win, then block, then center preference
  let col=-1;
  // Win?
  col=findWin(2);
  // Block?
  if(col<0)col=findWin(1);
  // Center
  if(col<0&&board[ROWS-1][3]===0)col=3;
  // Random valid
  if(col<0){const valid=[];for(let c=0;c<COLS;c++)if(board[0][c]===0)valid.push(c);col=valid[Math.floor(Math.random()*valid.length)]}
  
  for(let r=ROWS-1;r>=0;r--){
    if(board[r][col]===0){
      board[r][col]=2;
      if(checkWin(2)){gameOver=true;aScore++;winCells=getWinCells(2);render();updateStatus();updateScore();return}
      turn=1;render();updateStatus();
      return;
    }
  }
}

function findWin(player){
  for(let c=0;c<COLS;c++){
    for(let r=ROWS-1;r>=0;r--){
      if(board[r][c]!==0)break;
      board[r][c]=player;
      if(checkWin(player)){board[r][c]=0;return c}
      board[r][c]=0;
    }
  }return-1;
}

function checkWin(p){
  // Horizontal
  for(let r=0;r<ROWS;r++)for(let c=0;c<=COLS-4;c++){
    if(board[r][c]===p&&board[r][c+1]===p&&board[r][c+2]===p&&board[r][c+3]===p)return true;
  }
  // Vertical
  for(let r=0;r<=ROWS-4;r++)for(let c=0;c<COLS;c++){
    if(board[r][c]===p&&board[r+1][c]===p&&board[r+2][c]===p&&board[r+3][c]===p)return true;
  }
  // Diagonal \
  for(let r=0;r<=ROWS-4;r++)for(let c=0;c<=COLS-4;c++){
    if(board[r][c]===p&&board[r+1][c+1]===p&&board[r+2][c+2]===p&&board[r+3][c+3]===p)return true;
  }
  // Diagonal /
  for(let r=3;r<ROWS;r++)for(let c=0;c<=COLS-4;c++){
    if(board[r][c]===p&&board[r-1][c+1]===p&&board[r-2][c+2]===p&&board[r-3][c+3]===p)return true;
  }
  return false;
}

function getWinCells(p){
  const cells=[];
  const check=function(r1,c1,r2,c2,r3,c3,r4,c4){
    if(board[r1]?.[c1]===p&&board[r2]?.[c2]===p&&board[r3]?.[c3]===p&&board[r4]?.[c4]===p)
      cells.push(`${r1},${c1}`,`${r2},${c2}`,`${r3},${c3}`,`${r4},${c4}`);
  };
  for(let r=0;r<ROWS;r++)for(let c=0;c<=COLS-4;c++)check(r,c,r,c+1,r,c+2,r,c+3);
  for(let r=0;r<=ROWS-4;r++)for(let c=0;c<COLS;c++)check(r,c,r+1,c,r+2,c,r+3,c);
  for(let r=0;r<=ROWS-4;r++)for(let c=0;c<=COLS-4;c++)check(r,c,r+1,c+1,r+2,c+2,r+3,c+3);
  for(let r=3;r<ROWS;r++)for(let c=0;c<=COLS-4;c++)check(r,c,r-1,c+1,r-2,c+2,r-3,c+3);
  return[...new Set(cells)];
}

function updateStatus(){
  const el=document.getElementById('status');
  if(gameOver){
    if(winCells.length){
      const winner=board[winCells[0].split(',')[0]][winCells[0].split(',')[1]];
      el.innerHTML=winner===1?'<span class="p1">🏆 YOU WIN!</span>':'<span class="p2">AI WINS!</span>';
    }else el.textContent="DRAW!";
  }else{
    el.innerHTML=turn===1?'<span class="p1">YOUR TURN</span>':'<span class="p2">AI THINKING...</span>';
  }
}

function updateScore(){document.getElementById('scoreEl').textContent=`You: ${pScore} | AI: ${aScore}`}

function render(){
  const el=document.getElementById('board');el.innerHTML='';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const d=document.createElement('div');d.className='cell';
    if(board[r][c]===1)d.classList.add('p1');
    if(board[r][c]===2)d.classList.add('p2');
    if(winCells.includes(`${r},${c}`))d.classList.add('win');
    if(turn===1&&!gameOver&&board[r][c]===0&&r===0||turn===1&&!gameOver&&r>0&&board[r-1][c]!==0&&board[r][c]===0)d.onclick=()=>drop(c);
    el.appendChild(d);
  }
}

aScore=0;resetGame();
</script>
</body>
</html>
