<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>COAL OS — Decision Wheel</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000a14;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#00d4ff;padding:1rem}
    h1{font-size:.8rem;letter-spacing:3px;text-shadow:0 0 20px #00d4ff;margin-bottom:1rem}
    canvas{display:block;border-radius:50%;box-shadow:0 0 30px #00d4ff11}
    .result{font-size:1.2rem;color:#e2e8f0;margin-top:1rem;text-align:center;min-height:2rem;text-shadow:0 0 10px #00d4ff22}
    .panel{width:100%;max-width:360px;background:#000d1a;border:1px solid #00d4ff33;border-radius:6px;padding:.75rem;margin-top:1rem}
    .panel-title{font-size:.55rem;letter-spacing:3px;color:#475569;text-transform:uppercase;margin-bottom:.4rem}
    textarea{width:100%;background:#0a1628;border:1px solid #00d4ff33;color:#00d4ff;font-family:'Courier New',monospace;font-size:.75rem;padding:.5rem;outline:none;border-radius:3px;resize:vertical}
    textarea:focus{border-color:#00d4ff}
    .controls{display:flex;gap:.5rem;margin-top:.5rem;justify-content:center}
    .controls button{background:transparent;border:1px solid #00d4ff44;color:#00d4ff;font-family:'Courier New',monospace;font-size:.65rem;padding:.4rem .8rem;cursor:pointer;border-radius:3px}
    .controls button:hover{background:#00d4ff22}
    .controls button.spin{border-color:#00d4ff;font-size:.75rem;padding:.5rem 1.5rem}
    .back-link{margin-top:1rem;font-size:.7rem}
    .back-link a{color:#475569;text-decoration:none}
  
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin-bottom:6px;text-transform:uppercase;font-family:'Orbitron',sans-serif;text-align:center}
.back-link{position:fixed;top:8px;left:8px;z-index:200;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:1px;color:#475569;opacity:.6;transition:opacity .2s}
.back-link:hover{opacity:1;color:#e2e8f0}

</style>
</head>
<body>
<a class="back-link" href="index.html">← COAL OS</a>
  <h1>◆ DECISION WHEEL ◆</h1>
  <canvas id="wheel" width="280" height="280"></canvas>
  <div class="result" id="result">Tap SPIN</div>
  <div class="panel">
    <div class="panel-title">⬡ Options (one per line)</div>
    <textarea id="options" rows="4">Pizza
Tacos
Sushi
Burgers
Thai
Indian</textarea>
    <div class="controls">
      <button class="spin" onclick="spin()">🌀 SPIN</button>
    </div>
  </div>
  <div class="back-link"><a href="index.html">← BACK</a></div>

  <script>
    const canvas=document.getElementById('wheel');
    const ctx=canvas.getContext('2d');
    const CX=140,CY=140,R=130;
    const colors=['#00d4ff','#f43f5e','#8b5cf6','#22c55e','#f59e0b','#06b6d4','#ec4899','#3b82f6','#ef4444','#a855f7'];
    let rotation=0,spinning=false,spinEnd=0;

    function getOptions(){return document.getElementById('options').value.split('\n').filter(s=>s.trim())}

    function draw(rot=0){
      const opts=getOptions();
      const n=opts.length;
      if(!n)return;
      const slice=Math.PI*2/n;
      ctx.clearRect(0,0,280,280);
      for(let i=0;i<n;i++){
        const start=i*slice+rot;
        ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,start,start+slice);ctx.closePath();
        ctx.fillStyle=colors[i%colors.length]+'33';ctx.fill();
        ctx.strokeStyle=colors[i%colors.length];ctx.lineWidth=1;ctx.stroke();
        // Text
        ctx.save();ctx.translate(CX,CY);ctx.rotate(start+slice/2);
        ctx.fillStyle='#e2e8f0';ctx.font='bold 11px Courier New';ctx.textAlign='right';
        const txt=opts[i].length>12?opts[i].slice(0,12)+'…':opts[i];
        ctx.fillText(txt,R-10,4);
        ctx.restore();
      }
      // Center dot
      ctx.beginPath();ctx.arc(CX,CY,8,0,Math.PI*2);ctx.fillStyle='#000a14';ctx.fill();ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;ctx.stroke();
      // Pointer
      ctx.beginPath();ctx.moveTo(CX+R+5,CY-6);ctx.lineTo(CX+R+15,CY);ctx.lineTo(CX+R+5,CY+6);ctx.closePath();
      ctx.fillStyle='#00d4ff';ctx.shadowColor='#00d4ff';ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
    }

    function spin(){
      if(spinning)return;
      const opts=getOptions();
      if(opts.length<2)return;
      spinning=true;
      document.getElementById('result').textContent='Spinning...';
      const spinAmount=Math.random()*Math.PI*2+Math.PI*10;
      const duration=3000;
      const start=performance.now();
      const startRot=rotation;
      function animate(now){
        const elapsed=now-start;
        const t=Math.min(elapsed/duration,1);
        const ease=1-Math.pow(1-t,3);
        rotation=startRot+spinAmount*ease;
        draw(rotation);
        if(t<1){requestAnimationFrame(animate)}
        else{
          spinning=false;
          const norm=rotation%(Math.PI*2);
          const pointerAngle=Math.PI*2-norm;
          const slice=Math.PI*2/opts.length;
          const idx=Math.floor(pointerAngle/slice)%opts.length;
          document.getElementById('result').textContent='→ '+opts[idx]+' ←';
        }
      }
      requestAnimationFrame(animate);
    }

    draw();
    document.getElementById('options').addEventListener('input',()=>{if(!spinning)draw()});
  </script>
</body>
</html>
