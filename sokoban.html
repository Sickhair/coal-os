<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Sokoban â€” COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Orbitron',sans-serif;color:#e2e8f0;overflow:hidden}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin-bottom:6px;text-transform:uppercase}
.top{display:flex;gap:.8rem;align-items:center;margin-bottom:8px;font-size:.6rem}
.top .lvl{color:#a855f7;font-weight:700}
.btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:.25rem .6rem;border-radius:4px;font-family:inherit;font-size:.55rem;cursor:pointer;letter-spacing:1px}
.btn:active{background:#334155;color:#fff}
.board{display:inline-grid;gap:1px;background:#1e293b33;border:2px solid #1e293b;border-radius:6px;padding:2px}
.cell{display:flex;align-items:center;justify-content:center;font-size:min(7vw,32px)}
.cell.floor{background:#0f172a}.cell.wall{background:#1e293b;border-radius:2px}.cell.target{background:#0f172a66;border:2px dashed #a855f744}
.cell.player{background:#0f172a}.cell.box{background:#0f172a}.cell.box-done{background:#0f172a}
.stats{font-size:.5rem;color:#475569;margin-top:8px;letter-spacing:1px}
.dpad{display:grid;grid-template-columns:repeat(3,50px);grid-template-rows:repeat(3,50px);gap:4px;margin-top:10px}
.dpad .d{background:#1e293b;border:1px solid #334155;color:#64748b;display:flex;align-items:center;justify-content:center;font-size:1.1rem;border-radius:8px;cursor:pointer}
.dpad .d:active{background:#a855f733;color:#a855f7}
.dpad .e{background:transparent;border:none}
</style>
</head>
<body>
<div class="brand">COAL OS</div>
<div class="top">
  <span class="lvl" id="lvlLabel">LEVEL 1</span>
  <button class="btn" onclick="undo()">â†© UNDO</button>
  <button class="btn" onclick="resetLevel()">RESET</button>
</div>
<div class="board" id="board"></div>
<div class="stats" id="stats">Moves: 0</div>
<div class="dpad">
  <div class="e"></div><div class="d" onclick="move(0,-1)">â–˛</div><div class="e"></div>
  <div class="d" onclick="move(-1,0)">â—„</div><div class="e"></div><div class="d" onclick="move(1,0)">â–ş</div>
  <div class="e"></div><div class="d" onclick="move(0,1)">â–Ľ</div><div class="e"></div>
</div>
<script>
const LEVELS=[
['#####','#   #','#@$.#','#   #','#####'],
['######','#    #','# #@ #','# $* #','# .$ #','#    #','######'],
['  ####','###  #','# $  #','# .#@#','# $  #','###  #','  ####'],
['######','#  . #','# #$ #','# $. #','#  @ #','######'],
[' #####',' #   #',' # # ##','## .$. #','#  @$. #','#   ####','#####'],
['####  ','# .###','# $ .#','# $# #','# @  #','######'],
['  ####','  #  #','  # .#','### $##','#  $@#','#  $.#','# .  #','######'],
['#######','#     #','# .$. #','## #$##',' # @ #',' #   #',' #####'],
[' ######','##    #','# @$$.#','#  .# #','#  $  #','## .###',' #####'],
['########','#  ... #','# $$$$@#','#      #','########'],
];

const WALL='#',FLOOR=' ',PLAYER='@',BOX='$',TARGET='.',BOX_DONE='*',PLAYER_ON='+';
let grid,history,moves,currentLevel=0;

function loadLevel(n){
  currentLevel=n;grid=LEVELS[n].map(r=>r.split(''));history=[];moves=0;
  document.getElementById('lvlLabel').textContent='LEVEL '+(n+1);
  render();
}

function findPlayer(){
  for(let y=0;y<grid.length;y++)for(let x=0;x<grid[y].length;x++)
    if(grid[y][x]===PLAYER||grid[y][x]===PLAYER_ON)return{x,y};
  return null;
}

function move(dx,dy){
  const p=findPlayer();if(!p)return;
  const nx=p.x+dx,ny=p.y+dy;
  if(!inB(nx,ny))return;
  const target=grid[ny][nx];
  // Push box
  if(target===BOX||target===BOX_DONE){
    const bx=nx+dx,by=ny+dy;
    if(!inB(bx,by))return;
    const behind=grid[by][bx];
    if(behind!==FLOOR&&behind!==TARGET)return;
    history.push(grid.map(r=>[...r]));
    grid[by][bx]=behind===TARGET?BOX_DONE:BOX;
    grid[ny][nx]=target===BOX_DONE?PLAYER_ON:PLAYER;
    grid[p.y][p.x]=grid[p.y][p.x]===PLAYER_ON?TARGET:FLOOR;
  }else if(target===FLOOR||target===TARGET){
    history.push(grid.map(r=>[...r]));
    grid[ny][nx]=target===TARGET?PLAYER_ON:PLAYER;
    grid[p.y][p.x]=grid[p.y][p.x]===PLAYER_ON?TARGET:FLOOR;
  }else return;
  moves++;
  document.getElementById('stats').textContent='Moves: '+moves;
  render();
  checkWin();
}

function inB(x,y){return y>=0&&y<grid.length&&x>=0&&x<grid[y].length}

function checkWin(){
  for(let y=0;y<grid.length;y++)for(let x=0;x<grid[y].length;x++)
    if(grid[y][x]==='$'||grid[y][x]==='+')return;
  // All boxes on targets
  setTimeout(()=>{
    if(currentLevel<LEVELS.length-1)loadLevel(currentLevel+1);
    else{document.getElementById('stats').textContent='ALL LEVELS COMPLETE! Moves: '+moves}
  },500);
}

function undo(){
  if(!history.length)return;
  grid=history.pop();moves--;document.getElementById('stats').textContent='Moves: '+moves;render();
}

function resetLevel(){loadLevel(currentLevel)}

function render(){
  const el=document.getElementById('board');
  const maxW=Math.max(...grid.map(r=>r.length));
  el.style.gridTemplateColumns='repeat('+maxW+',min(9vw,40px))';
  let html='';
  for(let y=0;y<grid.length;y++){
    for(let x=0;x<maxW;x++){
      const c=x<grid[y].length?grid[y][x]:WALL;
      let cls='cell ',content='';
      if(c===WALL){cls+='wall';content='đź§±'}
      else if(c===FLOOR){cls+='floor'}
      else if(c===TARGET){cls+='target';content='â—‡'}
      else if(c===PLAYER||c===PLAYER_ON){cls+='player';content='đź§‘'}
      else if(c===BOX){cls+='box';content='đź“¦'}
      else if(c===BOX_DONE){cls+='box-done';content='âś…'}
      else cls+='floor';
      html+='<div class="'+cls+'">'+content+'</div>';
    }
  }
  el.innerHTML=html;
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'||e.key==='w')move(0,-1);
  if(e.key==='ArrowDown'||e.key==='s')move(0,1);
  if(e.key==='ArrowLeft'||e.key==='a')move(-1,0);
  if(e.key==='ArrowRight'||e.key==='d')move(1,0);
  if(e.key==='z')undo();
});

// Swipe
let ts=null;
document.addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY}},{passive:true});
document.addEventListener('touchend',e=>{
  if(!ts)return;
  const dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y;
  if(Math.abs(dx)>Math.abs(dy)){dx>0?move(1,0):move(-1,0)}else{dy>0?move(0,1):move(0,-1)}
  ts=null;
});

loadLevel(0);
</script>
</body>
</html>
