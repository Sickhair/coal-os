<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Diamond Runner — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;overflow:hidden;font-family:'Orbitron',sans-serif;touch-action:none}
canvas{display:block}
.overlay{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#0a1628,#050510);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;color:#e2e8f0;padding:1.5rem}
.overlay.hidden{display:none}
.brand{font-size:.45rem;letter-spacing:4px;color:#334155;margin-bottom:1rem;text-transform:uppercase}
.title{font-size:1.6rem;font-weight:900;letter-spacing:3px;margin-bottom:.3rem}
.title .gem{color:#f59e0b;text-shadow:0 0 30px #f59e0b,0 0 60px #f59e044}
.subtitle{font-size:.6rem;color:#475569;letter-spacing:3px;margin-bottom:1.5rem}
.score-display{font-size:2rem;font-weight:900;color:#f59e0b;text-shadow:0 0 20px #f59e0b44;margin:.5rem 0}
.stats{font-size:.6rem;color:#64748b;margin:.3rem 0;line-height:1.8}
.play-btn{background:transparent;border:2px solid #f59e0b;color:#f59e0b;padding:.7rem 2.5rem;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:3px;cursor:pointer;margin-top:1rem;transition:all .3s}
.play-btn:hover,.play-btn:active{background:#f59e0b;color:#050510;box-shadow:0 0 40px #f59e0b44}
.hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:.6rem .8rem;z-index:50;pointer-events:none}
.hud-score{font-size:1rem;font-weight:800;color:#f59e0b;text-shadow:0 0 10px #f59e0b44}
.hud-gems{font-size:.75rem;color:#06b6d4;font-weight:700}
.hud-dist{font-size:.65rem;color:#64748b}
.controls-hint{font-size:.5rem;color:#334155;margin-top:1.5rem;letter-spacing:2px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud hidden" id="hud">
  <div class="hud-score" id="scoreEl">0</div>
  <div class="hud-gems" id="gemsEl">💎 0</div>
  <div class="hud-dist" id="distEl">0m</div>
</div>

<div class="overlay" id="menuScreen">
  <div class="brand">COAL OS</div>
  <div class="title"><span class="gem">💎</span> DIAMOND<br>RUNNER</div>
  <div class="subtitle">ENDLESS ARCADE</div>
  <div id="menuHigh" style="font-size:.65rem;color:#475569;margin-bottom:.5rem"></div>
  <button class="play-btn" onclick="startGame()">RUN</button>
  <div class="controls-hint">TAP OR SPACE TO JUMP</div>
</div>

<div class="overlay hidden" id="deathScreen">
  <div class="brand">COAL OS</div>
  <div class="title" style="color:#ef4444">CRASHED</div>
  <div class="score-display" id="finalScore">0</div>
  <div class="stats" id="finalStats"></div>
  <button class="play-btn" onclick="startGame()">RETRY</button>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,running,player,obstacles,gems,particles,bgStars,bgMountains,score,gemCount,dist,speed,frame,highScore=0,shakeX,shakeY,shakeDur;

function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

// Colors
const SKY_TOP='#050510',SKY_BOT='#0a1628';
const GROUND_COLOR='#0f1d2e',GROUND_LINE='#f59e0b22';
const PLAYER_COLOR='#f59e0b',GEM_COLOR='#06b6d4',OBSTACLE_COLOR='#ef4444';

function initGame(){
  resize();
  const groundY=H-80;
  player={x:80,y:groundY,w:28,h:40,vy:0,onGround:true,canDouble:true,groundY};
  obstacles=[];gems=[];particles=[];score=0;gemCount=0;dist=0;speed=5;frame=0;shakeX=0;shakeY=0;shakeDur=0;
  bgStars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*groundY,s:Math.random()*2+.5,sp:Math.random()*.5+.1}));
  bgMountains=Array.from({length:12},(_,i)=>({x:i*200+W,h:40+Math.random()*80,w:100+Math.random()*100}));
  running=true;
  document.getElementById('hud').classList.remove('hidden');
  updateHUD();
  requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('deathScreen').classList.add('hidden');
  initGame();
}

function spawnObstacle(){
  const groundY=H-80;
  const types=['spike','crate','tall','double'];
  const t=types[Math.floor(Math.random()*types.length)];
  if(t==='spike')obstacles.push({x:W+20,y:groundY-28,w:24,h:28,type:'spike'});
  else if(t==='crate')obstacles.push({x:W+20,y:groundY-32,w:32,h:32,type:'crate'});
  else if(t==='tall')obstacles.push({x:W+20,y:groundY-60,w:18,h:60,type:'tall'});
  else{obstacles.push({x:W+20,y:groundY-28,w:24,h:28,type:'spike'});obstacles.push({x:W+60,y:groundY-32,w:32,h:32,type:'crate'})}
}

function spawnGem(){
  const groundY=H-80;
  gems.push({x:W+20,y:groundY-60-Math.random()*100,r:10,collected:false,angle:0});
}

function addParticles(x,y,color,n=8){
  for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8-3,life:25+Math.random()*20,maxLife:45,color,size:2+Math.random()*3});
}

function shake(d=6){shakeDur=d}

let tap=false;
C.addEventListener('mousedown',()=>tap=true);
C.addEventListener('touchstart',e=>{e.preventDefault();tap=true},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space')tap=true});

function loop(){
  if(!running)return;
  frame++;
  speed=Math.min(12,5+frame/2000);

  // Input
  if(tap){
    if(player.onGround){player.vy=-13;player.onGround=false;player.canDouble=true;addParticles(player.x+player.w/2,player.y+player.h,'#f59e0b44',4)}
    else if(player.canDouble){player.vy=-11;player.canDouble=false;addParticles(player.x+player.w/2,player.y+player.h,'#f59e0b44',6)}
    tap=false;
  }

  // Physics
  player.vy+=.65;player.y+=player.vy;
  if(player.y>=player.groundY-player.h){player.y=player.groundY-player.h;player.vy=0;player.onGround=true}

  // Spawn
  if(frame%Math.max(40,90-Math.floor(speed*4))===0)spawnObstacle();
  if(frame%80===0)spawnGem();

  // Move
  obstacles.forEach(o=>o.x-=speed);
  gems.forEach(g=>{g.x-=speed;g.angle+=.08});
  obstacles(obstacles.filter(o=>o.x>-50));
  gems=gems.filter(g=>g.x>-20&&!g.collected);

  // Gem collision
  gems.forEach(g=>{
    if(!g.collected&&Math.hypot(player.x+player.w/2-g.x,player.y+player.h/2-g.y)<g.r+20){
      g.collected=true;gemCount++;score+=50;addParticles(g.x,g.y,'#06b6d4',12);shake(3);
    }
  });

  // Obstacle collision
  for(const o of obstacles){
    if(player.x+player.w>o.x+4&&player.x<o.x+o.w-4&&player.y+player.h>o.y+4&&player.y<o.y+o.h-4){
      die();return;
    }
  }

  // BG
  bgStars.forEach(s=>{s.x-=s.sp*speed;if(s.x<0){s.x=W;s.y=Math.random()*player.groundY}});
  bgMountains.forEach(m=>{m.x-=speed*.15;if(m.x<-m.w){m.x=W+Math.random()*200;m.h=40+Math.random()*80;m.w=100+Math.random()*100}});

  dist+=speed*.1;score+=Math.floor(speed*.05);
  if(shakeDur>0){shakeX=(Math.random()-.5)*shakeDur;shakeY=(Math.random()-.5)*shakeDur;shakeDur--}else{shakeX=0;shakeY=0}

  updateHUD();
  render();
  requestAnimationFrame(loop);
}

function die(){
  running=false;shake(12);
  addParticles(player.x+player.w/2,player.y+player.h/2,'#ef4444',25);
  addParticles(player.x+player.w/2,player.y+player.h/2,'#f59e0b',15);
  render();
  if(score>highScore)highScore=score;
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalStats').innerHTML=`Distance: ${Math.floor(dist)}m<br>Gems: 💎 ${gemCount}<br>High Score: ${highScore}`;
  setTimeout(()=>document.getElementById('deathScreen').classList.remove('hidden'),600);
}

function updateHUD(){
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('gemsEl').textContent='💎 '+gemCount;
  document.getElementById('distEl').textContent=Math.floor(dist)+'m';
}

function render(){
  X.save();X.translate(shakeX,shakeY);

  // Sky gradient
  const sky=X.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#050510');sky.addColorStop(.6,'#0a1628');sky.addColorStop(1,'#0f1d2e');
  X.fillStyle=sky;X.fillRect(0,0,W,H);

  // Stars
  bgStars.forEach(s=>{X.fillStyle=`rgba(255,255,255,${.2+Math.sin(frame*.02+s.x)*.15})`;X.fillRect(s.x,s.y,s.s,s.s)});

  // Mountains
  bgMountains.forEach(m=>{
    X.fillStyle='#0a1424';X.beginPath();X.moveTo(m.x,player.groundY);X.lineTo(m.x+m.w/2,player.groundY-m.h);X.lineTo(m.x+m.w,player.groundY);X.fill();
    X.fillStyle='#0d1830';X.beginPath();X.moveTo(m.x+m.w*.2,player.groundY);X.lineTo(m.x+m.w*.5,player.groundY-m.h*.7);X.lineTo(m.x+m.w*.8,player.groundY);X.fill();
  });

  const groundY=player.groundY;

  // Ground
  X.fillStyle=GROUND_COLOR;X.fillRect(0,groundY,W,H-groundY);
  // Ground line
  X.strokeStyle='#f59e0b33';X.lineWidth=2;X.beginPath();X.moveTo(0,groundY);X.lineTo(W,groundY);X.stroke();
  // Ground grid
  X.strokeStyle='#f59e0b0a';for(let gx=-(frame*speed*2)%40;gx<W;gx+=40){X.beginPath();X.moveTo(gx,groundY);X.lineTo(gx-20,H);X.stroke()}

  // Gems
  gems.forEach(g=>{
    if(g.collected)return;
    X.save();X.translate(g.x,g.y);X.rotate(g.angle);
    X.shadowColor='#06b6d4';X.shadowBlur=15;
    X.fillStyle='#06b6d4';X.beginPath();
    // Diamond shape
    X.moveTo(0,-g.r);X.lineTo(g.r*.6,0);X.lineTo(0,g.r);X.lineTo(-g.r*.6,0);X.closePath();X.fill();
    X.fillStyle='#06b6d466';X.beginPath();X.moveTo(0,-g.r);X.lineTo(g.r*.3,0);X.lineTo(0,g.r*.5);X.lineTo(-g.r*.3,0);X.closePath();X.fill();
    X.shadowBlur=0;X.restore();
  });

  // Obstacles
  obstacles.forEach(o=>{
    X.shadowColor=OBSTACLE_COLOR;X.shadowBlur=8;
    if(o.type==='spike'){
      X.fillStyle=OBSTACLE_COLOR;X.beginPath();X.moveTo(o.x,o.y+o.h);X.lineTo(o.x+o.w/2,o.y);X.lineTo(o.x+o.w,o.y+o.h);X.fill();
      X.fillStyle='#ff6666';X.beginPath();X.moveTo(o.x+o.w*.3,o.y+o.h);X.lineTo(o.x+o.w/2,o.y+o.h*.3);X.lineTo(o.x+o.w*.7,o.y+o.h);X.fill();
    }else if(o.type==='crate'){
      X.fillStyle='#3b1111';X.fillRect(o.x,o.y,o.w,o.h);X.fillStyle=OBSTACLE_COLOR+'88';X.fillRect(o.x+2,o.y+2,o.w-4,o.h-4);
      X.strokeStyle='#ff666644';X.lineWidth=1;X.strokeRect(o.x+4,o.y+4,o.w-8,o.h-8);
    }else{
      X.fillStyle='#3b1111';X.fillRect(o.x,o.y,o.w,o.h);X.fillStyle=OBSTACLE_COLOR+'66';X.fillRect(o.x+2,o.y+2,o.w-4,o.h-4);
      // Warning stripes
      for(let sy=o.y;sy<o.y+o.h;sy+=8){X.fillStyle=sy%16<8?'#ef444444':'transparent';X.fillRect(o.x,sy,o.w,4)}
    }
    X.shadowBlur=0;
  });

  // Player
  X.save();
  X.shadowColor=PLAYER_COLOR;X.shadowBlur=20;
  // Body
  X.fillStyle=PLAYER_COLOR;
  X.beginPath();X.roundRect(player.x+4,player.y+10,player.w-8,player.h-14,4);X.fill();
  // Head
  X.beginPath();X.arc(player.x+player.w/2,player.y+10,10,0,Math.PI*2);X.fill();
  // Eyes
  X.fillStyle='#050510';X.fillRect(player.x+player.w/2-5,player.y+7,3,4);X.fillRect(player.x+player.w/2+2,player.y+7,3,4);
  // Legs animation
  const legAnim=player.onGround?Math.sin(frame*.4)*4:2;
  X.fillStyle=PLAYER_COLOR;
  X.fillRect(player.x+6,player.y+player.h-6,5,6+legAnim);X.fillRect(player.x+player.w-11,player.y+player.h-6,5,6-legAnim);
  X.shadowBlur=0;X.restore();

  // Particles
  particles.forEach(p=>{
    const a=p.life/p.maxLife;X.globalAlpha=a;X.fillStyle=p.color;
    X.beginPath();X.arc(p.x,p.y,p.size*a,0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;

  X.restore();
}
</script>
</body>
</html>
