<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Card Forge — Deckbuilder Roguelike</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a1a">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
    body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Inter',sans-serif;color:#e2e8f0;overflow:hidden}
    .hud{display:flex;justify-content:space-between;width:100%;max-width:500px;padding:.4rem .75rem;background:#111827;font-size:.7rem;border-bottom:1px solid #1e293b}
    .hud .val{font-weight:700}.hud .hp{color:#ef4444}.hud .gold{color:#f59e0b}.hud .floor{color:#3b82f6}.hud .armor{color:#06b6d4}
    .hp-bar{width:80px;height:8px;background:#1e293b;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle}
    .hp-fill{height:100%;background:#ef4444;border-radius:4px;transition:width .3s}
    .game-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:500px;padding:.5rem;overflow:hidden}
    .enemy-zone{width:100%;display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;min-height:120px;margin-bottom:.5rem}
    .enemy-card{background:#1e293b;border:2px solid #334155;border-radius:8px;padding:.5rem;width:110px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
    .enemy-card:hover{border-color:#ef4444;transform:translateY(-2px)}
    .enemy-card.targeted{border-color:#ef4444;box-shadow:0 0 15px #ef444433}
    .enemy-card .intent{font-size:.55rem;padding:.1rem .3rem;border-radius:3px;display:inline-block;margin-bottom:.2rem}
    .intent.attack{background:#ef444433;color:#ef4444}.intent.defend{background:#3b82f633;color:#3b82f6}.intent.buff{background:#a855f733;color:#a855f7}
    .enemy-card .name{font-size:.7rem;font-weight:600;margin-bottom:.2rem}
    .enemy-card .e-icon{font-size:1.5rem;margin:.2rem 0}
    .enemy-card .e-hp{font-size:.6rem;color:#ef4444}
    .enemy-card .e-hp-bar{height:3px;background:#1e293b;border-radius:2px;margin-top:.2rem}.enemy-card .e-hp-fill{height:100%;background:#ef4444;border-radius:2px}
    .hand{display:flex;gap:.35rem;overflow-x:auto;padding:.5rem .25rem;justify-content:center;flex-wrap:wrap;max-width:500px;width:100%}
    .card{background:linear-gradient(135deg,#1e293b,#0f172a);border:2px solid #334155;border-radius:8px;padding:.4rem .5rem;width:85px;min-width:85px;cursor:pointer;transition:all .15s;text-align:center}
    .card:hover{border-color:#f59e0b;transform:translateY(-8px);box-shadow:0 8px 20px rgba(0,0,0,.4)}
    .card.selected{border-color:#f59e0b;transform:translateY(-12px);box-shadow:0 12px 25px rgba(245,158,11,.2)}
    .card.disabled{opacity:.4;cursor:not-allowed}.card.disabled:hover{transform:none;border-color:#334155;box-shadow:none}
    .card .c-cost{font-size:.55rem;background:#3b82f6;color:#fff;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700}
    .card .c-name{font-size:.6rem;font-weight:600;margin:.15rem 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card .c-desc{font-size:.5rem;color:#94a3b8;line-height:1.2}
    .card .c-type{font-size:.45rem;color:#64748b;margin-top:.1rem;text-transform:uppercase;letter-spacing:1px}
    .card.attack{border-color:#ef444455}.card.defense{border-color:#3b82f655}.card.skill{border-color:#a855f755}
    .controls{display:flex;gap:.5rem;padding:.5rem;width:100%;max-width:500px;justify-content:center}
    .btn{background:#3b82f6;color:#fff;border:none;padding:.5rem 1.5rem;border-radius:6px;font-family:inherit;font-size:.8rem;cursor:pointer;font-weight:600}
    .btn:hover{background:#2563eb}.btn.end-turn{background:#ef4444}.btn.end-turn:hover{background:#dc2626}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .energy-display{display:flex;align-items:center;gap:.3rem;font-size:.9rem;font-weight:700;color:#3b82f6}
    .energy-pip{width:10px;height:10px;border-radius:50%;background:#3b82f6}.energy-pip.empty{background:#1e293b}
    .log{width:100%;max-width:500px;padding:.3rem .5rem;background:#0f172a;font-size:.55rem;color:#64748b;max-height:50px;overflow-y:auto;border-top:1px solid #1e293b}
    .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;padding:1rem}
    .overlay h1{font-size:1.2rem;margin-bottom:.5rem}.overlay h2{font-size:1rem;margin-bottom:.3rem}
    .overlay p{font-size:.75rem;color:#94a3b8;margin-bottom:.5rem;max-width:320px;line-height:1.4}
    .overlay button{background:#3b82f6;color:#fff;border:none;padding:.5rem 1.5rem;border-radius:6px;font-family:inherit;font-size:.85rem;cursor:pointer;margin:.25rem}
    .overlay button.outline{background:transparent;border:1px solid #475569;color:#94a3b8}
    .reward-cards{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin:.5rem 0}
    .reward-card{background:#1e293b;border:2px solid #3b82f6;border-radius:8px;padding:.6rem;width:100px;cursor:pointer;text-align:center;transition:all .15s}
    .reward-card:hover{border-color:#f59e0b;transform:translateY(-4px)}
    .player-status{font-size:.65rem;color:#94a3b8;margin:.25rem 0}
    .buffs{display:flex;gap:.3rem;justify-content:center;margin:.25rem 0}
    .buff{font-size:.55rem;padding:.1rem .3rem;border-radius:3px;background:#334155}
  </style>
</head>
<body>

<div class="hud" id="hud" style="display:none">
  <div><span class="hp">❤️</span> <span class="hp val" id="hpText">50/50</span><div class="hp-bar"><div class="hp-fill" id="hpBar"></div></div></div>
  <div>🛡 <span class="armor val" id="armorText">0</span></div>
  <div>🏛 <span class="floor val" id="floorText">1</span></div>
  <div>💰 <span class="gold val" id="goldText">0</span></div>
</div>

<div class="game-area">
  <div class="enemy-zone" id="enemyZone"></div>
  <div class="player-status" id="playerStatus"></div>
  <div class="buffs" id="buffsDisplay"></div>
  <div class="energy-display" id="energyDisplay"></div>
  <div class="hand" id="hand"></div>
</div>

<div class="controls" id="controls" style="display:none">
  <button class="btn end-turn" id="endTurnBtn" onclick="endTurn()">END TURN</button>
</div>

<div class="log" id="log"></div>

<!-- START -->
<div class="overlay" id="startScreen">
  <h1 style="color:#f59e0b">🃏 CARD FORGE</h1>
  <h2>Deckbuilder Roguelike</h2>
  <p>Build your deck, fight monsters, climb 15 floors. Play cards using energy. Each turn, draw 5 cards. Defeat all enemies to advance. Choose new cards after each battle.</p>
  <button onclick="startGame()">PLAY</button>
</div>

<!-- REWARD -->
<div class="overlay" id="rewardScreen" style="display:none">
  <h2 style="color:#22c55e">⚔ Victory!</h2>
  <p id="rewardMsg"></p>
  <div class="reward-cards" id="rewardCards"></div>
  <button class="outline" onclick="skipReward()">Skip Card</button>
</div>

<!-- GAME OVER -->
<div class="overlay" id="gameOver" style="display:none">
  <h1 style="color:#ef4444">☠ DEFEATED</h1>
  <p id="deathMsg"></p>
  <button onclick="startGame()">Try Again</button>
</div>

<!-- WIN -->
<div class="overlay" id="winScreen" style="display:none">
  <h1 style="color:#f59e0b">🏆 ASCENDED!</h1>
  <p id="winMsg"></p>
  <button onclick="startGame()">Play Again</button>
</div>

<script>
// === CARDS DATABASE ===
const ALL_CARDS={
  strike:{name:'Strike',cost:1,type:'attack',desc:'Deal 6 dmg',icon:'⚔',dmg:6,target:true},
  defend:{name:'Defend',cost:1,type:'defense',desc:'Gain 5 armor',icon:'🛡',armor:5,target:false},
  bash:{name:'Bash',cost:2,type:'attack',desc:'Deal 8 dmg, apply 2 Vuln',icon:'🔨',dmg:8,vuln:2,target:true},
  cleave:{name:'Cleave',cost:2,type:'attack',desc:'Deal 4 dmg to ALL',icon:'🪓',dmg:4,aoe:true,target:false},
  heal:{name:'Heal',cost:1,type:'skill',desc:'Restore 8 HP',icon:'💚',heal:8,target:false},
  draw2:{name:'Insight',cost:1,type:'skill',desc:'Draw 2 cards',icon:'📖',draw:2,target:false},
  thorns:{name:'Thorns',cost:1,type:'skill',desc:'Gain 3 armor, return 3 dmg when hit',icon:'🌹',armor:3,thorns:3,target:false},
  fireball:{name:'Fireball',cost:2,type:'attack',desc:'Deal 10 dmg to ALL',icon:'🔥',dmg:10,aoe:true,target:false},
  ice:{name:'Frost',cost:1,type:'attack',desc:'Deal 4 dmg, enemy -1 str',icon:'❄️',dmg:4,weak:1,target:true},
  rage:{name:'Rage',cost:0,type:'skill',desc:'Gain 2 str this combat',icon:'💪',str:2,target:false},
  fortify:{name:'Fortify',cost:1,type:'defense',desc:'Gain 8 armor',icon:'🏰',armor:8,target:false},
  execute:{name:'Execute',cost:3,type:'attack',desc:'Deal 30 dmg',icon:'💀',dmg:30,target:true},
  poison:{name:'Poison',cost:1,type:'attack',desc:'Deal 2 dmg, apply 3 poison',icon:'☠',dmg:2,poison:3,target:true},
  drain:{name:'Drain',cost:2,type:'attack',desc:'Deal 6 dmg, heal 6',icon:'🧛',dmg:6,healDmg:6,target:true},
  shiv:{name:'Shiv',cost:0,type:'attack',desc:'Deal 3 dmg',icon:'🗡',dmg:3,target:true},
  reflect:{name:'Reflect',cost:2,type:'skill',desc:'Gain 4 armor + 4 thorns',icon:'🪞',armor:4,thorns:4,target:false},
};

// === ENEMIES ===
const ENCOUNTERS=[
  [{name:'Slime',icon:'🟢',hp:14,str:0,moves:[{type:'attack',dmg:5},{type:'attack',dmg:5},{type:'defend',armor:4}]}],
  [{name:'Goblin',icon:'👺',hp:12,str:0,moves:[{type:'attack',dmg:6},{type:'attack',dmg:8}]},{name:'Rat',icon:'🐀',hp:8,str:0,moves:[{type:'attack',dmg:4},{type:'attack',dmg:4}]}],
  [{name:'Skeleton',icon:'💀',hp:22,str:0,moves:[{type:'attack',dmg:8},{type:'defend',armor:6},{type:'buff',str:2}]}],
  [{name:'Orc',icon:'👹',hp:30,str:0,moves:[{type:'attack',dmg:10},{type:'attack',dmg:6},{type:'buff',str:2}]}],
  [{name:'Dark Mage',icon:'🧙',hp:20,str:0,moves:[{type:'buff',str:3},{type:'attack',dmg:12},{type:'defend',armor:8}]}],
  [{name:'Golem',icon:'🗿',hp:50,str:0,moves:[{type:'defend',armor:10},{type:'attack',dmg:15},{type:'attack',dmg:15}]}],
  [{name:'Dragon',icon:'🐉',hp:80,str:0,moves:[{type:'attack',dmg:12},{type:'buff',str:2},{type:'attack',dmg:18},{type:'defend',armor:12}],boss:true}],
  [{name:'Lich',icon:'☠️',hp:60,str:0,moves:[{type:'buff',str:3},{type:'attack',dmg:14},{type:'attack',dmg:20},{type:'defend',armor:8}],boss:true}],
];

// === STATE ===
let deck,hand,drawPile,discardPile,playerHP,maxHP,armor,gold,energy,maxEnergy,floor,combatEnemies,turn,selectedCard,str,thorns,buffs,running,logs;

function startGame(){
  ['startScreen','gameOver','winScreen','rewardScreen'].forEach(id=>document.getElementById(id).style.display='none');
  ['hud','controls'].forEach(id=>document.getElementById(id).style.display='');
  
  maxHP=60;playerHP=maxHP;armor=0;gold=0;floor=0;str=0;thorns=0;buffs=[];logs=[];
  deck=['strike','strike','strike','strike','defend','defend','defend','bash','heal'].map(id=>({...ALL_CARDS[id],id}));
  running=true;
  nextFloor();
}

function nextFloor(){
  floor++;
  if(floor>ENCOUNTERS.length){
    document.getElementById('winMsg').textContent=`HP: ${playerHP}/${maxHP} | Gold: ${gold} | Deck: ${deck.length} cards | Floors: ${floor-1}`;
    document.getElementById('winScreen').style.display='flex';running=false;return;
  }
  const enc=ENCOUNTERS[floor-1];
  combatEnemies=enc.map(e=>({...e,maxHp:e.hp,moveIdx:0,poison:0,vuln:0,weak:0}));
  startCombat();
}

function startCombat(){
  armor=0;str=0;thorns=0;buffs=[];turn=0;
  drawPile=[...deck].sort(()=>Math.random()-.5);discardPile=[];hand=[];
  drawCards(5);
  combatEnemies.forEach(e=>pickMove(e));
  turn=1;maxEnergy=3;
  refreshUI();
}

function drawCards(n){
  for(let i=0;i<n;i++){
    if(!drawPile.length){drawPile=[...discardPile].sort(()=>Math.random()-.5);discardPile=[]}
    if(drawPile.length)hand.push(drawPile.shift());
  }
}

function pickMove(e){
  e.intent=e.moves[e.moveIdx%e.moves.length];
  e.moveIdx++;
}

function playCard(handIdx,targetIdx){
  const card=hand[handIdx];
  if(card.cost>energy){return}
  if(card.target&&!combatEnemies[targetIdx]){return}

  energy-=card.cost;
  const baseStr=str;

  if(card.armor)armor+=card.armor;
  if(card.heal)playerHP=Math.min(maxHP,playerHP+card.heal);
  if(card.str){str+=card.str;buffs.push({name:`+${card.str} STR`,turns:99})}
  if(card.thorns){thorns+=card.thorns;buffs.push({name:`${card.thorns} Thorns`,turns:99})}
  if(card.draw)drawCards(card.draw);

  if(card.aoe){
    combatEnemies.forEach(e=>{
      let dmg=card.dmg+baseStr;
      if(e.vuln>0)dmg=Math.floor(dmg*1.5);
      dealDmg(e,dmg);
    });
  }else if(card.dmg&&card.target){
    const e=combatEnemies[targetIdx];
    let dmg=card.dmg+baseStr;
    if(e.vuln>0)dmg=Math.floor(dmg*1.5);
    dealDmg(e,dmg);
    if(card.healDmg)playerHP=Math.min(maxHP,playerHP+card.healDmg);
  }

  if(card.vuln&&card.target)combatEnemies[targetIdx].vuln+=card.vuln;
  if(card.weak&&card.target)combatEnemies[targetIdx].weak+=card.weak;
  if(card.poison&&card.target)combatEnemies[targetIdx].poison+=card.poison;

  discardPile.push(hand.splice(handIdx,1)[0]);
  refreshUI();
  if(!combatEnemies.length)combatWin();
}

function dealDmg(e,dmg){
  e.hp-=dmg;
  addLog(`Dealt ${dmg} to ${e.name}`);
  if(e.hp<=0){e.hp=0;addLog(`${e.name} defeated!`)}
}

function endTurn(){
  if(!running)return;
  // Discard hand
  discardPile.push(...hand);hand=[];
  // Enemy turns
  combatEnemies.forEach(e=>{
    if(e.hp<=0)return;
    // Poison
    if(e.poison>0){e.hp-=e.poison;e.poison--;addLog(`${e.name} takes ${e.poison+1} poison`)}
    const move=e.intent;
    const eStr=e.str||0;
    switch(move.type){
      case'attack':{
        let dmg=move.dmg+eStr;
        if(e.weak>0)dmg=Math.floor(dmg*.75);
        if(armor>0){const blocked=Math.min(armor,dmg);armor-=blocked;dmg-=blocked}
        playerHP-=dmg;
        if(thorns>0){e.hp-=thorns;addLog(`Thorns hit ${e.name} for ${thorns}`)}
        addLog(`${e.name} attacks for ${dmg}`);break;
      }
      case'defend':e.armor=(e.armor||0)+move.armor;addLog(`${e.name} gains ${move.armor} armor`);break;
      case'buff':e.str=(e.str||0)+move.str;addLog(`${e.name} gains ${move.str} str`);break;
    }
    e.vuln=Math.max(0,(e.vuln||0)-1);e.weak=Math.max(0,(e.weak||0)-1);
    pickMove(e);
  });
  combatEnemies=combatEnemies.filter(e=>e.hp>0);

  if(playerHP<=0){
    running=false;
    document.getElementById('deathMsg').textContent=`Floor ${floor} | Deck: ${deck.length} cards | Gold: ${gold}`;
    document.getElementById('gameOver').style.display='flex';return;
  }
  if(!combatEnemies.length){combatWin();return}

  turn++;energy=maxEnergy;
  drawCards(5);
  refreshUI();
}

function combatWin(){
  gold+=5+floor*3;
  addLog('Victory!');
  document.getElementById('rewardMsg').textContent=`+${5+floor*3} gold. Choose a card to add to your deck:`;
  // Pick 3 random cards
  const pool=Object.entries(ALL_CARDS).filter(([id])=>!['execute'].includes(id));
  const picks=[];for(let i=0;i<3&&pool.length;i++){const idx=Math.floor(Math.random()*pool.length);picks.push(pool.splice(idx,1)[0])}
  document.getElementById('rewardCards').innerHTML=picks.map(([id,c])=>`<div class="reward-card" onclick="pickReward('${id}')"><div style="font-size:1.2rem">${c.icon}</div><div style="font-size:.7rem;font-weight:600">${c.name}</div><div style="font-size:.55rem;color:#94a3b8">${c.desc}</div><div style="font-size:.5rem;color:#64748b">${c.cost} energy</div></div>`).join('');
  document.getElementById('rewardScreen').style.display='flex';
}

function pickReward(id){deck.push({...ALL_CARDS[id],id});document.getElementById('rewardScreen').style.display='none';nextFloor()}
function skipReward(){document.getElementById('rewardScreen').style.display='none';nextFloor()}

function refreshUI(){
  document.getElementById('hpText').textContent=playerHP+'/'+maxHP;
  document.getElementById('hpBar').style.width=(playerHP/maxHP*100)+'%';
  document.getElementById('armorText').textContent=armor;
  document.getElementById('floorText').textContent=floor;
  document.getElementById('goldText').textContent=gold;

  // Energy
  let eHtml='';for(let i=0;i<maxEnergy;i++)eHtml+=`<div class="energy-pip${i<energy?'':' empty'}"></div>`;
  document.getElementById('energyDisplay').innerHTML='⚡'+eHtml;

  // Enemies
  document.getElementById('enemyZone').innerHTML=combatEnemies.map((e,i)=>{
    const intent=e.intent;
    const intentClass=intent.type==='attack'?'attack':intent.type==='defend'?'defend':'buff';
    const intentText=intent.type==='attack'?`⚔ ${intent.dmg+(e.str||0)}`:intent.type==='defend'?`🛡 ${intent.armor}`:`💪 +${intent.str}`;
    return`<div class="enemy-card" onclick="targetEnemy(${i})"><div class="intent ${intentClass}">${intentText}</div><div class="e-icon">${e.icon}</div><div class="name">${e.name}</div><div class="e-hp">${e.hp}/${e.maxHp}${e.armor?' 🛡'+e.armor:''}${e.poison?' ☠'+e.poison:''}</div><div class="e-hp-bar"><div class="e-hp-fill" style="width:${e.hp/e.maxHp*100}%"></div></div></div>`;
  }).join('');

  // Hand
  document.getElementById('hand').innerHTML=hand.map((c,i)=>{
    const canPlay=c.cost<=energy&&(!c.target||combatEnemies.length>0);
    return`<div class="card ${c.type} ${canPlay?'':'disabled'}" onclick="playCardByIndex(${i})"><div class="c-cost">${c.cost}</div><div style="font-size:1rem">${c.icon}</div><div class="c-name">${c.name}</div><div class="c-desc">${c.desc}</div><div class="c-type">${c.type}</div></div>`;
  }).join('');

  // Buffs
  document.getElementById('buffsDisplay').innerHTML=buffs.map(b=>`<div class="buff">${b.name}</div>`).join('')+(str>0?`<div class="buff">💪${str}</div>`:'')+(thorns>0?`<div class="buff">🌹${thorns}</div>`:'')+(armor>0?`<div class="buff">🛡${armor}</div>`:'');

  document.getElementById('endTurnBtn').disabled=false;
}

let selectedTarget=-1;
function targetEnemy(i){selectedTarget=i;if(selectedCardIdx>=0)playCardByIndex(selectedCardIdx)}
let selectedCardIdx=-1;
function playCardByIndex(i){
  const card=hand[i];
  if(card.cost>energy)return;
  if(card.target&&selectedTarget<0){selectedCardIdx=i;addLog('Select a target');return}
  const tIdx=card.target?selectedTarget:i;
  selectedCardIdx=-1;selectedTarget=-1;
  playCard(i,card.target?tIdx:0);
}

function addLog(msg){logs.push(msg);if(logs.length>30)logs.shift();document.getElementById('log').innerHTML=logs.slice(-8).map(l=>`<div>${l}</div>`).join('');document.getElementById('log').scrollTop=999}
</script>
</body>
</html>
