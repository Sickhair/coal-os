<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Card Forge — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Orbitron',sans-serif;color:#e2e8f0;overflow:hidden}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin:6px 0 2px;text-transform:uppercase}
.top{display:flex;gap:12px;align-items:center;margin-bottom:6px;font-size:.6rem}
.energy{color:#f59e0b}.hp-player{color:#22c55e}.floor-num{color:#64748b}
.enemy-area{background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:10px;margin-bottom:8px;width:min(95vw,380px);text-align:center;min-height:70px}
.enemy-name{font-size:.7rem;font-weight:700;margin-bottom:4px}
.enemy-hp{font-size:.5rem;color:#ef4444}
.intent{font-size:.5rem;color:#f59e0b;margin-top:4px}
.hand{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;min-height:100px;align-items:flex-end}
.card{width:min(22vw,85px);background:#1e293b;border:2px solid #334155;border-radius:6px;padding:4px;cursor:pointer;transition:all .15s;text-align:center}
.card:hover{transform:translateY(-4px);border-color:#f59e0b}
.card .cname{font-size:.45rem;font-weight:700;color:#e2e8f0;margin-bottom:2px;letter-spacing:1px}
.card .cost{font-size:.55rem;color:#f59e0b;font-weight:700}
.card .desc{font-size:.35rem;color:#64748b;line-height:1.3}
.card .dmg{font-size:.5rem;color:#ef4444;font-weight:700}
.card .def{font-size:.5rem;color:#3b82f6;font-weight:700}
.card.unplayable{opacity:.4;cursor:not-allowed}
.discard{font-size:.45rem;color:#334155;margin-bottom:4px}
.buffs{font-size:.45rem;color:#a855f7;margin:2px 0}
.player-buffs{font-size:.45rem;color:#22c55e;margin-bottom:4px}
.btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:.3rem .8rem;border-radius:4px;font-family:inherit;font-size:.5rem;cursor:pointer;margin:2px}
.btn:active{background:#334155;color:#fff}
.reward{background:#0f172a;border:1px solid #22c55e33;border-radius:8px;padding:10px;width:min(95vw,380px);text-align:center}
.reward .card{cursor:pointer;border-color:#22c55e66}
.ov{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#0a1628,#050510);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;color:#e2e8f0;padding:1.5rem}
.ov.h{display:none}
.tt{font-size:1.1rem;font-weight:900;letter-spacing:2px}
.bn{background:transparent;border:2px solid #f59e0b;color:#f59e0b;padding:.5rem 1.5rem;border-radius:6px;font-family:'Orbitron',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:2px;cursor:pointer}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:8px;left:8px;z-index:200;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:.5rem;color:#475569;opacity:.6">← COAL OS</a>
<div class="brand">COAL OS</div>
<div class="top">
  <span class="energy" id="energyEl">⚡ 3/3</span>
  <span class="hp-player" id="hpEl">♥ 50/50</span>
  <span class="floor-num" id="floorEl">FLOOR 1</span>
</div>
<div class="enemy-area" id="enemyArea"></div>
<div class="player-buffs" id="playerBuffs"></div>
<div class="hand" id="hand"></div>
<div class="discard" id="discardEl"></div>

<div class="ov" id="menu">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#f59e0b">🃏 CARD FORGE</div>
  <div style="font-size:.5rem;color:#475569;margin:.5rem 0 1rem;letter-spacing:2px">DECKBUILDER</div>
  <button class="bn" onclick="startGame()">PLAY</button>
</div>
<div class="ov h" id="rewardScreen">
  <div style="font-size:.8rem;font-weight:900;color:#22c55e">CHOOSE A CARD</div>
  <div class="hand" id="rewardCards" style="margin-top:10px"></div>
  <button class="btn" onclick="skipReward()" style="margin-top:8px">SKIP</button>
</div>
<div class="ov h" id="over">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#ef4444">DEFEATED</div>
  <div style="font-size:1.2rem;font-weight:900;color:#ef4444;margin:.5rem 0" id="fScore">0</div>
  <div style="font-size:.5rem;color:#64748b" id="fStats"></div>
  <button class="bn" style="border-color:#ef4444;color:#ef4444" onclick="startGame()">RETRY</button>
</div>
<div class="ov h" id="winScreen">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#22c55e">VICTORY!</div>
  <button class="bn" style="border-color:#22c55e;color:#22c55e" onclick="startGame()">PLAY AGAIN</button>
</div>
<script>
const ALL_CARDS=[
  {name:'STRIKE',cost:1,type:'attack',value:6,desc:'Deal 6 damage'},
  {name:'BASH',cost:2,type:'attack',value:10,desc:'Deal 10 dmg, apply 2 Vuln',effect:'vuln',effVal:2},
  {name:'SLASH',cost:1,type:'attack',value:8,desc:'Deal 8 damage'},
  {name:'BLOCK',cost:1,type:'defense',value:5,desc:'Gain 5 block'},
  {name:'FORTIFY',cost:2,type:'defense',value:12,desc:'Gain 12 block'},
  {name:'FIREBALL',cost:2,type:'attack',value:14,desc:'Deal 14 damage'},
  {name:'HEAL',cost:1,type:'heal',value:8,desc:'Restore 8 HP'},
  {name:'DRAIN',cost:2,type:'attack',value:6,desc:'Deal 6, heal 6',effect:'lifesteal',effVal:6},
  {name:'POISON',cost:1,type:'attack',value:3,desc:'Deal 3 dmg, apply 3 Poison',effect:'poison',effVal:3},
  {name:'THORNS',cost:1,type:'defense',value:4,desc:'Gain 4 block, 3 Thorns',effect:'thorns',effVal:3},
  {name:'SMITE',cost:3,type:'attack',value:22,desc:'Deal 22 damage'},
  {name:'MEDITATE',cost:1,type:'energy',value:2,desc:'Gain 2 energy'},
  {name:'RIPOSTE',cost:1,type:'attack',value:5,desc:'Deal 5, gain 5 block',effect:'riposte',effVal:5},
  {name:'WEAKEN',cost:1,type:'attack',value:4,desc:'Deal 4, apply 2 Weak',effect:'weak',effVal:2},
  {name:'DOUBLE',cost:2,type:'attack',value:6,desc:'Deal 6 x2',effect:'double'},
  {name:'BERSERK',cost:0,type:'attack',value:4,desc:'Deal 4, take 3',effect:'selfDmg',effVal:3},
];

const ENEMIES=[
  {name:'Slime',hp:20,attacks:[{dmg:5},{dmg:7}],color:'#22c55e'},
  {name:'Goblin',hp:30,attacks:[{dmg:8},{dmg:5,def:3}],color:'#f59e0b'},
  {name:'Skeleton',hp:35,attacks:[{dmg:6},{dmg:10}],color:'#e2e8f0'},
  {name:'Dark Mage',hp:28,attacks:[{dmg:7,effect:'weak',effVal:1},{dmg:12}],color:'#a855f7'},
  {name:'Orc',hp:50,attacks:[{dmg:12},{dmg:8,def:5}],color:'#ef4444'},
  {name:'Dragon Lord',hp:100,attacks:[{dmg:15},{dmg:20},{dmg:10,effect:'vuln',effVal:2}],color:'#f97316',boss:true},
];

let deck,hand,discardPile,drawPile,playerHP,maxHP,energy,maxEnergy,block,playerBuffs;
let currentEnemy,enemyHP,enemyMaxHP,enemyBlock,enemyBuffs,enemyIntent,floorNum;

function startGame(){
  document.getElementById('menu').classList.add('h');
  document.getElementById('over').classList.add('h');
  document.getElementById('winScreen').classList.add('h');
  document.getElementById('rewardScreen').classList.add('h');
  
  // Starting deck
  deck=[0,0,0,0,1,3,3,4,2,6]; // indices into ALL_CARDS
  playerHP=50;maxHP=50;maxEnergy=3;floorNum=0;
  nextFloor();
}

function nextFloor(){
  floorNum++;
  if(floorNum>15){
    document.getElementById('winScreen').classList.remove('h');return;
  }
  document.getElementById('rewardScreen').classList.add('h');
  
  // Pick enemy
  const isBoss=floorNum%5===0;
  const pool=isBoss?ENEMIES.filter(e=>e.boss):ENEMIES.filter(e=>!e.boss);
  const e=pool[Math.floor(Math.random()*pool.length)];
  const hpMult=1+floorNum*.08;
  currentEnemy=e;
  enemyHP=Math.floor(e.hp*hpMult);enemyMaxHP=enemyHP;enemyBlock=0;enemyBuffs={};
  pickIntent();
  
  // Draw hand
  energy=maxEnergy;block=0;playerBuffs={};
  discardPile=[];drawPile=[...deck].sort(()=>Math.random()-.5);
  hand=[];
  drawCards(5);
  render();
}

function pickIntent(){
  const a=currentEnemy.attacks[Math.floor(Math.random()*currentEnemy.attacks.length)];
  enemyIntent=a;
}

function drawCards(n){
  for(let i=0;i<n;i++){
    if(drawPile.length===0){
      if(discardPile.length===0)return;
      drawPile=[...discardPile].sort(()=>Math.random()-.5);discardPile=[];
    }
    hand.push(drawPile.pop());
  }
}

function playCard(idx){
  const cardIdx=hand[idx];
  const card=ALL_CARDS[cardIdx];
  if(card.cost>energy)return;
  energy-=card.cost;
  hand.splice(idx,1);
  
  // Apply card
  const vulnMult=enemyBuffs.vuln?1.5:1;
  const weakMult=playerBuffs.weak?.5:1;
  
  if(card.type==='attack'){
    let dmg=Math.floor(card.value*vulnMult);
    if(card.effect==='double'){dmg*=2}
    dealDamageToEnemy(dmg);
    if(card.effect==='vuln')enemyBuffs.vuln=(enemyBuffs.vuln||0)+card.effVal;
    if(card.effect==='poison')enemyBuffs.poison=(enemyBuffs.poison||0)+card.effVal;
    if(card.effect==='weak')enemyBuffs.weak=(enemyBuffs.weak||0)+card.effVal;
    if(card.effect==='lifesteal')playerHP=Math.min(maxHP,playerHP+card.effVal);
    if(card.effect==='riposte')block+=card.effVal;
    if(card.effect==='selfDmg')playerHP-=card.effVal;
  }
  if(card.type==='defense')block+=card.value;
  if(card.type==='heal')playerHP=Math.min(maxHP,playerHP+card.value);
  if(card.type==='energy')energy+=card.value;
  
  discardPile.push(cardIdx);
  if(playerHP<=0){die();return}
  render();
}

function dealDamageToEnemy(dmg){
  if(enemyBlock>0){const absorbed=Math.min(enemyBlock,dmg);enemyBlock-=absorbed;dmg-=absorbed}
  enemyHP-=dmg;
}

function endTurn(){
  // Discard hand
  discardPile.push(...hand);hand=[];
  
  // Enemy buffs tick
  if(enemyBuffs.vuln){enemyBuffs.vuln--;if(enemyBuffs.vuln<=0)delete enemyBuffs.vuln}
  if(enemyBuffs.poison){enemyHP-=enemyBuffs.poison;enemyBuffs.poison--;if(enemyBuffs.poison<=0)delete enemyBuffs.poison}
  if(enemyBuffs.weak){enemyBuffs.weak--;if(enemyBuffs.weak<=0)delete enemyBuffs.weak}
  
  if(enemyHP<=0){enemyDead();return}
  
  // Enemy attacks
  const intent=enemyIntent;
  const weakMult=enemyBuffs.weak?.5:1;
  let dmg=Math.floor((intent.dmg||0)*weakMult);
  if(block>0){const absorbed=Math.min(block,dmg);block-=absorbed;dmg-=absorbed}
  playerHP-=dmg;
  if(intent.def)enemyBlock+=intent.def;
  if(intent.effect==='weak')playerBuffs.weak=(playerBuffs.weak||0)+(intent.effVal||1);
  
  if(playerBuffs.weak){playerBuffs.weak--;if(playerBuffs.weak<=0)delete playerBuffs.weak}
  
  if(playerHP<=0){die();return}
  
  pickIntent();
  energy=maxEnergy;block=0;enemyBlock=0;
  drawCards(5);
  render();
}

function enemyDead(){
  const rewards=[...Array(ALL_CARDS.length).keys()].sort(()=>Math.random()-.5).slice(0,3);
  showReward(rewards);
}

function showReward(options){
  const el=document.getElementById('rewardCards');el.innerHTML='';
  options.forEach(ci=>{
    const card=ALL_CARDS[ci];
    const d=document.createElement('div');d.className='card';
    d.innerHTML=`<div class="cost">⚡${card.cost}</div><div class="cname" style="color:${card.type==='attack'?'#ef4444':card.type==='defense'?'#3b82f6':'#22c55e'}">${card.name}</div><div class="desc">${card.desc}</div>`;
    d.onclick=()=>{deck.push(ci);document.getElementById('rewardScreen').classList.add('h');nextFloor()};
    el.appendChild(d);
  });
  document.getElementById('rewardScreen').classList.remove('h');
}

function skipReward(){document.getElementById('rewardScreen').classList.add('h');nextFloor()}

function die(){
  document.getElementById('fScore').textContent='Floor '+floorNum;
  document.getElementById('fStats').innerHTML=`Deck: ${deck.length} cards<br>Enemy: ${currentEnemy.name}`;
  document.getElementById('over').classList.remove('h');
}

function render(){
  document.getElementById('energyEl').textContent='⚡ '+energy+'/'+maxEnergy;
  document.getElementById('hpEl').textContent='♥ '+playerHP+'/'+maxHP+(block>0?' 🛡'+block:'');
  document.getElementById('floorEl').textContent='FLOOR '+floorNum;
  
  // Enemy
  const ea=document.getElementById('enemyArea');
  let ehtml=`<div class="enemy-name" style="color:${currentEnemy.color}">${currentEnemy.name}</div>`;
  ehtml+=`<div class="enemy-hp">♥ ${enemyHP}/${enemyMaxHP}${enemyBlock>0?' 🛡'+enemyBlock:''}</div>`;
  const intentTxt=enemyIntent.dmg?'Attack '+enemyIntent.dmg+(enemyIntent.def?' + Block '+enemyIntent.def:''):'Defend';
  ehtml+=`<div class="intent">Next: ${intentTxt}</div>`;
  const eb=[];
  if(enemyBuffs.vuln)eb.push('Vuln:'+enemyBuffs.vuln);
  if(enemyBuffs.poison)eb.push('Poison:'+enemyBuffs.poison);
  if(enemyBuffs.weak)eb.push('Weak:'+enemyBuffs.weak);
  if(eb.length)ehtml+=`<div class="buffs">${eb.join(' ')}</div>`;
  ea.innerHTML=ehtml;
  
  // Player buffs
  const pb=[];
  if(playerBuffs.weak)pb.push('Weak:'+playerBuffs.weak);
  document.getElementById('playerBuffs').textContent=pb.join(' ');
  
  // Hand
  const hel=document.getElementById('hand');hel.innerHTML='';
  hand.forEach((ci,i)=>{
    const card=ALL_CARDS[ci];
    const playable=card.cost<=energy;
    const d=document.createElement('div');d.className='card'+(playable?'':' unplayable');
    const col=card.type==='attack'?'#ef4444':card.type==='defense'?'#3b82f6':card.type==='heal'?'#22c55e':'#f59e0b';
    d.innerHTML=`<div class="cost">⚡${card.cost}</div><div class="cname" style="color:${col}">${card.name}</div><div class="desc">${card.desc}</div>`;
    if(playable)d.onclick=()=>playCard(i);
    hel.appendChild(d);
  });
  
  document.getElementById('discardEl').textContent='Deck: '+drawPile.length+' | Discard: '+discardPile.length;
  
  // End turn button
  if(!document.getElementById('endTurnBtn')){
    const btn=document.createElement('button');btn.className='btn';btn.id='endTurnBtn';btn.textContent='END TURN';
    btn.onclick=endTurn;btn.style.cssText='position:fixed;bottom:10px;right:10px;z-index:60;padding:.4rem 1rem;border-color:#f59e0b;color:#f59e0b';
    document.body.appendChild(btn);
  }
}
</script>
</body>
</html>
