<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>COAL OS — Chroma Lab</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000a14;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Courier New',monospace;color:#00d4ff;padding:1rem}
    h1{font-size:.8rem;letter-spacing:3px;text-shadow:0 0 20px #00d4ff;margin-bottom:1rem}
    .panel{width:100%;max-width:420px;background:#000d1a;border:1px solid #00d4ff33;border-radius:6px;padding:.75rem;margin-bottom:.75rem}
    .panel-title{font-size:.55rem;letter-spacing:3px;color:#475569;text-transform:uppercase;margin-bottom:.4rem}
    .picker-row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
    input[type=color]{width:80px;height:80px;border:1px solid #00d4ff33;border-radius:6px;background:none;cursor:pointer;padding:2px}
    .color-values{flex:1;min-width:200px}
    .val-row{display:flex;justify-content:space-between;align-items:center;padding:.25rem 0;border-bottom:1px solid #0a1628}
    .val-label{font-size:.65rem;color:#475569}
    .val-text{font-size:.75rem;color:#e2e8f0}
    .copy-btn{background:none;border:none;color:#475569;cursor:pointer;font-size:.6rem}
    .preview{width:100%;height:60px;border-radius:4px;margin-top:.5rem;border:1px solid #0a1628}
    .palette{display:flex;gap:4px;margin-top:.5rem;flex-wrap:wrap}
    .swatch{width:40px;height:40px;border-radius:4px;cursor:pointer;border:1px solid #0a1628;position:relative;transition:transform .2s}
    .swatch:active{transform:scale(1.2)}
    .contrast-box{padding:.75rem;border-radius:4px;text-align:center;margin-top:.5rem}
    .contrast-label{font-size:.6rem;letter-spacing:2px}
    .contrast-ratio{font-size:1.2rem;font-weight:bold;margin-top:.25rem}
    .controls{display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap;justify-content:center}
    .controls button{background:transparent;border:1px solid #00d4ff44;color:#00d4ff;font-family:'Courier New',monospace;font-size:.65rem;padding:.3rem .6rem;cursor:pointer;border-radius:3px}
    .controls button:hover{background:#00d4ff22}
    .back-link{margin-top:.5rem;font-size:.7rem}
    .back-link a{color:#475569;text-decoration:none}
  
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin-bottom:6px;text-transform:uppercase;font-family:'Orbitron',sans-serif;text-align:center}
.back-link{position:fixed;top:8px;left:8px;z-index:200;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:1px;color:#475569;opacity:.6;transition:opacity .2s}
.back-link:hover{opacity:1;color:#e2e8f0}

</style>
</head>
<body>
<a class="back-link" href="index.html">← COAL OS</a>
  <h1>◆ CHROMA LAB ◆</h1>
  <div class="panel">
    <div class="panel-title">⬡ Color Picker</div>
    <div class="picker-row">
      <input type="color" id="picker" value="#00d4ff" oninput="updateColor(this.value)">
      <div class="color-values" id="values"></div>
    </div>
    <div class="preview" id="preview" style="background:#00d4ff"></div>
  </div>
  <div class="panel">
    <div class="panel-title">⬡ Palette Generator</div>
    <div class="controls" style="margin-top:0;margin-bottom:.5rem">
      <button onclick="genPalette('complement')">COMPLEMENT</button>
      <button onclick="genPalette('triadic')">TRIADIC</button>
      <button onclick="genPalette('analogous')">ANALOGOUS</button>
      <button onclick="genPalette('shades')">SHADES</button>
      <button onclick="genPalette('random')">RANDOM</button>
    </div>
    <div class="palette" id="palette"></div>
  </div>
  <div class="panel">
    <div class="panel-title">⬡ Contrast Checker (WCAG)</div>
    <div style="display:flex;gap:.5rem;margin-bottom:.5rem">
      <input type="color" id="fg" value="#00d4ff" oninput="checkContrast()" style="width:40px;height:30px;border:none;background:none;cursor:pointer">
      <input type="color" id="bg" value="#000a14" oninput="checkContrast()" style="width:40px;height:30px;border:none;background:none;cursor:pointer">
      <span style="font-size:.6rem;color:#475569;align-self:center">FG / BG</span>
    </div>
    <div class="contrast-box" id="contrastBox" style="background:#000a14;color:#00d4ff">
      <div class="contrast-label">CONTRAST RATIO</div>
      <div class="contrast-ratio" id="contrastRatio">--</div>
      <div style="font-size:.55rem;margin-top:.25rem" id="wcagGrade">--</div>
    </div>
  </div>
  <div class="back-link"><a href="index.html">← BACK</a></div>

  <script>
    let currentHex = '#00d4ff';
    function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b}}
    function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max===min){h=s=0}else{const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}}return{h:h*360,s:s*100,l:l*100}}
    function hslToHex(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;const color=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*color).toString(16).padStart(2,'0')};return`#${f(0)}${f(8)}${f(4)}`}

    function updateColor(hex){
      currentHex=hex;
      const{r,g,b}=hexToRgb(hex);
      const{h,s,l}=rgbToHsl(r,g,b);
      document.getElementById('preview').style.background=hex;
      document.getElementById('values').innerHTML=`
        <div class="val-row"><span class="val-label">HEX</span><span class="val-text">${hex.toUpperCase()} <button class="copy-btn" onclick="navigator.clipboard.writeText('${hex}')">CPY</button></span></div>
        <div class="val-row"><span class="val-label">RGB</span><span class="val-text">${r}, ${g}, ${b} <button class="copy-btn" onclick="navigator.clipboard.writeText('rgb(${r},${g},${b})')">CPY</button></span></div>
        <div class="val-row"><span class="val-label">HSL</span><span class="val-text">${Math.round(h)}°, ${Math.round(s)}%, ${Math.round(l)}% <button class="copy-btn" onclick="navigator.clipboard.writeText('hsl(${Math.round(h)},${Math.round(s)}%,${Math.round(l)}%)')">CPY</button></span></div>
      `;
      checkContrast();
    }

    function genPalette(type){
      const{r,g,b}=hexToRgb(currentHex);
      const{h,s,l}=rgbToHsl(r,g,b);
      let colors=[];
      switch(type){
        case'complement':colors=[currentHex,hslToHex((h+180)%360,s,l)];break;
        case'triadic':colors=[currentHex,hslToHex((h+120)%360,s,l),hslToHex((h+240)%360,s,l)];break;
        case'analogous':colors=[hslToHex((h-30+360)%360,s,l),currentHex,hslToHex((h+30)%360,s,l),hslToHex((h+60)%360,s,l),hslToHex((h+90)%360,s,l)];break;
        case'shades':for(let i=0;i<7;i++)colors.push(hslToHex(h,s,l-(i*12)));break;
        case'random':for(let i=0;i<7;i++)colors.push(hslToHex(Math.random()*360,50+Math.random()*50,40+Math.random()*30));break;
      }
      const el=document.getElementById('palette');
      el.innerHTML=colors.map(c=>`<div class="swatch" style="background:${c}" title="${c}" onclick="document.getElementById('picker').value='${c}';updateColor('${c}')"></div>`).join('');
    }

    function checkContrast(){
      const fg=document.getElementById('fg').value;
      const bg=document.getElementById('bg').value;
      const fRgb=hexToRgb(fg),bRgb=hexToRgb(bg);
      const lum1=luminance(fRgb.r,fRgb.g,fRgb.b);
      const lum2=luminance(bRgb.r,bRgb.g,bRgb.b);
      const ratio=(Math.max(lum1,lum2)+.05)/(Math.min(lum1,lum2)+.05);
      const box=document.getElementById('contrastBox');
      box.style.background=bg;box.style.color=fg;
      document.getElementById('contrastRatio').textContent=ratio.toFixed(2)+':1';
      let grade='';
      if(ratio>=7)grade='AAA ✅';else if(ratio>=4.5)grade='AA ✅';else if(ratio>=3)grade='AA Large ⚠️';else grade='Fail ❌';
      document.getElementById('wcagGrade').textContent=grade;
    }
    function luminance(r,g,b){const a=[r,g,b].map(v=>{v/=255;return v<=.03928?v/12.92:Math.pow((v+.055)/1.055,2.4)});return.2126*a[0]+.7152*a[1]+.0722*a[2]}

    updateColor('#00d4ff');
    genPalette('triadic');
  </script>
</body>
</html>
