<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Stack Tower — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;overflow:hidden;font-family:'Orbitron',sans-serif;touch-action:none}
canvas{display:block}
.ov{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#0a1628,#050510);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;color:#e2e8f0;padding:1.5rem}
.ov.h{display:none}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin-bottom:.8rem;text-transform:uppercase}
.tt{font-size:1.4rem;font-weight:900;letter-spacing:2px;color:#22c55e;text-shadow:0 0 30px #22c55e66}
.st{font-size:.5rem;color:#475569;letter-spacing:3px;margin:.4rem 0 1rem}
.bn{background:transparent;border:2px solid #22c55e;color:#22c55e;padding:.6rem 2rem;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all .3s}
.bn:active{background:#22c55e;color:#050510}
.sc{font-size:2rem;font-weight:900;color:#22c55e;text-shadow:0 0 20px #22c55e44;margin:.5rem 0}
.inf{font-size:.55rem;color:#64748b;line-height:1.8}
.hint{font-size:.4rem;color:#334155;margin-top:1.2rem;letter-spacing:2px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ov" id="menu">
  <div class="brand">COAL OS</div>
  <div class="tt">🏗 STACK TOWER</div>
  <div class="st">BLOCK STACKING</div>
  <div id="menuHi" style="font-size:.55rem;color:#334155;margin-bottom:.5rem"></div>
  <button class="bn" onclick="newGame()">PLAY</button>
  <div class="hint">TAP OR SPACE TO DROP</div>
</div>
<div class="ov h" id="over">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#ef4444">TOWER FELL</div>
  <div class="sc" id="fScore">0</div>
  <div class="inf" id="fStats"></div>
  <button class="bn" onclick="newGame()">RETRY</button>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,blocks,current,camY,score,combo,best=0,running,animId,particles,perfectFlash;

function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
addEventListener('resize',resize);resize();

const HUE_START=140;
function hueFor(n){return(HUE_START+n*25)%360}

function newGame(){
  resize();
  document.getElementById('menu').classList.add('h');
  document.getElementById('over').classList.add('h');
  blocks=[];score=0;combo=0;camY=0;particles=[];perfectFlash=0;running=true;
  // Base
  const bw=Math.min(W*.7,300),bh=30;
  blocks.push({x:W/2-bw/2,y:H-80,w:bw,h:bh,hue:HUE_START});
  spawnBlock();
  animId=requestAnimationFrame(loop);
}

function spawnBlock(){
  const last=blocks[blocks.length-1];
  const bh=28;
  const dir=blocks.length%2===0?1:-1;
  const speed=2.5+blocks.length*.12;
  current={x:dir>0?-last.w:W,y:last.y-bh-2,w:last.w,h:bh,vx:dir*speed,hue:hueFor(blocks.length),placed:false};
}

function placeBlock(){
  if(!current||current.placed)return;
  current.placed=true;
  const last=blocks[blocks.length-1];
  const oStart=Math.max(current.x,last.x);
  const oEnd=Math.min(current.x+current.w,last.x+last.w);
  const overlap=oEnd-oStart;
  if(overlap<=0){die();return}
  // Perfect placement bonus
  const perfect=Math.abs(overlap-last.w)<8;
  const cutLeft=current.x<last.x?last.x-current.x:0;
  const cutRight=current.x+current.w>last.x+last.w?current.x+current.w-last.x-last.w:0;
  if(perfect){
    blocks.push({x:last.x,y:current.y,w:last.w,h:current.h,hue:current.hue});
    combo++;score+=10+combo*5;perfectFlash=20;
    addP(current.x+current.w/2,current.y,'#fff',15);
  }else{
    combo=0;
    blocks.push({x:oStart,y:current.y,w:overlap,h:current.h,hue:current.hue});
    // Falling piece
    const falling=cutLeft>0?{x:current.x,y:current.y,w:cutLeft,h:current.h,vy:0}:null;
    const falling2=cutRight>0?{x:oStart+overlap,y:current.y,w:cutRight,h:current.h,vy:0}:null;
    if(falling)particles.push({...falling,type:'fall'});
    if(falling2)particles.push({...falling2,type:'fall'});
    score+=10;
    addP(oStart,current.y,current.hue?'hsl('+current.hue+',80%,60%)':'#06b6d4',8);
  }
  // Camera
  const targetY=blocks[blocks.length-1].y-H*.4;
  camY=Math.min(0,targetY);
  spawnBlock();
}

function addP(x,y,col,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*5,vy:-Math.random()*4-1,life:25+Math.random()*15,mx:40,col,sz:1.5+Math.random()*2,type:'particle'})}

function die(){
  running=false;cancelAnimationFrame(animId);
  if(score>best)best=score;
  document.getElementById('fScore').textContent=score;
  document.getElementById('fStats').innerHTML=`Height: ${blocks.length} blocks<br>Best: ${best}`;
  setTimeout(()=>document.getElementById('over').classList.remove('h'),400);
}

function loop(){
  if(!running)return;
  if(!current.placed){current.x+=current.vx;if(current.x+current.w>W||current.x<0)current.vx=-current.vx}
  if(perfectFlash>0)perfectFlash--;
  particles=particles.filter(p=>{
    if(p.type==='fall'){p.vy+=.3;p.y+=p.vy;return p.y<H+100}
    p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life--;return p.life>0
  });
  render();
  animId=requestAnimationFrame(loop);
}

function render(){
  X.fillStyle='#050510';X.fillRect(0,0,W,H);
  // Grid
  X.strokeStyle='#22c55e06';X.lineWidth=1;
  for(let y=-camY%40;y<H;y+=40){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke()}

  X.save();X.translate(0,-camY);

  // Placed blocks
  blocks.forEach(b=>{
    const h='hsl('+b.hue+',75%,55%)';
    X.fillStyle=h;X.fillRect(b.x,b.y,b.w,b.h);
    X.fillStyle='#ffffff22';X.fillRect(b.x,b.y,b.w,b.h*.35);
    X.strokeStyle='hsl('+b.hue+',60%,40%)';X.lineWidth=1;X.strokeRect(b.x,b.y,b.w,b.h);
  });

  // Current block
  if(current&&!current.placed){
    X.shadowColor='hsl('+current.hue+',80%,60%)';X.shadowBlur=15;
    X.fillStyle='hsl('+current.hue+',80%,60%)';X.fillRect(current.x,current.y,current.w,current.h);
    X.fillStyle='#ffffff33';X.fillRect(current.x,current.y,current.w,current.h*.35);
    X.shadowBlur=0;
  }

  // Particles
  particles.forEach(p=>{
    if(p.type==='fall'){
      X.fillStyle='#ffffff22';X.fillRect(p.x,p.y,p.w,p.h);return;
    }
    const a=p.life/p.mx;X.globalAlpha=a;X.fillStyle=p.col;
    X.beginPath();X.arc(p.x,p.y,Math.max(.5,p.sz*a),0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;

  X.restore();

  // Perfect flash
  if(perfectFlash>0){X.fillStyle='rgba(255,255,255,'+(perfectFlash/20*.15)+')';X.fillRect(0,0,W,H)}

  // HUD
  X.fillStyle='#e2e8f0';X.font='bold 16px Orbitron';X.textAlign='left';X.fillText(score,12,28);
  if(combo>1){X.fillStyle='#f59e0b';X.font='bold 12px Orbitron';X.fillText('PERFECT x'+combo,12,46)}
}

C.addEventListener('click',placeBlock);
C.addEventListener('touchstart',e=>{e.preventDefault();placeBlock()},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space')placeBlock()});
document.getElementById('menuHi').textContent=best?'HIGH SCORE: '+best:'';
</script>
</body>
</html>
