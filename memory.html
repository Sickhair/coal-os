<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Memory Match — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Orbitron',sans-serif;color:#e2e8f0;overflow-x:hidden}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin:6px 0 2px;text-transform:uppercase}
.title{font-size:.85rem;font-weight:900;color:#a78bfa;text-shadow:0 0 20px #a78bfa44;letter-spacing:2px;margin-bottom:4px}
a.back{position:fixed;top:8px;left:8px;z-index:200;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:.5rem;color:#475569;opacity:.6}
.hud{display:flex;gap:10px;align-items:center;margin-bottom:8px;font-size:.5rem;flex-wrap:wrap;justify-content:center}
.grid{display:grid;gap:6px;margin-bottom:10px;padding:8px;max-width:95vw}
.card{aspect-ratio:1;background:#1e293b;border:2px solid #334155;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;font-size:min(6vw,32px);position:relative}
.card:hover{border-color:#475569}
.card.flipped,.card.matched{background:#0f172a}
.card.flipped{border-color:#a78bfa;box-shadow:0 0 12px #a78bfa33}
.card.matched{border-color:#22c55e;box-shadow:0 0 12px #22c55e33;opacity:.7}
.card .face{display:none}.card.flipped .face,.card.matched .face{display:block}
.card .back{font-size:.6rem;color:#334155;font-weight:700}
.card.flipped .back,.card.matched .back{display:none}
.diff{display:flex;gap:4px;margin-bottom:8px}
.btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:.25rem .6rem;border-radius:4px;font-family:inherit;font-size:.45rem;cursor:pointer}
.btn:active{background:#334155;color:#fff}
.btn.active{border-color:#a78bfa;color:#a78bfa}
.stats{font-size:.4rem;color:#475569;margin-bottom:8px;text-align:center}
</style>
</head>
<body>
<div class="brand">COAL OS</div>
<a class="back" href="index.html">← COAL OS</a>
<div class="title">🧠 MEMORY MATCH</div>
<div class="hud">
  <span style="color:#a78bfa" id="pairsEl">PAIRS: 0/0</span>
  <span style="color:#64748b" id="movesEl">MOVES: 0</span>
  <span style="color:#475569" id="timeEl">0:00</span>
</div>
<div class="diff">
  <button class="btn active" onclick="setDiff(0)">4×3</button>
  <button class="btn" onclick="setDiff(1)">4×4</button>
  <button class="btn" onclick="setDiff(2)">6×4</button>
  <button class="btn" onclick="setDiff(3)">6×6</button>
</div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<script>
const EMOJIS=['🦊','🐺','🦁','🐯','🦅','🐉','🦋','🐢','🐙','🦈','🐬','🐘','🦒','🐻','🐼','🐸','🦉','🐝'];
const DIFFS=[
  {cols:4,rows:3,pairs:6},
  {cols:4,rows:4,pairs:8},
  {cols:6,rows:4,pairs:12},
  {cols:6,rows:6,pairs:18},
];
let cards,flipped,matched,moves,pairs,timer,interval,locked,diff;

function setDiff(d){
  diff=d;
  document.querySelectorAll('.diff .btn').forEach((b,i)=>b.className='btn'+(i===d?' active':''));
  resetGame();
}

function resetGame(){
  const cfg=DIFFS[diff];
  const symbols=EMOJIS.slice(0,cfg.pairs);
  const deck=shuffle([...symbols,...symbols]);
  cards=deck;pairs=cfg.pairs;
  flipped=[];matched=new Set();moves=0;timer=0;locked=false;
  clearInterval(interval);interval=null;
  
  const g=document.getElementById('grid');
  g.style.gridTemplateColumns=`repeat(${cfg.cols},minmax(40px,70px))`;
  g.innerHTML='';
  
  cards.forEach((sym,i)=>{
    const c=document.createElement('div');c.className='card';c.dataset.idx=i;
    c.innerHTML=`<span class="face">${sym}</span><span class="back">◆</span>`;
    c.onclick=()=>flip(i);
    g.appendChild(c);
  });
  
  updateHud();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function flip(i){
  if(locked||flipped.includes(i)||matched.has(i))return;
  if(!interval){interval=setInterval(()=>{timer++;document.getElementById('timeEl').textContent=formatTime(timer)},1000)}
  
  const els=document.querySelectorAll('.card');
  els[i].classList.add('flipped');
  flipped.push(i);
  
  if(flipped.length===2){
    locked=true;moves++;
    const[a,b]=flipped;
    if(cards[a]===cards[b]){
      matched.add(a);matched.add(b);
      els[a].classList.add('matched');els[b].classList.add('matched');
      flipped=[];locked=false;updateHud();
      if(matched.size===cards.length){
        clearInterval(interval);
        document.getElementById('stats').textContent=`🎉 All pairs found in ${moves} moves! (${formatTime(timer)})`;
      }
    }else{
      setTimeout(()=>{
        els[a].classList.remove('flipped');els[b].classList.remove('flipped');
        flipped=[];locked=false;
      },800);
    }
    updateHud();
  }
}

function updateHud(){
  document.getElementById('pairsEl').textContent=`PAIRS: ${matched.size/2}/${pairs}`;
  document.getElementById('movesEl').textContent=`MOVES: ${moves}`;
}

function formatTime(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60}

diff=1;setDiff(1);
</script>
</body>
</html>
