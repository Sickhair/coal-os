<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Pixel Forge — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Orbitron',sans-serif;color:#e2e8f0;overflow:hidden}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin:6px 0 2px;text-transform:uppercase}
.title{font-size:.9rem;font-weight:900;color:#ec4899;text-shadow:0 0 20px #ec489944;letter-spacing:2px;margin-bottom:6px}
.toolbar{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:6px}
.tool{padding:.25rem .5rem;background:#1e293b;border:1px solid #334155;color:#64748b;border-radius:4px;font-size:.7rem;cursor:pointer;font-family:inherit}
.tool.active{background:#ec489922;border-color:#ec4899;color:#ec4899}
.canvas-wrap{position:relative;border:2px solid #1e293b;border-radius:4px;background:#000;margin-bottom:6px;image-rendering:pixelated}
.canvas-wrap canvas{display:block;image-rendering:pixelated;cursor:crosshair}
.palette{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:95vw;margin-bottom:6px}
.color{width:min(6vw,24px);height:min(6vw,24px);border-radius:3px;cursor:pointer;border:2px solid transparent;transition:border .15s}
.color.active{border-color:#fff}
.actions{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.btn{padding:.25rem .6rem;background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:4px;font-family:inherit;font-size:.5rem;cursor:pointer;letter-spacing:1px}
.btn:active{background:#334155;color:#fff}
.size-sel{display:flex;gap:4px;margin-bottom:6px}
.size-btn{padding:.15rem .4rem;background:#1e293b;border:1px solid #334155;color:#64748b;border-radius:3px;font-family:inherit;font-size:.5rem;cursor:pointer}
.size-btn.active{border-color:#ec4899;color:#ec4899}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:8px;left:8px;z-index:200;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:.5rem;color:#475569;opacity:.6">← COAL OS</a>
<div class="brand">COAL OS</div>
<div class="title">🎨 PIXEL FORGE</div>
<div class="size-sel">
  <button class="size-btn active" onclick="setSize(16)">16x16</button>
  <button class="size-btn" onclick="setSize(32)">32x32</button>
  <button class="size-btn" onclick="setSize(64)">64x64</button>
</div>
<div class="toolbar" id="toolbar"></div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="palette" id="palette"></div>
<div class="actions">
  <button class="btn" onclick="undo()">↩ UNDO</button>
  <button class="btn" onclick="redo()">REDO ↪</button>
  <button class="btn" onclick="clearCanvas()">CLEAR</button>
  <button class="btn" onclick="exportPNG()">EXPORT</button>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const COLORS=['#000000','#1a1a2e','#434360','#6b7280','#9ca3af','#d1d5db','#f3f4f6','#ffffff',
'#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#22c55e','#14b8a6','#06b6d4',
'#3b82f6','#6366f1','#8b5cf6','#a855f7','#d946ef','#ec4899','#f43f5e','#fb923c',
'#fbbf24','#bef264','#4ade80','#2dd4bf','#22d3ee','#60a5fa','#818cf8','#c084fc',
'#e879f9','#f472b6','#fca5a5','#fdba74','#fde68a','#d9f99d','#86efac','#99f6e4',
'#a5f3fc','#93c5fd','#a5b4fc','#d8b4fe','#f0abfc','#f9a8d4','#fecdd3','#fed7aa',
'#fef08a','#bbf7d0','#6ee7b7','#5eead4','#67e8f9','#7dd3fc','#a5b4fc','#c4b5fd',
'#e9d5ff','#fbcfe8','#ffe4e6','#ffedd5','#fef9c3','#dcfce7','#ccfbf1','#cffafe'];
const TOOLS=['✏ Pencil','🧹 Eraser','🪣 Fill','💧 Picker','📏 Line','⬜ Rect','⭕ Circle'];
let gridSize=16,pixelSize,color='#ffffff',tool=0,pixels,undoStack,redoStack,drawing,startPos;

function setSize(s){
  gridSize=s;
  document.querySelectorAll('.size-btn').forEach((b,i)=>b.classList.toggle('active',[16,32,64][i]===s));
  pixelSize=Math.floor(Math.min(innerWidth*.9,400)/gridSize);
  C.width=gridSize*pixelSize;C.height=gridSize*pixelSize;
  pixels=[];for(let y=0;y<gridSize;y++){pixels[y]=[];for(let x=0;x<gridSize;x++)pixels[y][x]=null}
  undoStack=[];redoStack=[];render();
}

function init(){
  // Toolbar
  const tb=document.getElementById('toolbar');
  TOOLS.forEach((t,i)=>{const b=document.createElement('div');b.className='tool'+(i===0?' active':'');b.textContent=t;b.onclick=()=>{tool=i;document.querySelectorAll('.tool').forEach((el,j)=>el.classList.toggle('active',j===i))};tb.appendChild(b)});
  // Palette
  const pal=document.getElementById('palette');
  COLORS.forEach(c=>{const d=document.createElement('div');d.className='color'+(c==='#ffffff'?' active':'');d.style.background=c;d.onclick=()=>{color=c;document.querySelectorAll('.color').forEach(el=>el.classList.toggle('active',el.style.background===c))};pal.appendChild(d)});
  setSize(16);
}

function saveState(){undoStack.push(pixels.map(r=>[...r]));if(undoStack.length>50)undoStack.shift();redoStack=[]}
function undo(){if(!undoStack.length)return;redoStack.push(pixels.map(r=>[...r]));pixels=undoStack.pop();render()}
function redo(){if(!redoStack.length)return;undoStack.push(pixels.map(r=>[...r]));pixels=redoStack.pop();render()}
function clearCanvas(){saveState();for(let y=0;y<gridSize;y++)for(let x=0;x<gridSize;x++)pixels[y][x]=null;render()}

function exportPNG(){
  const c2=document.createElement('canvas');c2.width=gridSize;c2.height=gridSize;
  const x2=c2.getContext('2d');
  for(let y=0;y<gridSize;y++)for(let x=0;x<gridSize;x++){if(pixels[y][x]){x2.fillStyle=pixels[y][x];x2.fillRect(x,y,1,1)}}
  const a=document.createElement('a');a.download='pixelforge.png';a.href=c2.toDataURL();a.click();
}

function getPixel(e){
  const r=C.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:Math.floor((cx-r.left)/pixelSize),y:Math.floor((cy-r.top)/pixelSize)};
}

function inBounds(x,y){return x>=0&&x<gridSize&&y>=0&&y<gridSize}

function floodFill(sx,sy,fillColor){
  const target=pixels[sy][sx];if(target===fillColor)return;
  const stack=[[sx,sy]];while(stack.length){
    const[x,y]=stack.pop();if(!inBounds(x,y)||pixels[y][x]!==target)continue;
    pixels[y][x]=fillColor;stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
}

function plotLine(x0,y0,x1,y1,cb){
  let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1,err=dx-dy;
  while(true){cb(x0,y0);if(x0===x1&&y0===y1)break;const e2=2*err;if(e2>-dy){err-=dy;x0+=sx}if(e2<dx){err+=dx;y0+=sy}}
}

function plotRect(x0,y0,x1,y1,cb){
  const minX=Math.min(x0,x1),maxX=Math.max(x0,x1),minY=Math.min(y0,y1),maxY=Math.max(y0,y1);
  for(let x=minX;x<=maxX;x++){cb(x,minY);cb(x,maxY)}
  for(let y=minY;y<=maxY;y++){cb(minX,y);cb(maxX,y)}
}

function plotCircle(cx,cy,ex,ey,cb){
  const r=Math.round(Math.hypot(ex-cx,ey-cy));
  let x=r,y=0,err=1-r;
  while(x>=y){
    cb(cx+x,cy+y);cb(cx+y,cy+x);cb(cx-y,cy+x);cb(cx-x,cy+y);
    cb(cx-x,cy-y);cb(cx-y,cy-x);cb(cx+y,cy-x);cb(cx+x,cy-y);
    y++;if(err<0){err+=2*y+1}else{x--;err+=2*(y-x)+1}
  }
}

function apply(px,py){
  if(!inBounds(px,py))return;
  if(tool===0)pixels[py][px]=color;
  else if(tool===1)pixels[py][px]=null;
  else if(tool===2)floodFill(px,py,color);
  else if(tool===3){const c=pixels[py][px];if(c){color=c;document.querySelectorAll('.color').forEach(el=>el.classList.toggle('active',el.style.background===c))}}
}

function onDown(e){
  e.preventDefault();drawing=true;startPos=getPixel(e);
  if(tool<=3){saveState();const p=getPixel(e);apply(p.x,p.y);render()}
}

function onMove(e){
  e.preventDefault();if(!drawing)return;
  if(tool<=1){const p=getPixel(e);apply(p.x,p.y);render()}
  else if(tool>=4){render();const p=getPixel(e);
    X.fillStyle=color+'88';
    if(tool===4)plotLine(startPos.x,startPos.y,p.x,p.y,(x,y)=>{if(inBounds(x,y))X.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize)});
    else if(tool===5)plotRect(startPos.x,startPos.y,p.x,p.y,(x,y)=>{if(inBounds(x,y))X.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize)});
    else if(tool===6)plotCircle(startPos.x,startPos.y,p.x,p.y,(x,y)=>{if(inBounds(x,y))X.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize)});
  }
}

function onUp(e){
  if(!drawing)return;drawing=false;
  if(tool>=4){
    saveState();const p=e.changedTouches?getPixel({touches:e.changedTouches,clientX:0,clientY:0}):getPixel(e);
    // Recalculate from event
    const r=C.getBoundingClientRect();
    const cx=e.changedTouches?e.changedTouches[0].clientX:e.clientX;
    const cy=e.changedTouches?e.changedTouches[0].clientY:e.clientY;
    const ex=Math.floor((cx-r.left)/pixelSize),ey=Math.floor((cy-r.top)/pixelSize);
    if(tool===4)plotLine(startPos.x,startPos.y,ex,ey,(x,y)=>{if(inBounds(x,y))pixels[y][x]=color});
    else if(tool===5)plotRect(startPos.x,startPos.y,ex,ey,(x,y)=>{if(inBounds(x,y))pixels[y][x]=color});
    else if(tool===6)plotCircle(startPos.x,startPos.y,ex,ey,(x,y)=>{if(inBounds(x,y))pixels[y][x]=color});
    render();
  }
}

function render(){
  X.fillStyle='#111';X.fillRect(0,0,C.width,C.height);
  // Grid
  X.strokeStyle='#222';X.lineWidth=1;
  for(let x=0;x<=gridSize;x++){X.beginPath();X.moveTo(x*pixelSize,0);X.lineTo(x*pixelSize,C.height);X.stroke()}
  for(let y=0;y<=gridSize;y++){X.beginPath();X.moveTo(0,y*pixelSize);X.lineTo(C.width,y*pixelSize);X.stroke()}
  // Pixels
  for(let y=0;y<gridSize;y++)for(let x=0;x<gridSize;x++){
    if(pixels[y][x]){X.fillStyle=pixels[y][x];X.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize)}
  }
}

C.addEventListener('mousedown',onDown);C.addEventListener('mousemove',onMove);C.addEventListener('mouseup',onUp);
C.addEventListener('touchstart',onDown,{passive:false});C.addEventListener('touchmove',onMove,{passive:false});C.addEventListener('touchend',onUp);
init();
</script>
</body>
</html>
