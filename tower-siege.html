<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Tower Siege — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;overflow:hidden;font-family:'Orbitron',sans-serif;touch-action:none}
canvas{display:block}
.ov{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#0a1628,#050510);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;color:#e2e8f0;padding:1.5rem}
.ov.h{display:none}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin-bottom:.8rem;text-transform:uppercase}
.tt{font-size:1.2rem;font-weight:900;letter-spacing:2px;text-shadow:0 0 30px currentColor66}
.st{font-size:.5rem;color:#475569;letter-spacing:3px;margin:.4rem 0 1rem}
.bn{background:transparent;border:2px solid #3b82f6;color:#3b82f6;padding:.6rem 2rem;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all .3s}
.bn:active{background:#3b82f6;color:#050510}
.sc{font-size:2rem;font-weight:900;text-shadow:0 0 20px currentColor44;margin:.5rem 0}
.inf{font-size:.55rem;color:#64748b;line-height:1.8}
.hint{font-size:.4rem;color:#334155;margin-top:1rem;letter-spacing:2px}
.tbar{position:fixed;bottom:0;left:0;right:0;display:flex;gap:4px;padding:6px;background:#0a1628;border-top:1px solid #1e293b;z-index:50;justify-content:center;flex-wrap:wrap}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:1px;background:#1e293b;border:2px solid #334155;color:#64748b;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:.5rem;min-width:52px;transition:all .15s}
.tbtn.active{border-color:#3b82f6;color:#e2e8f0;background:#1e293b}
.tbtn .ic{font-size:1rem}.tbtn .cost{color:#f59e0b;font-size:.45rem}
.tbtn.dis{opacity:.3;cursor:not-allowed}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="tbar h" id="tbar"></div>
<div class="ov" id="menu">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#3b82f6">🏰 TOWER SIEGE</div>
  <div class="st">TOWER DEFENSE</div>
  <button class="bn" onclick="startGame()">PLAY</button>
  <div class="hint">TAP TO PLACE TOWERS • DEFEND YOUR BASE</div>
</div>
<div class="ov h" id="waveScreen">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#a855f7">WAVE <span id="waveNum">1</span></div>
  <div class="st" id="waveDesc"></div>
  <button class="bn" onclick="startWave()">FIGHT!</button>
</div>
<div class="ov h" id="over">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#ef4444">BASE DESTROYED</div>
  <div class="sc" style="color:#ef4444" id="fScore">0</div>
  <div class="inf" id="fStats"></div>
  <button class="bn" onclick="startGame()">RETRY</button>
</div>
<div class="ov h" id="winScreen">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#22c55e">VICTORY!</div>
  <div class="sc" style="color:#22c55e" id="wScore">0</div>
  <div class="inf" id="wStats"></div>
  <button class="bn" style="border-color:#22c55e;color:#22c55e" onclick="startGame()">PLAY AGAIN</button>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,CELL,GCOLS,GROWS,grid,path,base,towers,enemies,projectiles,particles,gold,lives,wave,waveEnemies,score,running,animId,selectedTower,waveActive;

const TOWER_TYPES=[
  {name:'Bolt',color:'#3b82f6',range:3,damage:8,rate:20,cost:50,key:'bolt'},
  {name:'Fire',color:'#ef4444',range:2.5,damage:15,rate:30,cost:75,key:'fire',splash:1},
  {name:'Ice',color:'#06b6d4',range:3,damage:5,rate:25,cost:60,key:'ice',slow:.5},
  {name:'Sniper',color:'#a855f7',range:5,damage:30,rate:60,cost:100,key:'sniper'},
  {name:'Rapid',color:'#f59e0b',range:2,damage:4,rate:8,cost:80,key:'rapid'},
];

const ENEMY_TYPES=[
  {name:'Grunt',color:'#ef4444',hp:40,speed:1,reward:10},
  {name:'Fast',color:'#f59e0b',hp:25,speed:2,reward:15},
  {name:'Tank',color:'#8b5cf6',hp:120,speed:.6,reward:25},
  {name:'Healer',color:'#22c55e',hp:50,speed:.8,reward:20,heals:true},
  {name:'Boss',color:'#ec4899',hp:300,speed:.4,reward:100},
];

function resize(){W=C.width=innerWidth;H=C.height=innerHeight-60}
addEventListener('resize',resize);resize();

function generatePath(){
  GCOLS=Math.floor(W/40);GROWS=Math.floor((H)/40);
  CELL=40;
  GCOLS=Math.min(GCOLS,20);GROWS=Math.min(GROWS,12);
  
  // Simple S-curve path
  path=[];
  const midR=Math.floor(GROWS/2);
  for(let c=0;c<GCOLS;c++){
    const offset=Math.sin(c/GCOLS*Math.PI*2)*Math.floor(GROWS/4);
    const r=Math.max(1,Math.min(GROWS-2,midR+Math.round(offset)));
    path.push({c,r});
  }
  
  // Grid: 0=empty,1=path,2=base,3=tower
  grid=[];
  for(let r=0;r<GROWS;r++){grid[r]=[];for(let c=0;c<GCOLS;c++)grid[r][c]=0}
  path.forEach(p=>grid[p.r][p.c]=1);
  base={c:GCOLS-1,r:path[path.length-1].r};
  grid[base.r][base.c]=2;
}

function pathPixel(i){return{x:path[i].c*CELL+CELL/2,y:path[i].y*CELL+CELL/2}}
function gridPixel(c,r){return{x:c*CELL+CELL/2,y:r*CELL+CELL/2}}

function startGame(){
  resize();generatePath();
  document.getElementById('menu').classList.add('h');
  document.getElementById('over').classList.add('h');
  document.getElementById('winScreen').classList.add('h');
  document.getElementById('tbar').classList.remove('h');
  gold=200;lives=20;wave=0;score=0;towers=[];enemies=[];projectiles=[];particles=[];running=true;selectedTower=0;waveActive=false;
  buildToolbar();
  nextWave();
}

function buildToolbar(){
  const el=document.getElementById('tbar');el.innerHTML='';
  TOWER_TYPES.forEach((t,i)=>{
    const d=document.createElement('div');d.className='tbtn'+(i===0?' active':'');
    d.innerHTML=`<span class="ic" style="color:${t.color}">🗼</span><span>${t.name}</span><span class="cost">$${t.cost}</span>`;
    d.onclick=()=>{selectedTower=i;document.querySelectorAll('.tbtn').forEach((b,j)=>b.classList.toggle('active',j===i))};
    el.appendChild(d);
  });
}

function nextWave(){
  wave++;
  if(wave>30){
    running=false;cancelAnimationFrame(animId);
    document.getElementById('wScore').textContent=score;
    document.getElementById('wStats').innerHTML=`Waves: ${wave-1}/30<br>Gold earned: ${score}`;
    document.getElementById('winScreen').classList.remove('h');return;
  }
  const count=3+wave*2;
  waveEnemies=[];
  for(let i=0;i<count;i++){
    const type=wave%5===0&&i===count-1?4:Math.min(4,Math.floor(Math.random()*(1+wave/6)));
    waveEnemies.push({...ENEMY_TYPES[type],pathIdx:0,progress:0,maxHp:ENEMY_TYPES[type].hp+(wave-1)*5,slowed:0});
  }
  document.getElementById('waveNum').textContent=wave;
  document.getElementById('waveDesc').textContent=count+' enemies approaching';
  document.getElementById('waveScreen').classList.remove('h');
}

function startWave(){
  document.getElementById('waveScreen').classList.add('h');
  enemies.push(...waveEnemies);
  waveActive=true;
  animId=requestAnimationFrame(loop);
}

function placeTower(c,r){
  const t=TOWER_TYPES[selectedTower];
  if(grid[r][c]!==0||gold<t.cost)return;
  gold-=t.cost;grid[r][c]=3;
  towers.push({c,r,type:selectedTower,cooldown:0,level:1});
  buildToolbar();
}

function addP(x,y,col,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4-1,life:20+Math.random()*15,mx:35,col,sz:1.5+Math.random()*2})}

let spawnIdx=0;
function loop(){
  if(!running)return;
  spawnIdx++;
  
  // Move enemies along path
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    const spd=e.speed*(e.slowed>0?.5:1);
    if(e.slowed>0)e.slowed--;
    e.progress+=spd*0.02;
    if(e.progress>=1){e.progress=0;e.pathIdx++;
      if(e.pathIdx>=path.length-1){e.hp=0;lives--;if(lives<=0){die();return}}
    }
    // Healer
    if(e.heals&&spawnIdx%60===0){
      enemies.forEach(o=>{if(o!==e&&o.hp>0&&Math.abs(o.pathIdx-e.pathIdx)<2)o.hp=Math.min(o.maxHp,o.hp+5)});
    }
  });
  
  // Tower shooting
  towers.forEach(tw=>{
    tw.cooldown--;if(tw.cooldown>0)return;
    const tp=gridPixel(tw.c,tw.r);
    const tt=TOWER_TYPES[tw.type];
    let best=null,bestDist=Infinity;
    enemies.forEach(e=>{
      if(e.hp<=0)return;
      const ep=gridPixel(path[e.pathIdx].c,path[e.pathIdx].r);
      // Interpolate position
      const nextIdx=Math.min(e.pathIdx+1,path.length-1);
      const np=gridPixel(path[nextIdx].c,path[nextIdx].r);
      const ex=ep.x+(np.x-ep.x)*e.progress;
      const ey=ep.y+(np.y-ep.y)*e.progress;
      const d=Math.hypot(tp.x-ex,tp.y-ey)/CELL;
      if(d<=tt.range&&e.pathIdx>bestDist)return;// prefer furthest
      if(d<=tt.range){best=e;bestDist=e.pathIdx}
    });
    if(best){
      tw.cooldown=tt.rate;
      const ep=gridPixel(path[best.pathIdx].c,path[best.pathIdx].r);
      const nextIdx=Math.min(best.pathIdx+1,path.length-1);
      const np=gridPixel(path[nextIdx].c,path[nextIdx].r);
      const ex=ep.x+(np.x-ep.x)*best.progress;
      const ey=ep.y+(np.y-ep.y)*best.progress;
      projectiles.push({x:tp.x,y:tp.y,tx:ex,ty:ey,speed:6,type:tw.type,damage:tt.damage+(tw.level-1)*3,splash:tt.splash||0,slow:tt.slow||0});
    }
  });
  
  // Move projectiles
  projectiles.forEach(p=>{
    const dx=p.tx-p.x,dy=p.ty-p.y,d=Math.hypot(dx,dy);
    if(d<p.speed){
      // Hit
      enemies.forEach(e=>{
        if(e.hp<=0)return;
        const ep=gridPixel(path[e.pathIdx].c,path[e.pathIdx].r);
        const nextIdx=Math.min(e.pathIdx+1,path.length-1);
        const np=gridPixel(path[nextIdx].c,path[nextIdx].r);
        const ex=ep.x+(np.x-ep.x)*e.progress;
        const ey=ep.y+(np.y-ep.y)*e.progress;
        if(Math.hypot(ex-p.tx,ey-p.ty)<(p.splash?CELL:CELL/2)){
          e.hp-=p.damage;if(p.slow)e.slowed=60;
          addP(ex,ey,TOWER_TYPES[p.type].color,3);
        }
      });
      p.dead=true;
    }else{p.x+=dx/d*p.speed;p.y+=dy/d*p.speed}
  });
  projectiles=projectiles.filter(p=>!p.dead);
  
  // Remove dead enemies
  enemies.forEach(e=>{
    if(e.hp<=0&&!e.counted){e.counted=true;gold+=e.reward;score+=e.reward;addP(gridPixel(path[e.pathIdx].c,path[e.pathIdx].r).x,gridPixel(path[e.pathIdx].c,path[e.pathIdx].r).y,e.color,8)}
  });
  enemies=enemies.filter(e=>e.hp>0);
  
  // Particles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life--;return p.life>0});
  
  // Wave complete
  if(waveActive&&enemies.length===0){
    waveActive=false;gold+=wave*10;nextWave();return;
  }
  
  // Update toolbar gold display
  document.querySelectorAll('.tbtn').forEach((b,i)=>b.classList.toggle('dis',gold<TOWER_TYPES[i].cost));
  
  render();
  animId=requestAnimationFrame(loop);
}

function die(){
  running=false;cancelAnimationFrame(animId);
  document.getElementById('fScore').textContent=score;
  document.getElementById('fStats').innerHTML=`Wave: ${wave}/30<br>Lives: ${lives}`;
  setTimeout(()=>document.getElementById('over').classList.remove('h'),500);
}

function render(){
  X.fillStyle='#050510';X.fillRect(0,0,W,H);
  
  // Grid
  for(let r=0;r<GROWS;r++)for(let c=0;c<GCOLS;c++){
    const x=c*CELL,y=r*CELL;
    if(grid[r][c]===0){X.fillStyle='#0a0e1a';X.fillRect(x,y,CELL,CELL);X.strokeStyle='#1e293b22';X.lineWidth=1;X.strokeRect(x,y,CELL,CELL)}
    else if(grid[r][c]===1){X.fillStyle='#1e293b';X.fillRect(x,y,CELL,CELL)}
    else if(grid[r][c]===2){X.fillStyle='#22c55e22';X.fillRect(x,y,CELL,CELL);X.fillStyle='#22c55e';X.font='bold 14px sans-serif';X.textAlign='center';X.fillText('🏰',x+CELL/2,y+CELL/2+5)}
  }
  
  // Path highlight
  X.strokeStyle='#3b82f622';X.lineWidth=CELL*.6;X.lineCap='round';X.lineJoin='round';
  X.beginPath();path.forEach((p,i)=>{const px=p.c*CELL+CELL/2,py=p.r*CELL+CELL/2;if(i===0)X.moveTo(px,py);else X.lineTo(px,py)});X.stroke();
  
  // Towers
  towers.forEach(tw=>{
    const tp=gridPixel(tw.c,tw.r);const tt=TOWER_TYPES[tw.type];
    X.fillStyle=tt.color+'44';X.fillRect(tw.c*CELL+2,tw.r*CELL+2,CELL-4,CELL-4);
    X.fillStyle=tt.color;X.font='16px sans-serif';X.textAlign='center';X.fillText('🗼',tp.x,tp.y+5);
    // Level indicator
    if(tw.level>1){X.fillStyle='#fff';X.font='bold 8px Orbitron';X.fillText('L'+tw.level,tp.x,tp.y-10)}
  });
  
  // Enemies
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    const ep=gridPixel(path[e.pathIdx].c,path[e.pathIdx].r);
    const nextIdx=Math.min(e.pathIdx+1,path.length-1);
    const np=gridPixel(path[nextIdx].c,path[nextIdx].r);
    const ex=ep.x+(np.x-ep.x)*e.progress;
    const ey=ep.y+(np.y-ep.y)*e.progress;
    X.fillStyle=e.color;X.shadowColor=e.color;X.shadowBlur=8;
    X.beginPath();X.arc(ex,ey,CELL*.3,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
    // HP bar
    const hpW=CELL*.6,hpH=3;
    X.fillStyle='#333';X.fillRect(ex-hpW/2,ey-CELL*.4,hpW,hpH);
    X.fillStyle=e.hp/e.maxHp>.5?'#22c55e':'#ef4444';
    X.fillRect(ex-hpW/2,ey-CELL*.4,hpW*(e.hp/e.maxHp),hpH);
  });
  
  // Projectiles
  projectiles.forEach(p=>{
    X.fillStyle=TOWER_TYPES[p.type].color;X.shadowColor=TOWER_TYPES[p.type].color;X.shadowBlur=6;
    X.beginPath();X.arc(p.x,p.y,3,0,Math.PI*2);X.fill();X.shadowBlur=0;
  });
  
  // Particles
  particles.forEach(p=>{
    const a=p.life/p.mx;X.globalAlpha=a;X.fillStyle=p.col;
    X.beginPath();X.arc(p.x,p.y,Math.max(.5,p.sz*a),0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;
  
  // HUD
  X.fillStyle='#e2e8f0';X.font='bold 12px Orbitron';X.textAlign='left';X.fillText('GOLD: '+gold,8,16);
  X.fillStyle=lives>5?'#22c55e':'#ef4444';X.fillText('LIVES: '+lives,8,30);
  X.fillStyle='#a855f7';X.textAlign='right';X.fillText('WAVE '+wave+'/30',W-8,16);
  X.fillStyle='#64748b';X.font='10px Orbitron';X.fillText('SCORE: '+score,W-8,30);
}

// Input
C.addEventListener('click',e=>{
  if(!running)return;
  const r=C.getBoundingClientRect();
  const c=Math.floor((e.clientX-r.left)/CELL),row=Math.floor((e.clientY-r.top)/CELL);
  if(c>=0&&c<GCOLS&&row>=0&&row<GROWS)placeTower(c,row);
});
C.addEventListener('touchstart',e=>{
  e.preventDefault();if(!running)return;
  const r=C.getBoundingClientRect();const t=e.touches[0];
  const c=Math.floor((t.clientX-r.left)/CELL),row=Math.floor((t.clientY-r.top)/CELL);
  if(c>=0&&c<GCOLS&&row>=0&&row<GROWS)placeTower(c,row);
},{passive:false});
</script>
</body>
</html>
