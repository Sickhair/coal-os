<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Depths of Coal — COAL OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#050510;overflow:hidden;font-family:'Orbitron',sans-serif;color:#e2e8f0;touch-action:none}
canvas{display:block}
.ov{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#0a1628,#050510);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;padding:1.5rem}
.ov.h{display:none}
.brand{font-size:.4rem;letter-spacing:4px;color:#334155;margin-bottom:.8rem;text-transform:uppercase}
.tt{font-size:1.2rem;font-weight:900;letter-spacing:2px;text-shadow:0 0 30px currentColor66}
.st{font-size:.5rem;color:#475569;letter-spacing:3px;margin:.4rem 0 1rem}
.bn{background:transparent;border:2px solid #a855f7;color:#a855f7;padding:.6rem 2rem;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:3px;cursor:pointer}
.bn:active{background:#a855f7;color:#050510}
.hint{font-size:.4rem;color:#334155;margin-top:1rem;letter-spacing:2px}
.sc{font-size:2rem;font-weight:900;color:#a855f7;text-shadow:0 0 20px #a855f744;margin:.5rem 0}
.inf{font-size:.55rem;color:#64748b;line-height:1.8}
.dpad{position:fixed;bottom:15px;right:15px;display:grid;grid-template-columns:repeat(3,46px);grid-template-rows:repeat(3,46px);gap:3px;z-index:60}
.dpad .d{background:#1e293b88;border:1px solid #33415566;color:#64748b88;display:flex;align-items:center;justify-content:center;font-size:1rem;border-radius:8px;cursor:pointer}
.dpad .d:active{background:#a855f733;color:#a855f7}
.dpad .e{background:transparent;border:none}
.hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:.4rem .6rem;z-index:50;pointer-events:none;font-size:.55rem}
.hud .hp{color:#ef4444;font-weight:700}.hud .fl{color:#a855f7;font-weight:700}.hud .stats{color:#64748b}
.log{position:fixed;bottom:15px;left:15px;font-size:.4rem;color:#334155;max-width:50vw;z-index:50;line-height:1.5}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:8px;left:8px;z-index:200;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:.5rem;color:#475569;opacity:.6">← COAL OS</a>
<canvas id="c"></canvas>
<div class="hud hidden" id="hud">
  <div class="hp" id="hpEl">♥ 30/30</div>
  <div class="fl" id="flEl">FLOOR 1</div>
  <div class="stats" id="statsEl">ATK:3 DEF:0</div>
</div>
<div class="log" id="log"></div>
<div class="dpad h" id="dpad">
  <div class="e"></div><div class="d" onclick="move(0,-1)">▲</div><div class="e"></div>
  <div class="d" onclick="move(-1,0)">◄</div><div class="d" onclick="wait()">·</div><div class="d" onclick="move(1,0)">►</div>
  <div class="e"></div><div class="d" onclick="move(0,1)">▼</div><div class="e"></div>
</div>
<div class="ov" id="menu">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#a855f7">⚔ DEPTHS OF COAL</div>
  <div class="st">ROGUELIKE DUNGEON</div>
  <button class="bn" onclick="startGame()">DESCEND</button>
  <div class="hint">WASD / D-PAD • 10 FLOORS • PERMADEATH</div>
</div>
<div class="ov h" id="over">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#ef4444">☠ PERISHED</div>
  <div class="sc" id="fScore">0</div>
  <div class="inf" id="fStats"></div>
  <button class="bn" style="border-color:#ef4444;color:#ef4444" onclick="startGame()">RETRY</button>
</div>
<div class="ov h" id="win">
  <div class="brand">COAL OS</div>
  <div class="tt" style="color:#22c55e">🏆 VICTORY</div>
  <div class="sc" style="color:#22c55e" id="wScore">0</div>
  <div class="inf" id="wStats"></div>
  <button class="bn" style="border-color:#22c55e;color:#22c55e" onclick="startGame()">AGAIN</button>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const T=24; // tile size
const MAP_W=40,MAP_H=30;
const WALL=0,FLOOR=1,STAIRS=2;

let map,visible,explored,player,enemies,items,equipment,logLines,floor,score,running,animId,fovMap;

function startGame(){
  document.getElementById('menu').classList.add('h');
  document.getElementById('over').classList.add('h');
  document.getElementById('win').classList.add('h');
  document.getElementById('hud').classList.remove('h');
  document.getElementById('dpad').classList.remove('h');
  player={x:0,y:0,hp:30,maxHp:30,atk:3,def:0,gold:0};equipment={weapon:null,armor:null};
  floor=0;score=0;logLines=[];running=true;
  nextFloor();
}

function nextFloor(){
  floor++;log('Floor '+floor);
  generateMap();
  spawnEnemies();
  spawnItems();
  computeFOV();
  render();
}

function generateMap(){
  map=[];explored=[];visible=[];
  for(let y=0;y<MAP_H;y++){map[y]=[];explored[y]=[];visible[y]=[];for(let x=0;x<MAP_W;x++){map[y][x]=WALL;explored[y][x]=false;visible[y][x]=false}}
  
  // BSP-ish rooms
  const rooms=[];const numRooms=6+Math.floor(Math.random()*4);
  for(let i=0;i<numRooms*3&&rooms.length<numRooms;i++){
    const w=4+Math.floor(Math.random()*6),h=3+Math.floor(Math.random()*4);
    const rx=1+Math.floor(Math.random()*(MAP_W-w-2)),ry=1+Math.floor(Math.random()*(MAP_H-h-2));
    let ok=true;
    rooms.forEach(r=>{if(rx<r.x+r.w+1&&rx+w+1>r.x&&ry<r.y+r.h+1&&ry+h+1>r.y)ok=false});
    if(ok)rooms.push({x:rx,y:ry,w,h});
  }
  
  rooms.forEach(r=>{for(let y=r.y;y<r.y+r.h;y++)for(let x=r.x;x<r.x+r.w;x++)map[y][x]=FLOOR});
  
  // Connect rooms
  for(let i=1;i<rooms.length;i++){
    const a=rooms[i-1],b=rooms[i];
    let cx=Math.floor(a.x+a.w/2),cy=Math.floor(a.y+a.h/2);
    const tx=Math.floor(b.x+b.w/2),ty=Math.floor(b.y+b.h/2);
    while(cx!==tx){map[cy][cx]=FLOOR;cx+=cx<tx?1:-1}
    while(cy!==ty){map[cy][cx]=FLOOR;cy+=cy<ty?1:-1}
    map[cy][cx]=FLOOR;
  }
  
  // Place player in first room
  player.x=Math.floor(rooms[0].x+rooms[0].w/2);
  player.y=Math.floor(rooms[0].y+rooms[0].h/2);
  
  // Stairs in last room
  const lr=rooms[rooms.length-1];
  map[Math.floor(lr.y+lr.h/2)][Math.floor(lr.x+lr.w/2)]=STAIRS;
  
  enemies=[];items=[];
}

function spawnEnemies(){
  const types=[
    {name:'Rat',color:'#a855f7',hp:8,atk:2,sym:'r'},
    {name:'Bat',color:'#6366f1',hp:6,atk:3,sym:'b'},
    {name:'Goblin',color:'#22c55e',hp:15,atk:4,sym:'g'},
    {name:'Skeleton',color:'#e2e8f0',hp:20,atk:5,sym:'s'},
    {name:'Orc',color:'#ef4444',hp:30,atk:7,sym:'O'},
    {name:'Wraith',color:'#8b5cf6',hp:25,atk:8,sym:'W'},
    {name:'Demon',color:'#f97316',hp:40,atk:10,sym:'D'},
    {name:'Dragon Lord',color:'#ef4444',hp:80,atk:15,sym:'L',boss:true},
  ];
  
  const count=3+floor*2;
  for(let i=0;i<count;i++){
    let x,y,tries=0;
    do{x=1+Math.floor(Math.random()*(MAP_W-2));y=1+Math.floor(Math.random()*(MAP_H-2));tries++}
    while((map[y][x]!==FLOOR||Math.hypot(x-player.x,y-player.y)<5||(x===player.x&&y===player.y))&&tries<100);
    if(tries<100){
      const maxType=Math.min(types.length-1,Math.floor(floor/2));
      const t=floor===10&&i===0?types[types.length-1]:types[Math.floor(Math.random()*(maxType+1))];
      const hpMult=1+floor*.05;
      enemies.push({...t,x,y,hp:Math.floor(t.hp*hpMult),maxHp:Math.floor(t.hp*hpMult)});
    }
  }
}

function spawnItems(){
  const count=2+Math.floor(Math.random()*3);
  for(let i=0;i<count;i++){
    let x,y,tries=0;
    do{x=1+Math.floor(Math.random()*(MAP_W-2));y=1+Math.floor(Math.random()*(MAP_H-2));tries++}
    while((map[y][x]!==FLOOR||enemies.some(e=>e.x===x&&e.y===y))&&tries<100);
    if(tries<100){
      const types=['heal','heal','weapon','armor','gold'];
      const type=types[Math.floor(Math.random()*types.length)];
      let item={x,y,type};
      if(type==='weapon')item.value=2+Math.floor(Math.random()*(floor+2));
      else if(type==='armor')item.value=1+Math.floor(Math.random()*(floor+1));
      else if(type==='gold')item.value=5+Math.floor(Math.random()*15*floor);
      else if(type==='heal')item.value=8+Math.floor(Math.random()*10);
      items.push(item);
    }
  }
}

function computeFOV(){
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++)visible[y][x]=false;
  const r=8;
  for(let a=0;a<360;a+=2){
    const rad=a*Math.PI/180;
    const dx=Math.cos(rad),dy=Math.sin(rad);
    let cx=player.x+.5,cy=player.y+.5;
    for(let d=0;d<r;d++){
      const ix=Math.floor(cx),iy=Math.floor(cy);
      if(ix<0||ix>=MAP_W||iy<0||iy>=MAP_H)break;
      visible[iy][ix]=true;explored[iy][ix]=true;
      if(map[iy][ix]===WALL)break;
      cx+=dx;cy+=dy;
    }
  }
}

function move(dx,dy){
  if(!running)return;
  const nx=player.x+dx,ny=player.y+dy;
  if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H||map[ny][nx]===WALL)return;
  
  // Enemy in the way?
  const enemy=enemies.find(e=>e.x===nx&&e.y===ny);
  if(enemy){attackEnemy(enemy);enemyTurn();computeFOV();render();return}
  
  player.x=nx;player.y=ny;
  
  // Pick up items
  items=items.filter(it=>{
    if(it.x===player.x&&it.y===player.y){
      if(it.type==='heal'){player.hp=Math.min(player.maxHp,player.hp+it.value);log('Healed '+it.value+' HP')}
      else if(it.type==='gold'){player.gold+=it.value;score+=it.value;log('Found '+it.value+' gold')}
      else if(it.type==='weapon'){player.atk+=it.value;equipment.weapon='Sword +'+it.value;log('Found Sword +'+it.value)}
      else if(it.type==='armor'){player.def+=it.value;equipment.armor='Armor +'+it.value;log('Found Armor +'+it.value)}
      return false;
    }
    return true;
  });
  
  // Stairs
  if(map[ny][nx]===STAIRS){
    if(floor>=10){victory();return}
    nextFloor();return;
  }
  
  enemyTurn();
  computeFOV();
  render();
}

function wait(){if(!running)return;enemyTurn();computeFOV();render()}

function attackEnemy(e){
  const dmg=Math.max(1,player.atk-Math.floor(Math.random()*2));
  e.hp-=dmg;log('Hit '+e.name+' for '+dmg);
  if(e.hp<=0){log(e.name+' defeated!');score+=e.maxHp;
    enemies=enemies.filter(en=>en!==e);
  }
}

function enemyTurn(){
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    if(!visible[e.y][e.x]&&Math.hypot(e.x-player.x,e.y-player.y)>6)return;
    
    // Move toward player
    const dx=Math.sign(player.x-e.x),dy=Math.sign(player.y-e.y);
    const dist=Math.hypot(player.x-e.x,player.y-e.y);
    
    if(dist<=1.5){
      // Attack player
      const dmg=Math.max(1,e.atk-player.def);
      player.hp-=dmg;log(e.name+' hits you for '+dmg);
      if(player.hp<=0){die();return}
    }else{
      // Move
      const nx=e.x+dx,ny=e.y+dy;
      if(nx>=0&&nx<MAP_W&&ny>=0&&ny<MAP_H&&map[ny][nx]!==WALL&&!enemies.some(o=>o!==e&&o.x===nx&&o.y===ny)&&!(nx===player.x&&ny===player.y)){
        e.x=nx;e.y=ny;
      }
    }
  });
}

function die(){
  running=false;log('You have perished...');
  document.getElementById('fScore').textContent=score;
  document.getElementById('fStats').innerHTML='Floor: '+floor+'/10<br>Gold: '+player.gold;
  setTimeout(()=>document.getElementById('over').classList.remove('h'),800);
}

function victory(){
  running=false;log('The Dragon Lord is vanquished!');
  document.getElementById('wScore').textContent=score;
  document.getElementById('wStats').innerHTML='Floors cleared: '+floor+'<br>Gold: '+player.gold;
  setTimeout(()=>document.getElementById('win').classList.remove('h'),800);
}

function log(msg){logLines.unshift(msg);if(logLines.length>5)logLines.pop();
  document.getElementById('log').innerHTML=logLines.join('<br>')}

function render(){
  // Camera centered on player
  const camX=player.x*T-W/2, camY=player.y*T-H/2;
  
  X.fillStyle='#050510';X.fillRect(0,0,C.width,C.height);
  X.save();X.translate(-camX,-camY);
  
  // Tiles
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
    if(!explored[y][x])continue;
    const px=x*T,py=y*T;
    const inView=visible[y][x];
    if(map[y][x]===WALL){
      X.fillStyle=inView?'#1e293b':'#0f172a';X.fillRect(px,py,T,T);
    }else if(map[y][x]===FLOOR){
      X.fillStyle=inView?'#0f172a':'#080e1a';X.fillRect(px,py,T,T);
      X.strokeStyle=inView?'#1e293b22':'#111';X.strokeRect(px,py,T,T);
    }else if(map[y][x]===STAIRS){
      X.fillStyle='#a855f722';X.fillRect(px,py,T,T);
      X.fillStyle=inView?'#a855f7':'#4c1d95';X.font='bold 16px sans-serif';X.textAlign='center';X.fillText('▼',px+T/2,py+T/2+5);
    }
  }
  
  // Items
  items.forEach(it=>{
    if(!visible[it.y][it.x])return;
    const px=it.x*T+T/2,py=it.y*T+T/2;
    X.font='14px sans-serif';X.textAlign='center';
    if(it.type==='heal'){X.fillStyle='#22c55e';X.fillText('♥',px,py+4)}
    else if(it.type==='gold'){X.fillStyle='#f59e0b';X.fillText('$',px,py+4)}
    else if(it.type==='weapon'){X.fillStyle='#3b82f6';X.fillText('†',px,py+4)}
    else if(it.type==='armor'){X.fillStyle='#06b6d4';X.fillText('[',px,py+4)}
  });
  
  // Enemies
  enemies.forEach(e=>{
    if(!visible[e.y][e.x]||e.hp<=0)return;
    const px=e.x*T+T/2,py=e.y*T+T/2;
    X.fillStyle=e.color;X.shadowColor=e.color;X.shadowBlur=8;
    X.font='bold 14px monospace';X.textAlign='center';X.fillText(e.sym,px,py+4);
    X.shadowBlur=0;
    // HP bar
    X.fillStyle='#333';X.fillRect(e.x*T,e.y*T-3,T,2);
    X.fillStyle=e.hp/e.maxHp>.5?'#22c55e':'#ef4444';X.fillRect(e.x*T,e.y*T-3,T*(e.hp/e.maxHp),2);
  });
  
  // Player
  X.fillStyle='#f59e0b';X.shadowColor='#f59e0b';X.shadowBlur=12;
  X.font='bold 16px monospace';X.textAlign='center';X.fillText('@',player.x*T+T/2,player.y*T+T/2+5);
  X.shadowBlur=0;
  
  X.restore();
  
  // HUD
  document.getElementById('hpEl').textContent='♥ '+player.hp+'/'+player.maxHp;
  document.getElementById('flEl').textContent='FLOOR '+floor+'/10';
  document.getElementById('statsEl').textContent='ATK:'+player.atk+' DEF:'+player.def+' $:'+player.gold;
}

// Controls
document.addEventListener('keydown',e=>{
  if(!running)return;
  if(e.key==='ArrowUp'||e.key==='w')move(0,-1);
  if(e.key==='ArrowDown'||e.key==='s')move(0,1);
  if(e.key==='ArrowLeft'||e.key==='a')move(-1,0);
  if(e.key==='ArrowRight'||e.key==='d')move(1,0);
  if(e.key==='.')wait();
});

// Resize
function resize(){C.width=innerWidth;C.height=innerHeight;if(running)render()}
addEventListener('resize',resize);resize();
</script>
</body>
</html>
